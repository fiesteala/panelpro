<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    
    <!-- ========================================== -->
    <!-- OPEN GRAPH CORPORATIVO                     -->
    <!-- ========================================== -->
    <meta property="og:title" content="Pase VIP - Telcel Investor Summit" />
    <meta property="og:description" content="Abre tu invitación y confirma tu asistencia." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200&auto=format&fit=crop" />
    <meta property="og:url" content="https://baulia.com" />
    <meta property="og:type" content="website" />

    <title>Telcel | Convención Anual 2026</title>
    
    <!-- Google Fonts: Limpias y corporativas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        telcel: {
                            blue: '#002855',      /* Azul Marino Corporativo (Confianza, Solidez) */
                            cyan: '#00B2E3',      /* Cyan Telcel (Innovación, Tecnología) */
                            light: '#F8FAFC',     /* Gris muy claro para fondos */
                            dark: '#0F172A',      /* Slate dark para textos fuertes */
                            gray: '#64748B'       /* Slate para textos secundarios */
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slow-zoom': 'slowZoom 20s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        fadeInUp: { 
                            '0%': { opacity: '0', transform: 'translateY(20px)' }, 
                            '100%': { opacity: '1', transform: 'translateY(0)' } 
                        },
                        slowZoom: { 
                            '0%': { transform: 'scale(1)' }, 
                            '100%': { transform: 'scale(1.05)' } 
                        }
                    },
                    boxShadow: { 
                        'corporate': '0 10px 40px -10px rgba(0,40,85,0.08)',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #F8FAFC; color: #0F172A; }
        .bg-corporate-gradient {
            background: linear-gradient(135deg, #002855 0%, #001530 100%);
        }
        .text-cyan-gradient {
            background: linear-gradient(90deg, #00B2E3, #4DD0E1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: transparent;
        }
        .delay-200 { animation-delay: 0.2s; opacity: 0; }
        .delay-400 { animation-delay: 0.4s; opacity: 0; }
        .delay-600 { animation-delay: 0.6s; opacity: 0; }

        /* ========================================== */
        /* SPLASH SCREEN PREMIUM (100% CSS)           */
        /* ========================================== */
        #luxury-preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #002855 0%, #001530 100%);
            z-index: 999999; /* Siempre por encima de todo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Desaparece automáticamente en 1.5s (espera 1s y se desvanece en 0.5s) */
            animation: fadeOutLoader 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            pointer-events: none;
        }

        .loader-bar-container {
            width: 140px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-top: 24px;
            overflow: hidden;
        }

        .loader-bar-fill {
            height: 100%;
            background: #00B2E3;
            box-shadow: 0 0 10px rgba(0, 178, 227, 0.5);
            animation: fillBar 1s ease-in-out forwards;
        }

        @keyframes fillBar {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes fadeOutLoader {
            0% { opacity: 1; pointer-events: all; }
            70% { opacity: 1; pointer-events: all; } /* Mantiene pantalla 1 segundo */
            100% { opacity: 0; visibility: hidden; pointer-events: none; }
        }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased selection:bg-telcel-cyan selection:text-white">
    
    <!-- PRE-LOADER ESTÁTICO (Evita pantallazos negros, carga instantánea) -->
    <div id="luxury-preloader">
        <svg viewBox="0 0 140 40" class="w-40 text-white" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation: pulse 1s infinite alternate;">
            <g transform="translate(10, 8)">
                <circle cx="12" cy="12" r="8" fill="currentColor"/>
                <ellipse cx="12" cy="12" rx="16" ry="4.5" fill="none" stroke="currentColor" stroke-width="2.5" transform="rotate(-35 12 12)"/>
                <ellipse cx="12" cy="12" rx="16" ry="4.5" fill="none" stroke="currentColor" stroke-width="2.5" transform="rotate(35 12 12)"/>
            </g>
            <text x="44" y="29" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="28" fill="currentColor" letter-spacing="-1.5">telcel</text>
            <text x="126" y="14" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="8" fill="currentColor">®</text>
        </svg>
        <div class="loader-bar-container">
            <div class="loader-bar-fill"></div>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const RevealOnScroll = ({ children, delay = "", className = "" }) => {
            const domRef = useRef();
            const [isVisible, setVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    if (entries[0].isIntersecting) {
                        setVisible(true);
                        observer.unobserve(domRef.current);
                    }
                }, { threshold: 0.1 });
                if (domRef.current) observer.observe(domRef.current);
                return () => { if(domRef.current) observer.unobserve(domRef.current); }
            }, []);
            return (
                <div ref={domRef} className={`transition-all duration-1000 transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'} ${delay} ${className}`}>
                    {children}
                </div>
            );
        };

        // Icono de Telcel (Isotipo de Esfera con Órbitas y Logotipo)
        const TelcelLogo = ({ className }) => (
            <svg viewBox="0 0 140 40" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
                {/* Símbolo / Isotipo (Esfera y Órbitas) */}
                <g transform="translate(10, 8)">
                    {/* Esfera central */}
                    <circle cx="12" cy="12" r="8" fill="currentColor"/>
                    {/* Órbita 1 */}
                    <ellipse cx="12" cy="12" rx="16" ry="4.5" fill="none" stroke="currentColor" strokeWidth="2.5" transform="rotate(-35 12 12)"/>
                    {/* Órbita 2 */}
                    <ellipse cx="12" cy="12" rx="16" ry="4.5" fill="none" stroke="currentColor" strokeWidth="2.5" transform="rotate(35 12 12)"/>
                </g>
                {/* Tipografía / Logotipo */}
                <text x="44" y="29" fontFamily="Arial, Helvetica, sans-serif" fontWeight="900" fontSize="28" fill="currentColor" letterSpacing="-1.5">telcel</text>
                {/* Símbolo de Marca Registrada */}
                <text x="126" y="14" fontFamily="Arial, Helvetica, sans-serif" fontWeight="bold" fontSize="8" fill="currentColor">®</text>
            </svg>
        );

        const App = () => {
            const [language, setLanguage] = useState('ES');
            const [isPlaying, setIsPlaying] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isConfirmed, setIsConfirmed] = useState(false);
            const [guestName, setGuestName] = useState('');
            const [guestCompany, setGuestCompany] = useState('');
            
            // Estado para el modal de demo de RSVP
            const [demoFormStatus, setDemoFormStatus] = useState('form');
            
            const eventIdStr = "telcel-investor-2026"; 
            const urlParams = new URLSearchParams(window.location.search);
            const guestUid = urlParams.get('u') || '';
            const audioRef = useRef(null);

            // 🔴 FASE 4: PROTECCIÓN ANTI-ROBO EN REACT
            useEffect(() => {
                const preventAction = (e) => e.preventDefault();
                document.addEventListener('contextmenu', preventAction);
                document.addEventListener('selectstart', preventAction);
                document.addEventListener('dragstart', preventAction);
                return () => {
                    document.removeEventListener('contextmenu', preventAction);
                    document.removeEventListener('selectstart', preventAction);
                    document.removeEventListener('dragstart', preventAction);
                };
            }, []);

            // Simulación de Extracción VIP
            useEffect(() => {
                if(guestUid) {
                    fetch(`https://firestore.googleapis.com/v1/projects/panel-de-control-intelig-db278/databases/(default)/documents/eventos/${eventIdStr}/invitados/${guestUid}`)
                    .then(res => res.json())
                    .then(data => {
                        if(data && data.fields && data.fields.name) {
                            setGuestName(data.fields.name.stringValue);
                            if(data.fields.company) {
                                setGuestCompany(data.fields.company.stringValue);
                            }
                        }
                    }).catch(err => console.log("Guest no encontrado"));
                }
            }, [guestUid]);

            const toggleLanguage = () => setLanguage(prev => prev === 'ES' ? 'EN' : 'ES');

            const toggleAudio = () => {
                if (isPlaying) audioRef.current.pause();
                else audioRef.current.play().catch(e => console.log("Interacción requerida"));
                setIsPlaying(!isPlaying);
            };

            const handleGPS = (address) => {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                const isAndroid = /android/i.test(navigator.userAgent);
                const encodedAddress = encodeURIComponent(address);
                if (isIOS) { window.location.href = `maps://?q=${encodedAddress}`; } 
                else if (isAndroid) { window.location.href = `geo:0,0?q=${encodedAddress}`; } 
                else { window.open(`https://maps.google.com/?q=${encodedAddress}`, '_blank'); }
            };

            const handleAddToCalendar = () => {
                const icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:Telcel Investor Summit 2026\nDESCRIPTION:Convención Anual de Inversionistas y Nuevos Lanzamientos.\nLOCATION:Centro Citibanamex, CDMX\nDTSTART:20261015T140000Z\nDTEND:20261015T220000Z\nEND:VEVENT\nEND:VCALENDAR`;
                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.setAttribute('download', 'Telcel_Summit_2026.ics');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="relative min-h-screen w-full font-sans bg-white text-telcel-dark">
                    
                    <audio ref={audioRef} id="bg-music" src="https://baulia.com/cumple_formal/demos/tema_corporativo_telcel.mp3" loop preload="auto" />

                    {/* NAVEGACIÓN SUPERIOR (Sticky) */}
                    <nav className="fixed top-0 left-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center transition-all">
                        <TelcelLogo className="w-28 text-telcel-blue" />
                        <div className="flex items-center gap-4">
                            <button onClick={toggleAudio} className="text-telcel-gray hover:text-telcel-blue transition-colors flex items-center justify-center w-8 h-8 rounded-full border border-gray-200">
                                {isPlaying ? (
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                                ) : (
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                )}
                            </button>
                            <button onClick={toggleLanguage} className="text-xs font-semibold text-telcel-gray hover:text-telcel-blue transition-colors px-3 py-1 border border-gray-200 rounded-md">
                                {language === 'ES' ? 'ENG' : 'ESP'}
                            </button>
                        </div>
                    </nav>

                    {/* HERO SECTION CORPORATIVA */}
                    <header className="relative w-full h-[90vh] min-h-[600px] flex items-center justify-center overflow-hidden bg-corporate-gradient pt-16">
                        <div 
                            className="absolute inset-0 w-full h-full bg-cover bg-center opacity-30 mix-blend-overlay animate-slow-zoom"
                            style={{ backgroundImage: "url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2000&auto=format&fit=crop')" }}
                        ></div>
                        <div className="absolute inset-0 bg-gradient-to-t from-[#002855] to-transparent opacity-90"></div>

                        <div className="relative z-10 w-full max-w-5xl px-6 flex flex-col items-start md:items-center md:text-center animate-fade-in-up">
                            <span className="text-telcel-cyan font-semibold tracking-[0.2em] text-xs md:text-sm uppercase mb-4 block border border-telcel-cyan/30 px-4 py-1.5 rounded-full bg-telcel-cyan/10">
                                {language === 'ES' ? 'Evento Exclusivo para Inversionistas' : 'Exclusive Investor Event'}
                            </span>
                            
                            <h1 className="text-4xl md:text-6xl lg:text-7xl font-extrabold text-white leading-tight tracking-tight mb-6">
                                Telcel Investor <br className="hidden md:block" />
                                <span className="text-cyan-gradient">Summit 2026</span>
                            </h1>
                            
                            <p className="text-base md:text-xl text-gray-300 font-light max-w-2xl leading-relaxed mb-10">
                                {language === 'ES' 
                                    ? 'Descubra la próxima frontera de la conectividad, las estrategias de expansión 5G y las oportunidades de mercado que definirán el futuro de las telecomunicaciones en América Latina.' 
                                    : 'Discover the next frontier of connectivity, 5G expansion strategies, and market opportunities that will define the future of telecommunications in Latin America.'}
                            </p>

                            {/* SALUDO VIP (Acreditación personalizada) */}
                            {guestName && (
                                <div className="bg-white/10 backdrop-blur-md border border-white/20 rounded-xl p-5 md:p-6 w-full max-w-md flex flex-col md:flex-row items-center md:items-start gap-4 text-left animate-fade-in-up delay-400">
                                    <div className="w-12 h-12 bg-telcel-cyan rounded-full flex items-center justify-center shrink-0">
                                        <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                                    </div>
                                    <div className="text-center md:text-left">
                                        <p className="text-telcel-cyan text-[10px] uppercase tracking-widest font-bold mb-1">Pase Especial Para:</p>
                                        <p className="text-white font-semibold text-xl italic">{guestName}</p>
                                        <p className="text-gray-400 text-sm">{guestCompany}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </header>

                    {/* CONTENIDO PRINCIPAL */}
                    <main className="w-full bg-telcel-light relative z-20">
                        
                        {/* SECCIÓN 1: VISIÓN Y METAS (Overview) */}
                        <section className="py-20 md:py-28 px-6 max-w-6xl mx-auto">
                            <RevealOnScroll>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
                                    <div>
                                        <h2 className="text-3xl md:text-4xl font-bold text-telcel-blue mb-6 leading-tight">
                                            {language === 'ES' ? 'Conectando el futuro de los negocios' : 'Connecting the future of business'}
                                        </h2>
                                        <p className="text-telcel-gray leading-relaxed mb-6">
                                            {language === 'ES' 
                                                ? 'En nuestra convención anual, presentaremos los resultados financieros del ejercicio 2025 y desvelaremos la hoja de ruta estratégica para la consolidación de nuestra red 5G a nivel nacional e internacional.'
                                                : 'At our annual convention, we will present the financial results for fiscal year 2025 and unveil the strategic roadmap for the consolidation of our 5G network nationally and internationally.'}
                                        </p>
                                        <ul className="space-y-4">
                                            {[
                                                language === 'ES' ? 'Presentación de Resultados H1 2026' : 'H1 2026 Results Presentation',
                                                language === 'ES' ? 'Despliegue de Infraestructura 5G Advanced' : '5G Advanced Infrastructure Deployment',
                                                language === 'ES' ? 'Nuevas Alianzas Estratégicas B2B' : 'New B2B Strategic Alliances'
                                            ].map((item, i) => (
                                                <li key={i} className="flex items-center gap-3 text-sm font-medium text-telcel-dark">
                                                    <svg className="w-5 h-5 text-telcel-cyan shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"></path></svg>
                                                    {item}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                    <div className="relative">
                                        <div className="aspect-[4/3] rounded-2xl overflow-hidden shadow-corporate relative z-10">
                                            <img src="https://images.unsplash.com/photo-1551434678-e076c223a692?q=80&w=800&auto=format&fit=crop" alt="Corporate Meeting" className="w-full h-full object-cover" />
                                        </div>
                                        <div className="absolute -bottom-6 -left-6 w-32 h-32 bg-telcel-cyan rounded-2xl opacity-10 z-0"></div>
                                        <div className="absolute -top-6 -right-6 w-32 h-32 border-2 border-telcel-blue rounded-2xl opacity-10 z-0"></div>
                                    </div>
                                </div>
                            </RevealOnScroll>
                        </section>

                        {/* SECCIÓN 2: SPEAKERS / LÍDERES */}
                        <section className="py-20 bg-white border-y border-gray-100 px-6">
                            <div className="max-w-6xl mx-auto">
                                <RevealOnScroll>
                                    <div className="text-center mb-16">
                                        <h2 className="text-3xl md:text-4xl font-bold text-telcel-blue mb-4">Keynote Speakers</h2>
                                        <p className="text-telcel-gray">{language === 'ES' ? 'Conozca la visión de nuestros líderes' : 'Discover the vision of our leaders'}</p>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        {[
                                            { name: "Daniel Hajj", role: "Director General Telcel", img: "https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=400&auto=format&fit=crop" },
                                            { name: "Marcela Velasco", role: "VP de Mercadotecnia", img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?q=80&w=400&auto=format&fit=crop" },
                                            { name: "Arturo Elías Ayub", role: "Director Alianzas Estratégicas", img: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?q=80&w=400&auto=format&fit=crop" }
                                        ].map((speaker, i) => (
                                            <div key={i} className="bg-telcel-light rounded-xl p-6 text-center shadow-sm hover:shadow-corporate transition-shadow duration-300 border border-gray-100">
                                                <div className="w-24 h-24 mx-auto rounded-full overflow-hidden mb-4 border-4 border-white shadow-sm">
                                                    <img src={speaker.img} alt={speaker.name} className="w-full h-full object-cover" />
                                                </div>
                                                <h3 className="text-lg font-bold text-telcel-blue">{speaker.name}</h3>
                                                <p className="text-sm text-telcel-cyan font-medium mt-1">{speaker.role}</p>
                                            </div>
                                        ))}
                                    </div>
                                </RevealOnScroll>
                            </div>
                        </section>

                        {/* SECCIÓN 3: AGENDA EJECUTIVA */}
                        <section className="py-20 md:py-28 px-6 max-w-4xl mx-auto">
                            <RevealOnScroll>
                                <div className="mb-16 md:text-center">
                                    <h2 className="text-3xl md:text-4xl font-bold text-telcel-blue mb-4">Programa Oficial</h2>
                                    <p className="text-telcel-gray">{language === 'ES' ? 'Jueves, 15 de Octubre de 2026' : 'Thursday, October 15, 2026'}</p>
                                </div>

                                <div className="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-gray-200 before:to-transparent">
                                    {[
                                        { time: "09:00", title: "Acreditación y Networking Breakfast", desc: "Registro de invitados VIP y desayuno de bienvenida en el salón principal." },
                                        { time: "10:30", title: "Inauguración y Resultados Financieros", desc: "Keynote principal a cargo de la Dirección General sobre el desempeño 2025-2026." },
                                        { time: "12:00", title: "Panel: El Ecosistema 5G en México", desc: "Discusión con expertos de la industria sobre monetización e infraestructura." },
                                        { time: "14:00", title: "Almuerzo Ejecutivo y Mesas de Negocios", desc: "Espacio exclusivo para inversionistas y miembros de la junta directiva." },
                                        { time: "16:00", title: "Demostración de Nuevas Tecnologías", desc: "Acceso privado a la sala de exhibición de dispositivos IoT y B2B." }
                                    ].map((item, idx) => (
                                        <div key={idx} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                            <div className="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-telcel-blue text-white shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 transition-colors group-hover:bg-telcel-cyan">
                                                <div className="w-2 h-2 bg-white rounded-full"></div>
                                            </div>
                                            <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white p-6 rounded-xl border border-gray-100 shadow-sm hover:shadow-corporate transition-all">
                                                <div className="flex items-center justify-between mb-2">
                                                    <span className="text-sm font-bold text-telcel-cyan">{item.time}</span>
                                                </div>
                                                <h3 className="font-bold text-telcel-dark text-lg mb-2">{item.title}</h3>
                                                <p className="text-sm text-telcel-gray leading-relaxed">{item.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </RevealOnScroll>
                        </section>

                        {/* SECCIÓN 4: LOGÍSTICA Y SEDE */}
                        <section className="py-20 bg-telcel-blue text-white px-6 relative overflow-hidden">
                            {/* Patrón de fondo sutil */}
                            <div className="absolute inset-0 opacity-5" style={{ backgroundImage: "radial-gradient(#ffffff 1px, transparent 1px)", backgroundSize: "30px 30px" }}></div>

                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-telcel-dark/60 backdrop-blur-sm animate-fade-in-up">
                            <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl relative">
                                {/* Header Modal */}
                                <div className="bg-telcel-blue px-6 py-4 flex justify-between items-center">
                                    <h3 className="text-white font-bold tracking-wide">Registro Oficial</h3>
                                    <button onClick={() => { setIsModalOpen(false); setDemoFormStatus('form'); }} className="text-white/70 hover:text-white transition-colors">
                                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                
                                {/* Body Modal */}
                                <div className="p-8">
                                    {demoFormStatus === 'form' ? (
                                        <form onSubmit={(e) => { e.preventDefault(); setDemoFormStatus('success'); }} className="space-y-5">
                                            <div className="text-center mb-4 border-b border-gray-100 pb-4">
                                                <h2 className="font-sans text-2xl text-telcel-blue font-bold mb-1">MODO DE PRUEBA</h2>
                                                <p className="font-sans text-xs text-telcel-gray tracking-wide">Completa los datos para ver la demostración</p>
                                            </div>
                                            
                                            <div>
                                                <label className="block text-xs font-semibold text-telcel-gray uppercase tracking-widest mb-2">Nombre y Apellido</label>
                                                <input type="text" required className="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-telcel-cyan focus:ring-1 focus:ring-telcel-cyan bg-gray-50" placeholder="Ej. Juan Pérez" />
                                            </div>
                                            
                                            <div>
                                                <label className="block text-xs font-semibold text-telcel-gray uppercase tracking-widest mb-2">Pases a confirmar</label>
                                                <select required className="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-telcel-cyan focus:ring-1 focus:ring-telcel-cyan bg-gray-50 appearance-none cursor-pointer">
                                                    <option value="1">1 Pase</option>
                                                    <option value="2">2 Pases</option>
                                                    <option value="3">3 Pases</option>
                                                </select>
                                            </div>
                                            
                                            <div className="pt-4">
                                                <button type="submit" className="w-full bg-telcel-blue text-white font-bold rounded-lg py-4 hover:bg-telcel-cyan transition-colors text-sm tracking-wide">
                                                    Generar Pase QR
                                                </button>
                                            </div>
                                        </form>
                                    ) : (
                                        <div className="flex flex-col items-center text-center py-6 animate-fade-in-up">
                                            <div className="w-20 h-20 bg-green-50 text-green-500 border border-green-100 rounded-full flex items-center justify-center mb-6">
                                                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>
                                            </div>
                                            <h2 className="font-sans text-2xl text-telcel-blue font-bold mb-4">¡Excelente!</h2>
                                            <p className="font-sans text-sm text-telcel-gray leading-relaxed max-w-sm">
                                                En una versión real, esto le generaría un código QR único a tu invitado. <br/><br/>
                                                <strong className="text-telcel-cyan font-bold text-base block mt-2">¡Crea tu propio evento en Baulia para desbloquear esta función!</strong>
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* BOTÓN DE COMPRA FLOTANTE */}
                    <button
                        onClick={() => {
                            if (window !== window.parent) {
                                window.parent.postMessage('open_checkout', '*');
                            } else {
                                window.location.href = 'https://baulia.com/#planes';
                            }
                        }}
                        className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[9999] bg-gradient-to-r from-telcel-blue to-gray-900 text-white px-6 md:px-8 py-3.5 md:py-4 rounded-full font-sans font-bold text-[10px] md:text-xs tracking-[0.2em] uppercase shadow-[0_10px_25px_rgba(0,40,85,0.5)] hover:scale-105 transition-all duration-300 border border-white/20 flex items-center gap-2 whitespace-nowrap"
                    >
                        ✨ Adquirir esta tecnología
                    </button>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script> document.addEventListener('contextmenu', e => e.preventDefault()); document.onkeydown = function(e) { if(e.keyCode == 123) { return false; } if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; } if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; } if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; } if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; } } </script>
    <style> body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; } </style>
    <script>
  window.addEventListener('message', function(event) {
    if (event.data === 'pause_baulia_audio') {
      var medias = document.querySelectorAll('audio, video');
      medias.forEach(function(media) { media.pause(); });
    }
  });
</script>
</body>
</html>
