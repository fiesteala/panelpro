            return (

        // 🔴 FASE 2: LÓGICA DE ALTA COSTURA (MAPAS Y CALENDARIO)
        const handleGPS = (address) => {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const isAndroid = /android/i.test(navigator.userAgent);
            const encodedAddress = encodeURIComponent(address);
            
            if (isIOS) {
                window.location.href = `maps://?q=${encodedAddress}`;
            } else if (isAndroid) {
                window.location.href = `geo:0,0?q=${encodedAddress}`;
            } else {
                window.open(`https://maps.google.com/?q=${encodedAddress}`, '_blank');
            }
        };

DESCRIPTION:Acompáñame a celebrar mi cumpleaños estilo Minecraft.
LOCATION:Pizza Planet, Calle Falsa 123
DTSTART:20261024T160000
DTEND:20261024T200000
END:VEVENT
END:VCALENDAR`;
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'Cumple_Santiago_Minecraft.ics');
            document.body.appendChild(link);
            link.click();

        function App() {
            const [hasStarted, setHasStarted] = useState(false);
            const [gameState, setGameState] = useState('start');
            const [blockHealth, setBlockHealth] = useState(5);
            const [particles, setParticles] = useState([]);
            
            // FASE 3: Modales y Copiado Inteligente
            const [showGifts, setShowGifts] = useState(false);
            const [copied, setCopied] = useState(false);
            
            // FASE 4: RSVP Demo
            const [showRSVPDemo, setShowRSVPDemo] = useState(false);
            const [demoFormStatus, setDemoFormStatus] = useState('form');
            
            // 🔴 NUEVO ESTADO: Visor de Galería (Lightbox)
            const [selectedPhoto, setSelectedPhoto] = useState(null);

            const [timeLeft, setTimeLeft] = useState({});
            const [isMuted, setIsMuted] = useState(false);
            const audioRef = useRef(null);

            // 🔴 FASE 1: EXTRACCIÓN VIP INTELIGENTE (SILENCIOSA)
            const [guestName, setGuestName] = useState('INVITADO VIP');
            const EVENT_ID = "minecraft-santiago";

            useEffect(() => {
                const fetchGuestData = async () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const guestUid = urlParams.get('u');
                    if (guestUid) {
                        try {
                            const response = await fetch(`https://firestore.googleapis.com/v1/projects/panel-de-control-intelig-db278/databases/(default)/documents/eventos/${EVENT_ID}/invitados/${guestUid}`);
                            if (response.ok) {
                                const data = await response.json();
                                if (data.fields && data.fields.name && data.fields.name.stringValue) {
                                    setGuestName(data.fields.name.stringValue.toUpperCase());
                                }
                            }
                        } catch (error) {}
                    }
                };
                fetchGuestData();
            }, []);

            // 🔴 FASE 4: OÍDO MAESTRO BAULIA (CONEXIÓN REACT-HTML)
            useEffect(() => {
                const oidoBoveda = (event) => {
                    if (event.data === 'pause_baulia_audio') {
                        if (audioRef.current) {
                            audioRef.current.pause();
                            setIsMuted(true);
                        }
                    }
                };
                window.addEventListener('message', oidoBoveda);
                return () => window.removeEventListener('message', oidoBoveda);
            }, []);

            // 🔴 FASE 4: PROTECCIÓN ANTI-ROBO (Blindada)
            useEffect(() => {
                const preventAction = (e) => {
                    if (e.target && e.target.tagName && ['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) return;
                    e.preventDefault();
                };
                document.addEventListener('contextmenu', preventAction);
                document.addEventListener('selectstart', preventAction);
                document.addEventListener('dragstart', preventAction);
                
                return () => {
                    document.removeEventListener('contextmenu', preventAction);
                    document.removeEventListener('selectstart', preventAction);
                    document.removeEventListener('dragstart', preventAction);
                };
            }, []);

            const partyData = {
                name: "SANTIAGO",
                age: "10",
                date: "24 de Octubre",
                dateISO: "2026-10-24T16:00:00", 
                time: "16:00 - 20:00",
                location: "Pizza Planet, Calle Falsa 123"
            };

            // FASE 2: Cuenta Regresiva Dinámica
            useEffect(() => {
                const calculateTimeLeft = () => {
                    const difference = +new Date(partyData.dateISO) - +new Date();
                    let tLeft = {};
                    if (difference > 0) {
                        tLeft = {
                            DÍAS: Math.floor(difference / (1000 * 60 * 60 * 24)),
                            HRS: Math.floor((difference / (1000 * 60 * 60)) % 24),
                            MIN: Math.floor((difference / 1000 / 60) % 60),
                            SEG: Math.floor((difference / 1000) % 60),
                        };
                    }
                    return tLeft;
                };
                setTimeLeft(calculateTimeLeft());
                const timer = setInterval(() => setTimeLeft(calculateTimeLeft()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 🔴 CORRECCIÓN DE BUG DE MEMORIA (MEMORY LEAK AUDIO CONTEXT)
            const playHitSound = () => {
                if (isMuted) return;
                try {
                  const AudioContext = window.AudioContext || window.webkitAudioContext;
                  if (!AudioContext) return;
                  const ctx = new AudioContext();
                  const osc = ctx.createOscillator();
                  const gain = ctx.createGain();
                  osc.type = 'square';
                  osc.frequency.setValueAtTime(150, ctx.currentTime);
                  osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
                  gain.gain.setValueAtTime(0.1, ctx.currentTime);
                  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                  osc.connect(gain);
                  gain.connect(ctx.destination);
                  osc.start();
                  osc.stop(ctx.currentTime + 0.1);
                  setTimeout(() => {
                      if(ctx.state !== 'closed') { ctx.close(); }
                  }, 200);
                } catch (e) {}
            };

            const handleStartGame = () => {
                setHasStarted(true);
                if (audioRef.current && !isMuted) {
                  audioRef.current.volume = 0.5;
                  audioRef.current.play().catch(e => console.warn(e));
                }
            };

            const toggleMute = (e) => {
                e.stopPropagation();
                if (audioRef.current) {
                  const newMutedState = !isMuted;
                  audioRef.current.muted = newMutedState;
                  setIsMuted(newMutedState);
                  if (!newMutedState) audioRef.current.play().catch(e => {});
                }
            };

            const handleMineBlock = (e) => {
                if (blockHealth <= 0) return;
                playHitSound();
                if (navigator.vibrate) {
                    try { navigator.vibrate(50); } catch(err){}
                }
                const rect = e.target.getBoundingClientRect();
                spawnParticles(e.clientX - rect.left, e.clientY - rect.top);
                const newHealth = blockHealth - 1;
                setBlockHealth(newHealth);
                if (newHealth <= 0) {
                  setTimeout(() => setGameState('open'), 500);
                } else {
                  setGameState('mining');
                  setTimeout(() => setGameState('start'), 100);
                }
            };

            const spawnParticles = (x, y) => {
                const newParticles = [];
                for (let i = 0; i < 5; i++) {
                  newParticles.push({
                      id: Date.now() + i,
                      x: x + (Math.random() - 0.5) * 40, y: y + (Math.random() - 0.5) * 40,
                      vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10 - 5,
                  });
                }
                setParticles(prev => [...prev, ...newParticles]);
                setTimeout(() => setParticles(prev => prev.slice(5)), 1000);
            };

            // 🔴 FASE 3: COPIADO SEGURO
            const handleCopy = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000); 
                } catch (err) {
                    console.error('Error al copiar', err);
                }
                document.body.removeChild(textArea);
            };

            const handleRSVPSubmit = (e) => {
                e.preventDefault();
                setDemoFormStatus('success');
            };

            const closeRSVPModal = () => {
                setShowRSVPDemo(false);
                setTimeout(() => setDemoFormStatus('form'), 300);
            };

            return (
                <div className="min-h-screen font-pixel relative selection:bg-green-500 selection:text-black">
                
                {/* 🔴 BOTÓN FLOTANTE DE COMPRA */}
                <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[9999] pointer-events-none px-4 w-full flex justify-center">
                  <button 
                    onClick={() => { 
                      if (window !== window.parent) { 
                        window.parent.postMessage('open_checkout', '*'); 
                      } else { 
                        window.location.href = 'https://baulia.com/#planes'; 
                      } 
                    }} 
                    className="pointer-events-auto minecraft-btn bg-[#8B8B8B] text-white px-6 py-3 border-2 border-black animate-pulse-glow hover:bg-[#9E9E9E] active:translate-y-1 text-xl md:text-2xl font-bold whitespace-nowrap shadow-[0_10px_25px_rgba(0,0,0,0.8)]"
                  >
                    ✨ Adquirir esta tecnología
                  </button>
                </div>

                <audio ref={audioRef} id="musica" loop preload="auto">
                    <source src="https://github.com/fiesteala/minecraft/raw/refs/heads/main/Minecraft.mp3" type="audio/mpeg" />
                </audio>

                {/* FONDO FIJO CON EFECTO PARALLAX NATURAL */}
                <div className="fixed inset-0 bg-blue-400 z-0 overflow-hidden pointer-events-none">
                    <div className="cloud animate-cloud" style={{top: '10%', left: '-10%'}}></div>
                    <div className="cloud animate-cloud-slow" style={{top: '25%', left: '-20%', animationDelay: '5s', transform: 'scale(0.8)'}}></div>
                    <div className="cloud animate-cloud" style={{top: '15%', left: '-10%', animationDelay: '12s', transform: 'scale(1.2)'}}></div>
                    <div className="absolute bottom-0 w-full h-1/3 bg-green-600 border-t-8 border-green-800"></div>
                </div>

                {/* EFECTO UNBOXING (Bloque a minar) */}
                {!hasStarted && (
                    <div className="absolute inset-0 z-[1000] flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                        <h1 className="text-5xl text-center mb-8 text-white drop-shadow-[4px_4px_0_#000]">MINECRAFT<br/>PARTY</h1>
                        <button onClick={handleStartGame} className="minecraft-btn bg-green-600 text-white text-3xl px-8 py-4 border-2 border-white animate-pulse-glow hover:bg-green-500 active:translate-y-1">
                            ENTRAR AL MUNDO
                        </button>
                    </div>
                )}

                {hasStarted && (
                    <React.Fragment>
                    <button onClick={toggleMute} className="fixed top-4 right-4 z-40 p-2 bg-black/50 hover:bg-black/70 rounded border-2 border-white/50 text-white transition-colors">
                        {isMuted ? <VolumeX size={24} /> : <Volume2 size={24} />}
                    </button>

                    {gameState !== 'open' ? (
                        <div className="relative z-10 flex flex-col items-center justify-center h-screen p-4 overflow-hidden">
                            <h1 className="text-4xl md:text-6xl text-center mb-8 text-white drop-shadow-[4px_4px_0_rgba(0,0,0,0.8)] animate-float leading-tight">
                                CUMPLEAÑOS DE<br/>
                                <span className="text-yellow-400">{partyData.name}</span>
                            </h1>
                            <div className="relative cursor-pointer select-none" onClick={handleMineBlock}>
                                <div className={`w-40 h-40 relative transform transition-transform duration-100 ${gameState === 'mining' ? 'scale-95' : 'scale-100'}`}>
                                    <div className="w-full h-full dirt-texture border-4 border-black box-border relative">
                                        <div className="absolute top-0 left-0 w-full h-1/3 grass-top"></div>
                                        {blockHealth < 5 && blockHealth > 3 && <div className="absolute inset-0 crack-1"></div>}
                                        {blockHealth <= 3 && blockHealth > 1 && <div className="absolute inset-0 crack-2"></div>}
                                        {blockHealth <= 1 && <div className="absolute inset-0 crack-3"></div>}
                                    </div>
                                </div>
                                {particles.map(p => (
                                    <div key={p.id} className="absolute w-2 h-2 bg-yellow-900 pointer-events-none" style={{ left: 0, top: 0, transform: `translate(${p.x}px, ${p.y}px)` }} />
                                ))}
                            </div>
                            <p className="mt-8 text-2xl text-center bg-black/50 p-2 rounded text-white animate-pulse">
                                {blockHealth > 0 ? "¡PICA EL BLOQUE!" : "¡ABRIENDO!"}
                            </p>
                            <div className="mt-4 w-64 h-6 bg-gray-800 border-2 border-white rounded-full overflow-hidden">
                                <div className="h-full bg-green-500 transition-all duration-200" style={{ width: `${(1 - blockHealth/5) * 100}%` }}></div>
                            </div>
                        </div>
                    ) : (
                        <div className="relative z-10 min-h-screen w-full flex flex-col items-center justify-center p-4 animate-fadeIn pb-32">
                           
                            <div className="w-full flex flex-col items-center justify-center my-auto py-12">
                               
                                {/* 🔴 CONTENEDOR PRINCIPAL ADAPTATIVO */}
                                <div className="minecraft-panel p-6 md:p-10 w-full max-w-md md:max-w-4xl relative animate-float mx-auto shrink-0 mt-8 md:mt-16 shadow-2xl">

    <!-- 🔴 PROTECCIÓN ANTI-ROBO HTML (Atajos de teclado y F12) -->
    <script>
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
               (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
    </script>
    <script>
  // El "oído" que escucha a la Landing Page
  window.addEventListener('message', function(event) {
    if (event.data === 'pause_baulia_audio') {
      
      // 1. Apaga cualquier audio o video clásico que esté sonando
      var medias = document.querySelectorAll('audio, video');
      medias.forEach(function(media) { 
        media.pause(); 
      });

    }
  });
</script>
