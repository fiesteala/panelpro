<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Minecraft - DEMO Baulia</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        .font-pixel { font-family: 'VT323', monospace; }
        .minecraft-btn {
            box-shadow: inset -4px -4px 0px 0px rgba(0,0,0,0.5), inset 4px 4px 0px 0px rgba(255,255,255,0.5);
            image-rendering: pixelated;
        }
        .minecraft-btn:active {
            box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.5), inset -4px -4px 0px 0px rgba(255,255,255,0.5);
            transform: translateY(2px);
        }
        .minecraft-panel {
            background-color: #C6C6C6;
            border: 4px solid #000;
            box-shadow: inset -4px -4px 0px 0px #555, inset 4px 4px 0px 0px #FFF;
            color: #202020;
        }
        .dirt-texture {
            background-color: #5d4037;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%233e2723' fill-opacity='0.4' fill-rule='evenodd'%3E%3Cpath d='M0 0h40v40H0V0zm20 20h20v20H20V20zM0 20h20v20H0V20zM20 0h20v20H20V0z'/%3E%3C/g%3E%3C/svg%3E");
        }
        .grass-top { background-color: #388e3c; border-bottom: 4px solid #1b5e20; }
        .crack-1 { clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%); background: rgba(0,0,0,0.1); }
        .crack-2 { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%); background: rgba(0,0,0,0.2); }
        .crack-3 { clip-path: polygon(40% 0%, 60% 0%, 100% 40%, 100% 60%, 60% 100%, 40% 100%, 0% 60%, 0% 40%); background: rgba(0,0,0,0.3); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(52, 211, 153, 0); } 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }
        .animate-fadeIn { animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .cloud { width: 100px; height: 40px; background: rgba(255, 255, 255, 0.8); position: absolute; opacity: 0.8; box-shadow: 20px 10px 0 0 rgba(255, 255, 255, 0.8); }
        .cloud::after { content: ''; position: absolute; width: 40px; height: 40px; top: -20px; left: 20px; background: rgba(255, 255, 255, 0.8); }
        @keyframes moveClouds { 0% { transform: translateX(-150px); } 100% { transform: translateX(110vw); } }
        .animate-cloud { animation: moveClouds 20s linear infinite; }
        .animate-cloud-slow { animation: moveClouds 35s linear infinite; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ path, className, size = 24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>);
        const MapPin = (props) => <Icon {...props} path={<><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>} />;
        const Calendar = (props) => <Icon {...props} path={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>} />;
        const Clock = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
        const X = (props) => <Icon {...props} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />;
        const Volume2 = (props) => <Icon {...props} path={<><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></>} />;
        const VolumeX = (props) => <Icon {...props} path={<><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/></>} />;
        const Gift = (props) => <Icon {...props} path={<><polyline points="20 12 20 22 4 22 4 12"/><rect width="20" height="5" x="2" y="7"/><line x1="12" x2="12" y1="22" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></>} />;
        const CheckSquare = (props) => <Icon {...props} path={<><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>} />;

        function App() {
            const [hasStarted, setHasStarted] = useState(false);
            const [gameState, setGameState] = useState('start');
            const [blockHealth, setBlockHealth] = useState(5);
            const [particles, setParticles] = useState([]);
            const [showGifts, setShowGifts] = useState(false);
            const [showRSVPDemo, setShowRSVPDemo] = useState(false);
            const [isRsvpSubmitted, setIsRsvpSubmitted] = useState(false); // 🔴 ESTADO DEL FALSO SUBMIT
            const [showMapOptions, setShowMapOptions] = useState(false); // 🔴 ESTADO PARA MODAL DE MAPAS
            const [timeLeft, setTimeLeft] = useState({});
            const [isMuted, setIsMuted] = useState(false);
            const audioRef = useRef(null);

            // 🔴 PROTECCIÓN ANTI-ROBO
            useEffect(() => {
                const preventDefault = (e) => e.preventDefault();
                document.addEventListener('contextmenu', preventDefault);
                document.addEventListener('selectstart', preventDefault);
                document.addEventListener('dragstart', preventDefault);
                
                return () => {
                    document.removeEventListener('contextmenu', preventDefault);
                    document.removeEventListener('selectstart', preventDefault);
                    document.removeEventListener('dragstart', preventDefault);
                };
            }, []);

            const partyData = {
                name: "SANTIAGO",
                age: "10",
                date: "24 de Octubre",
                dateISO: "2026-10-24T16:00:00", 
                time: "16:00 - 20:00",
                location: "Pizza Planet, Calle Falsa 123",
                giftInfo: {
                    message: "El mejor regalo es tu presencia, pero si quieres obsequiarme algo:",
                    envelope: "Lluvia de Sobres (Efectivo)"
                }
            };

            useEffect(() => {
                const calculateTimeLeft = () => {
                const difference = +new Date(partyData.dateISO) - +new Date();
                let tLeft = {};
                if (difference > 0) {
                    tLeft = {
                    DÍAS: Math.floor(difference / (1000 * 60 * 60 * 24)),
                    HRS: Math.floor((difference / (1000 * 60 * 60)) % 24),
                    MIN: Math.floor((difference / 1000 / 60) % 60),
                    SEG: Math.floor((difference / 1000) % 60),
                    };
                }
                return tLeft;
                };
                setTimeLeft(calculateTimeLeft());
                const timer = setInterval(() => setTimeLeft(calculateTimeLeft()), 1000);
                return () => clearInterval(timer);
            }, []);

            const playHitSound = () => {
                if (isMuted) return;
                try {
                  const AudioContext = window.AudioContext || window.webkitAudioContext;
                  if (!AudioContext) return;
                  const ctx = new AudioContext();
                  const osc = ctx.createOscillator();
                  const gain = ctx.createGain();
                  osc.type = 'square';
                  osc.frequency.setValueAtTime(150, ctx.currentTime);
                  osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
                  gain.gain.setValueAtTime(0.1, ctx.currentTime);
                  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                  osc.connect(gain);
                  gain.connect(ctx.destination);
                  osc.start();
                  osc.stop(ctx.currentTime + 0.1);
                } catch (e) {}
            };

            const handleStartGame = () => {
                setHasStarted(true);
                if (audioRef.current) {
                  audioRef.current.volume = 0.5;
                  audioRef.current.play().catch(e => console.warn(e));
                }
            };

            const toggleMute = (e) => {
                e.stopPropagation();
                if (audioRef.current) {
                  const newMutedState = !isMuted;
                  audioRef.current.muted = newMutedState;
                  setIsMuted(newMutedState);
                  if (!newMutedState) audioRef.current.play().catch(e => {});
                }
            };

            const handleMineBlock = (e) => {
                if (blockHealth <= 0) return;
                playHitSound();
                if (navigator.vibrate) navigator.vibrate(50);
                const rect = e.target.getBoundingClientRect();
                spawnParticles(e.clientX - rect.left, e.clientY - rect.top);
                const newHealth = blockHealth - 1;
                setBlockHealth(newHealth);
                if (newHealth <= 0) {
                  setTimeout(() => setGameState('open'), 500);
                } else {
                  setGameState('mining');
                  setTimeout(() => setGameState('start'), 100);
                }
            };

            const spawnParticles = (x, y) => {
                const newParticles = [];
                for (let i = 0; i < 5; i++) {
                  newParticles.push({
                      id: Date.now() + i,
                      x: x + (Math.random() - 0.5) * 40, y: y + (Math.random() - 0.5) * 40,
                      vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10 - 5,
                  });
                }
                setParticles(prev => [...prev, ...newParticles]);
                setTimeout(() => setParticles(prev => prev.slice(5)), 1000);
            };

            // 🔴 HANDLER DEL FALSO SUBMIT
            const handleRSVPSubmit = (e) => {
                e.preventDefault();
                setIsRsvpSubmitted(true);
            };

            const closeRSVPModal = () => {
                setShowRSVPDemo(false);
                setTimeout(() => setIsRsvpSubmitted(false), 300); // Reseteamos al cerrar
            };

            return (
                <div className="min-h-screen font-pixel overflow-hidden relative selection:bg-green-500 selection:text-black">
                
                {/* 🔴 BOTÓN FLOTANTE CRÍTICO Z-9999 */}
                <button
                    onClick={() => window.parent.location.href = 'https://baulia.com/#planes'}
                    className="fixed bottom-12 left-1/2 transform -translate-x-1/2 z-[9999] bg-gradient-to-r from-blue-600 to-purple-600 text-white px-8 py-3 rounded-full font-sans font-bold text-lg shadow-[0_0_20px_rgba(59,130,246,0.6)] hover:scale-105 transition-transform flex items-center whitespace-nowrap"
                >
                    ✨ Adquirir esta tecnología
                </button>

                <audio ref={audioRef} id="musica" loop preload="auto">
                    <source src="https://github.com/fiesteala/minecraft/raw/refs/heads/main/Minecraft.mp3" type="audio/mpeg" />
                </audio>

                <div className="absolute inset-0 bg-blue-400 z-0 overflow-hidden pointer-events-none">
                    <div className="cloud animate-cloud" style={{top: '10%', left: '-10%'}}></div>
                    <div className="cloud animate-cloud-slow" style={{top: '25%', left: '-20%', animationDelay: '5s', transform: 'scale(0.8)'}}></div>
                    <div className="cloud animate-cloud" style={{top: '15%', left: '-10%', animationDelay: '12s', transform: 'scale(1.2)'}}></div>
                    <div className="absolute bottom-0 w-full h-1/3 bg-green-600 border-t-8 border-green-800"></div>
                </div>

                {!hasStarted && (
                    <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                    <h1 className="text-5xl text-center mb-8 text-white drop-shadow-[4px_4px_0_#000]">MINECRAFT<br/>PARTY</h1>
                    <button onClick={handleStartGame} className="minecraft-btn bg-green-600 text-white text-3xl px-8 py-4 border-2 border-white animate-pulse-glow hover:bg-green-500 active:translate-y-1">
                        ENTRAR AL MUNDO
                    </button>
                    </div>
                )}

                {hasStarted && (
                    <>
                    <button onClick={toggleMute} className="absolute top-4 right-4 z-40 p-2 bg-black/50 hover:bg-black/70 rounded border-2 border-white/50 text-white transition-colors">
                        {isMuted ? <VolumeX size={24} /> : <Volume2 size={24} />}
                    </button>

                    {gameState !== 'open' ? (
                        <div className="relative z-10 flex flex-col items-center justify-center h-screen p-4">
                        <h1 className="text-4xl md:text-6xl text-center mb-8 text-white drop-shadow-[4px_4px_0_rgba(0,0,0,0.8)] animate-float">
                            CUMPLEAÑOS DE<br/>
                            <span id="festejado" className="text-yellow-400">{partyData.name}</span>
                        </h1>
                        <div className="relative cursor-pointer select-none" onClick={handleMineBlock}>
                            <div className={`w-40 h-40 relative transform transition-transform duration-100 ${gameState === 'mining' ? 'scale-95' : 'scale-100'}`}>
                            <div className="w-full h-full dirt-texture border-4 border-black box-border relative">
                                <div className="absolute top-0 left-0 w-full h-1/3 grass-top"></div>
                                {blockHealth < 5 && blockHealth > 3 && <div className="absolute inset-0 crack-1"></div>}
                                {blockHealth <= 3 && blockHealth > 1 && <div className="absolute inset-0 crack-2"></div>}
                                {blockHealth <= 1 && <div className="absolute inset-0 crack-3"></div>}
                            </div>
                            </div>
                            {particles.map(p => (
                            <div key={p.id} className="absolute w-2 h-2 bg-yellow-900 pointer-events-none" style={{ left: 0, top: 0, transform: `translate(${p.x}px, ${p.y}px)` }} />
                            ))}
                        </div>
                        <p className="mt-8 text-2xl text-center bg-black/50 p-2 rounded text-white animate-pulse">
                            {blockHealth > 0 ? "¡TOCA EL BLOQUE!" : "¡ABRIENDO!"}
                        </p>
                        <div className="mt-4 w-64 h-6 bg-gray-800 border-2 border-white rounded-full overflow-hidden">
                            <div className="h-full bg-green-500 transition-all duration-200" style={{ width: `${(1 - blockHealth/5) * 100}%` }}></div>
                        </div>
                        </div>
                    ) : (
                        <div className="relative z-10 h-screen flex flex-col items-center p-4 animate-fadeIn overflow-y-auto">
                        <div className="minecraft-panel p-6 w-full max-w-md relative animate-float mt-16 mb-4">
                            <div className="absolute -top-12 left-1/2 transform -translate-x-1/2">
                                <div className="w-24 h-24 bg-green-500 border-4 border-black flex items-center justify-center relative shadow-lg">
                                    <div className="w-12 h-12 relative">
                                        <div className="absolute top-2 left-2 w-3 h-3 bg-black"></div><div className="absolute top-2 right-2 w-3 h-3 bg-black"></div>
                                        <div className="absolute top-5 left-5 w-2 h-4 bg-black"></div>
                                        <div className="absolute bottom-1 left-3 w-2 h-3 bg-black"></div><div className="absolute bottom-1 right-3 w-2 h-3 bg-black"></div>
                                        <div className="absolute bottom-3 left-4 w-4 h-2 bg-black"></div>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-10 text-center">
                            <h2 className="text-3xl font-bold mb-2 leading-none">¡INVITACIÓN!</h2>
                            <div className="h-1 w-full bg-gray-600 mb-4"></div>
                            
                            <p className="text-xl mb-4">Celebra el <span id="edad" className="text-purple-700 font-bold ml-1">NIVEL {partyData.age}</span> de {partyData.name}</p>

                            <div className="bg-black/20 p-2 mb-4 rounded border-2 border-gray-500">
                                <p className="text-sm text-gray-700 font-bold mb-1">COMIENZA EN:</p>
                                <div className="flex justify-center gap-2 text-xl font-bold text-gray-800">
                                {Object.keys(timeLeft).length > 0 ? Object.entries(timeLeft).map(([unit, value]) => (
                                    <div key={unit} className="flex flex-col items-center w-12">
                                    <span className="bg-gray-700 text-white w-full rounded">{value < 10 ? `0${value}` : value}</span>
                                    <span className="text-xs mt-1">{unit}</span>
                                    </div>
                                )) : <span>¡ES HOY!</span>}
                                </div>
                            </div>

                            <div className="space-y-3 text-left bg-gray-300 p-3 border-2 border-gray-500 mb-4 text-lg">
                                <div className="flex items-center gap-2"><Calendar className="w-5 h-5 text-blue-600 flex-shrink-0" /><span id="fecha">{partyData.date}</span></div>
                                <div className="flex items-center gap-2"><Clock className="w-5 h-5 text-blue-600 flex-shrink-0" /><span id="hora">{partyData.time}</span></div>
                                <div className="flex items-center gap-2"><MapPin className="w-5 h-5 text-red-600 flex-shrink-0" /><span id="ubicacion" className="leading-none">{partyData.location}</span></div>
                            </div>

                            <div className="grid grid-cols-2 gap-2 mb-4">
                                {/* 🔴 BOTÓN QUE ABRE SELECTOR DE MAPAS */}
                                <button onClick={() => setShowMapOptions(true)} className="minecraft-btn flex items-center justify-center py-2 bg-blue-600 text-white text-lg font-bold hover:bg-blue-500 active:translate-y-1 border-2 border-black">
                                    <MapPin size={18} className="mr-2"/> MAPA
                                </button>
                                <button onClick={() => setShowGifts(true)} className="minecraft-btn flex items-center justify-center py-2 bg-purple-600 text-white text-lg font-bold hover:bg-purple-500 active:translate-y-1 border-2 border-black">
                                    <Gift size={18} className="mr-2"/> REGALOS
                                </button>
                            </div>

                            {/* BOTÓN GIGANTE DE CONFIRMACIÓN VISUAL */}
                            <button onClick={() => setShowRSVPDemo(true)} className="minecraft-btn mt-2 w-full py-4 bg-green-600 text-white text-2xl font-bold hover:bg-green-500 active:translate-y-1 border-2 border-black flex items-center justify-center animate-pulse-glow">
                                <CheckSquare className="mr-2" size={24}/> CONFIRMAR ASISTENCIA
                            </button>

                            </div>
                        </div>

                        {/* 🔴 FOOTER DE BAULIA ACTUALIZADO */}
                        <div className="flex flex-col items-center justify-center mt-4 mb-28">
                            <span className="text-white/70 text-sm font-sans mb-1">Tecnología por</span>
                            <svg viewBox="0 0 915 201" fill="none" xmlns="http://www.w3.org/2000/svg" style={{height: '40px', width: 'auto', overflow: 'visible', display: 'inline-block'}}>
                                <style>
                                    {`.baulia-text { fill: #ffffff; transition: fill 0.5s ease; } .baulia-diamond-animator { transform-origin: 100px 100px; transform: rotate(45deg) scale(0.8); transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); } .baulia-diamond-shape { fill: transparent; stroke: #D4AF37; stroke-width: 1.72px; transition: fill 0.5s ease, stroke-width 0.3s ease; } .baulia-b { fill: #D4AF37; transition: all 0.6s ease; transform-origin: 100px 100px; } svg:hover .baulia-diamond-animator { transform: rotate(135deg) scale(0.85); } svg:hover .baulia-diamond-shape { stroke-width: 3px; } svg:hover .baulia-b { transform: scale(1.05); fill: #FDF1A9; }`}
                                </style>
                                <g className="baulia-text">

                    )}

                    {/* 🔴 MODAL SELECTOR DE MAPAS */}
                    {showMapOptions && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                            <div className="minecraft-panel w-full max-w-sm p-6 relative">
                                <button onClick={() => setShowMapOptions(false)} className="absolute top-2 right-2 text-gray-700 hover:text-red-600"><X size={24} /></button>
                                <div className="flex justify-center mb-4"><MapPin size={48} className="text-red-600" /></div>
                                <h3 className="text-2xl font-bold mb-4 text-center">ELEGIR MAPA</h3>
                                <div className="space-y-3 font-sans">
                                    <a href="https://share.google/LE2VXpOzq5vgkVVCW" target="_blank" rel="noreferrer" className="flex items-center justify-center py-3 bg-white text-black text-xl font-bold border-2 border-black hover:bg-gray-200 shadow-[2px_2px_0px_#000]">
                                        📍 Google Maps
                                    </a>
                                    <a href={`http://maps.apple.com/?q=${encodeURIComponent(partyData.location)}`} target="_blank" rel="noreferrer" className="flex items-center justify-center py-3 bg-black text-white text-xl font-bold border-2 border-white hover:bg-gray-800 shadow-[2px_2px_0px_rgba(255,255,255,0.5)]">
                                        🍎 Apple Maps
                                    </a>
                                    <a href={`https://waze.com/ul?q=${encodeURIComponent(partyData.location)}`} target="_blank" rel="noreferrer" className="flex items-center justify-center py-3 bg-blue-500 text-white text-xl font-bold border-2 border-black hover:bg-blue-400 shadow-[2px_2px_0px_#000]">
                                        🚗 Waze
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL MESA DE REGALOS */}
                    {showGifts && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
                        <div className="minecraft-panel w-full max-w-sm p-6 relative">
                            <button onClick={() => setShowGifts(false)} className="absolute top-2 right-2 text-gray-700 hover:text-red-600"><X size={24} /></button>
                            <div className="flex justify-center mb-4"><Gift size={48} className="text-purple-700" /></div>
                            <h3 className="text-2xl font-bold mb-2 text-center">MESA DE REGALOS</h3>
                            <p className="text-center mb-6 text-sm">{partyData.giftInfo.message}</p>
                            <div className="space-y-4">
                            <div className="bg-white/50 p-3 border-2 border-gray-600 rounded">
                                <p className="font-bold text-sm text-gray-800">✉️ SOBRE:</p>
                                <p id="banco" className="text-lg">{partyData.giftInfo.envelope}</p>
                            </div>
                            </div>
                        </div>
                        </div>
                    )}

                    {/* 🔴 FAKE RSVP / MODAL DE VENTAS (MODO DEMO INTERACTIVO) */}
                    {showRSVPDemo && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center bg-black/40 backdrop-blur-xl p-4">
                            <div className="minecraft-panel w-full max-w-sm p-6 relative">
                                <button onClick={closeRSVPModal} className="absolute top-2 right-2 text-gray-700 hover:text-red-600 z-10">
                                    <X size={24} />
                                </button>
                                
                                <div className="text-center mb-6">
                                    <h3 className="text-3xl font-bold text-red-600 mb-2 drop-shadow-md">MODO DE PRUEBA</h3>
                                    <p className="text-sm font-sans font-medium text-gray-800 bg-yellow-300 p-2 rounded border-2 border-yellow-600 leading-snug">
                                        En una invitación real, tus invitados confirmarán asistencia aquí.
                                    </p>
                                </div>

                                {!isRsvpSubmitted ? (
                                    <form onSubmit={handleRSVPSubmit} className="space-y-4 relative">
                                        <div className="text-left">
                                            <label className="block text-xl font-bold mb-1">Nombre y Apellido</label>
                                            <input type="text" required placeholder="Ej. Steve" className="w-full bg-white border-4 border-gray-500 p-2 font-sans text-lg text-black focus:outline-none focus:border-green-600" />
                                        </div>
                                        <div className="text-left">
                                            <label className="block text-xl font-bold mb-1">Pases a confirmar</label>
                                            <select className="w-full bg-white border-4 border-gray-500 p-2 font-sans text-lg text-black focus:outline-none focus:border-green-600">
                                                <option>1 Pase</option>
                                                <option>2 Pases</option>
                                                <option>3 Pases</option>
                                            </select>
                                        </div>
                                        <button type="submit" className="minecraft-btn w-full py-3 mt-4 bg-green-600 text-white text-xl font-bold border-2 border-black flex justify-center items-center hover:bg-green-500 active:translate-y-1">
                                            GENERAR PASE QR
                                        </button>
                                    </form>
                                ) : (
                                    <div className="animate-fadeIn bg-white p-4 border-4 border-green-600 rounded text-center">
                                        <div className="flex justify-center mb-2">
                                            <div className="bg-green-100 rounded-full p-2">
                                                <CheckSquare size={40} className="text-green-600" />
                                            </div>
                                        </div>
                                        <h4 className="text-2xl font-bold text-green-700 mb-2">¡Excelente!</h4>
                                        <p className="text-base font-sans font-medium text-gray-800 leading-snug">
                                            En una versión real, esto le generaría un código QR único a tu invitado.
                                        </p>
                                        <div className="mt-4 p-3 bg-blue-50 border-2 border-blue-200 rounded">
                                            <p className="text-sm font-sans text-blue-800 font-bold">
                                                ¡Crea tu propio evento en Baulia para desbloquear esta función!
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    </>
                )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
