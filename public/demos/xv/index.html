<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ========================================== -->
    <!-- OPEN GRAPH ESTRICTO (WhatsApp Preview)     -->
    <!-- ========================================== -->
    <meta property="og:title" content="Pase VIP - Mis XV Años" />
    <meta property="og:description" content="Abre tu invitación y acompáñame a celebrar esta noche mágica." />
    <!-- REGLA ESTRICTA: Enlace absoluto público -->
    <meta property="og:image" content="https://tusitio.com/demos/xv/cover.jpg" />
    <meta property="og:url" content="https://baulia.com" />
    <meta property="og:type" content="website" />

    <title>Mis XV Años | Valeria</title>

    <!-- Google Fonts: Alta Costura -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración de Tailwind para Lujo Nocturno (Rose Gold Gala) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkrose: '#12080a', // Fondo casi negro con tinte rojizo/cálido
                        wine: '#2a1116',     // Vino oscuro para profundidad
                        rosegold: '#e8a598', // Rose Gold iluminado (Acento principal)
                        copper: '#c27a6e',   // Cobre/Dorado cálido
                        champagne: '#faebd7' // Champaña muy claro para textos sutiles
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        cursive: ['Great Vibes', 'cursive'],
                        sans: ['Montserrat', 'sans-serif']
                    },
                    animation: {
                        'float-slow': 'float 45s linear infinite',
                        'float-medium': 'float 35s linear infinite',
                        'float-fast': 'float 25s linear infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%': { transform: 'translateY(10vh) translateX(0px) rotate(0deg) scale(0.8)', opacity: '0' },
                            '10%': { opacity: '1' },
                            '33%': { transform: 'translateY(-30vh) translateX(15px) rotate(10deg) scale(1)' },
                            '66%': { transform: 'translateY(-70vh) translateX(-15px) rotate(-10deg) scale(0.9)' },
                            '90%': { opacity: '1' },
                            '100%': { transform: 'translateY(-120vh) translateX(5px) rotate(15deg) scale(1.1)', opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Estilos Personalizados y Preloader CSS -->
    <style>
        body { margin: 0; -webkit-font-smoothing: antialiased; background-color: #12080a; color: #ffffff; }
        
        /* Preloader Puro CSS */
        #luxury-preloader {
            position: fixed;
            inset: 0;
            background-color: #12080a;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeOutPreloader 1.5s ease-in-out forwards;
            animation-delay: 0.8s;
            pointer-events: none;
        }
        .preloader-monogram {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #e8a598;
            text-shadow: 0 0 20px rgba(232, 165, 152, 0.6);
            animation: subtleScale 1s ease-in-out infinite alternate;
        }
        @keyframes fadeOutPreloader {
            to { opacity: 0; visibility: hidden; }
        }
        @keyframes subtleScale {
            from { transform: scale(0.95); opacity: 0.7; }
            to { transform: scale(1.05); opacity: 1; }
        }

        /* Utilidades Glassmorphism Premium para Dark Mode Rose Gold */
        .glass-panel {
            background: rgba(42, 17, 22, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(232, 165, 152, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(232, 165, 152, 0.05);
        }

        /* Animación Ecualizador (Rose Gold Glow) */
        .eq-bar {
            width: 3px;
            background-color: #e8a598;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(232, 165, 152, 0.8);
            transition: height 0.2s ease;
        }
        .playing .eq-bar:nth-child(1) { animation: eq 1s infinite alternate; }
        .playing .eq-bar:nth-child(2) { animation: eq 0.8s infinite alternate-reverse; animation-delay: 0.2s; }
        .playing .eq-bar:nth-child(3) { animation: eq 1.2s infinite alternate; animation-delay: 0.4s; }
        @keyframes eq {
            0% { height: 4px; }
            100% { height: 16px; }
        }
    </style>

    <!-- React, ReactDOM, Babel (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <!-- Preloader CSS Puro -->
    <div id="luxury-preloader">
        <div class="preloader-monogram">V</div>
    </div>

    <!-- Contenedor Raíz de React -->
    <div id="root"></div>

    <!-- Lógica de React -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Componente SVG: Destellos/Estrellas para Gala
        const SparkleIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M12 3L14.5 9.5L21 12L14.5 14.5L12 21L9.5 14.5L3 12L9.5 9.5L12 3Z" />
            </svg>
        );

        // --- COMPONENTE VIP DE ANIMACIÓN (Fade In Up) ---
        const FadeInSection = ({ children, delay = 0 }) => {
            const [isVisible, setVisible] = useState(false);
            const domRef = useRef();
            
            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setVisible(true);
                            observer.unobserve(domRef.current);
                        }
                    });
                }, { threshold: 0.1 });
                
                if (domRef.current) observer.observe(domRef.current);
                return () => { if (domRef.current) observer.unobserve(domRef.current); }
            }, []);
            
            return (
                <div 
                    ref={domRef} 
                    className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        const App = () => {
            // Protección Anti-Robo en React
            useEffect(() => {
                const preventAction = (e) => e.preventDefault();
                document.addEventListener('contextmenu', preventAction);
                document.addEventListener('selectstart', preventAction);
                document.addEventListener('dragstart', preventAction);
                return () => {
                    document.removeEventListener('contextmenu', preventAction);
                    document.removeEventListener('selectstart', preventAction);
                    document.removeEventListener('dragstart', preventAction);
                };
            }, []);

            // Estados Generales
            const [guestName, setGuestName] = useState(null);
            const [language, setLanguage] = useState('es');
            const [isPlaying, setIsPlaying] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ Días: 0, Hrs: 0, Min: 0, Seg: 0 });
            const [scrollY, setScrollY] = useState(0);
            
            // Estados para las Funciones Especiales (Fases 3 y 4)
            const [copied, setCopied] = useState(false);
            const [currentGalleryIdx, setCurrentGalleryIdx] = useState(0); 
            const [demoFormStatus, setDemoFormStatus] = useState('form');
            const [isModalOpen, setIsModalOpen] = useState(false);

            const audioRef = useRef(null);

            // Listener de Scroll para dinámica de fondo fotográfico
            useEffect(() => {
                const handleScroll = () => setScrollY(window.scrollY);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Temporizador Cinemático para la Galería
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentGalleryIdx((prev) => (prev + 1) % 6);
                }, 5000); 
                return () => clearInterval(timer);
            }, []);

            // Fecha del evento
            const eventDate = new Date("2026-11-20T19:00:00").getTime();

            // Lógica de Cuenta Regresiva
            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = eventDate - now;

                    if (distance > 0) {
                        setTimeLeft({
                            Días: Math.floor(distance / (1000 * 60 * 60 * 24)),
                            Hrs: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            Min: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                            Seg: Math.floor((distance % (1000 * 60)) / 1000)
                        });
                    } else {
                        clearInterval(timer);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [eventDate]);

            // Extracción Inteligente VIP
            const EVENT_ID = "ID_EXACTO_EN_FIREBASE";
            useEffect(() => {
                const fetchGuestData = async () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const guestUid = urlParams.get('u');

                    if (guestUid) {
                        try {
                            const response = await fetch(`https://firestore.googleapis.com/v1/projects/panel-de-control-intelig-db278/databases/(default)/documents/eventos/${EVENT_ID}/invitados/${guestUid}`);
                            if (response.ok) {
                                const data = await response.json();
                                if (data.fields && data.fields.name && data.fields.name.stringValue) {
                                    setGuestName(data.fields.name.stringValue);
                                }
                            }
                        } catch (error) {
                            console.error("Error al obtener datos del invitado:", error);
                        }
                    }
                };
                fetchGuestData();
            }, []);

            // Control de Música
            const toggleMusic = () => {
                if (audioRef.current) {
                    if (isPlaying) {
                        audioRef.current.pause();
                    } else {
                        audioRef.current.play().catch(e => console.log("Interacción requerida primero"));
                    }
                    setIsPlaying(!isPlaying);
                }
            };

            const toggleLanguage = () => {
                setLanguage(prev => prev === 'es' ? 'en' : 'es');
            };

            // Copiado Seguro al Portapapeles
            const handleCopy = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000); 
                } catch (err) {
                    console.error('Error al copiar', err);
                }
                document.body.removeChild(textArea);
            };

            // Navegación GPS
            const handleGPS = (address) => {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                const isAndroid = /android/i.test(navigator.userAgent);
                const encodedAddress = encodeURIComponent(address);
                
                if (isIOS) {
                    window.location.href = `maps://?q=${encodedAddress}`;
                } else if (isAndroid) {
                    window.location.href = `geo:0,0?q=${encodedAddress}`;
                } else {
                    window.open(`https://maps.google.com/?q=${encodedAddress}`, '_blank');
                }
            };

            // Generador de .ics
            const handleAddToCalendar = () => {
                const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Mis XV Años - Valeria
DESCRIPTION:Acompáñame a celebrar una noche mágica inolvidable.
LOCATION:Gran Salón Imperial, Ciudad
DTSTART:20261120T190000Z
DTEND:20261121T020000Z
END:VEVENT
END:VCALENDAR`;
                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', 'XVAños_Valeria.ics');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Generación de Estrellas Flotantes (Rose Gold Glow)
            const floatingElements = useMemo(() => {
                const elements = [];
                const speeds = ['animate-float-slow', 'animate-float-medium', 'animate-float-fast'];
                
                for (let i = 0; i < 20; i++) {
                    const speed = speeds[Math.floor(Math.random() * speeds.length)];
                    const leftPos = Math.floor(Math.random() * 100);
                    const delay = -(Math.random() * 45); 
                    
                    elements.push(
                        <div 
                            key={i} 
                            className={`absolute text-rosegold/30 drop-shadow-[0_0_5px_rgba(232,165,152,0.8)] ${speed}`}
                            style={{ left: `${leftPos}%`, animationDelay: `${delay}s`, top: '100%' }}
                        >
                            <SparkleIcon className="w-6 h-6 md:w-10 md:h-10" />
                        </div>
                    );
                }
                return elements;
            }, []);

            return (
                <main className="relative w-full min-h-screen bg-darkrose selection:bg-rosegold selection:text-darkrose font-sans overflow-x-hidden text-white">
                    
                    {/* Audio Oculto */}
                    <audio 
                        ref={audioRef} 
                        src="/demos/xv/cancion.mp3" 
                        loop 
                        preload="auto"
                    ></audio>

                    {/* === FONDOS DINÁMICOS ROSE GOLD === */}
                    <div className="fixed inset-0 z-0 pointer-events-none bg-darkrose">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top,rgba(232,165,152,0.08)_0%,transparent_70%)]"></div>
                        <div className="absolute inset-0 overflow-hidden opacity-100">
                            {floatingElements}
                        </div>
                    </div>

                    <div 
                        className="absolute top-0 left-0 w-full h-[120vh] z-0 pointer-events-none transition-opacity duration-75"
                        style={{ opacity: Math.max(0, 1 - scrollY / 600) }}
                    >
                        {/* Imagen de fondo principal - Cargará la foto local de su vestido */}
                        <img 
                            src="/demos/xv/portada.jpg" 
                            alt="Portada XV Años Rose Gold" 
                            className="absolute inset-0 w-full h-full object-cover object-center"
                        />
                        <div className="absolute inset-0 bg-gradient-to-b from-darkrose/50 via-darkrose/70 to-darkrose"></div>
                    </div>

                    {/* CONTENIDO PRINCIPAL SCROLLABLE (Z-20) */}
                    <div className="relative z-20 w-full flex flex-col items-center">
                        
                        {/* === SECCIÓN 1: PORTADA HERO === */}
                        <section className="relative w-full min-h-screen flex flex-col justify-end items-center px-6 pb-20 pt-[45vh] text-center z-20">
                            
                            <button 
                                onClick={toggleLanguage}
                                className="absolute top-6 right-6 md:top-10 md:right-10 text-xs font-sans tracking-[0.2em] text-rosegold hover:text-white transition-colors duration-300 z-30 drop-shadow-[0_0_8px_rgba(232,165,152,0.5)]"
                            >
                                {language === 'es' ? 'EN' : 'ES'}
                            </button>

                            {/* === MONOGRAMA MÓVIL NEÓN ROSE GOLD === */}
                            <div className="absolute top-16 left-1/2 -translate-x-1/2 md:hidden w-20 h-20 rounded-full border border-rosegold/60 flex items-center justify-center bg-darkrose/40 backdrop-blur-md shadow-[0_0_20px_rgba(232,165,152,0.4),inset_0_0_10px_rgba(232,165,152,0.2)] z-40">
                                <span className="font-cursive text-3xl text-rosegold mt-2 drop-shadow-[0_0_10px_rgba(232,165,152,0.8)]">V</span>
                            </div>

                            <div className="flex flex-col items-center z-20 relative w-full max-w-lg">
                                {/* Halo de luz cálida detrás de las letras */}
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[140%] h-[120%] bg-[radial-gradient(circle_at_center,rgba(232,165,152,0.15)_0%,rgba(18,8,10,0.6)_45%,transparent_75%)] blur-lg -z-10 pointer-events-none"></div>

                                {/* === MONOGRAMA ESCRITORIO NEÓN ROSE GOLD === */}
                                <div className="hidden md:flex w-24 h-24 rounded-full border border-rosegold/60 items-center justify-center mb-6 bg-darkrose/40 backdrop-blur-md shadow-[0_0_25px_rgba(232,165,152,0.4),inset_0_0_15px_rgba(232,165,152,0.2)]">
                                    <span className="font-cursive text-4xl text-rosegold mt-2 drop-shadow-[0_0_10px_rgba(232,165,152,0.8)]">V</span>
                                </div>

                                <p className="font-sans text-xs md:text-sm tracking-[0.4em] uppercase text-champagne mb-3 drop-shadow-[0_0_8px_rgba(232,165,152,0.5)] font-medium">
                                    {language === 'es' ? 'Mis XV Años' : 'My Sweet 15'}
                                </p>
                                
                                <h1 className="font-cursive text-7xl md:text-9xl text-white mb-5 drop-shadow-[0_0_25px_rgba(255,255,255,0.4)]">
                                    Valeria
                                </h1>

                                <div className="flex items-center gap-3 mb-6 opacity-80">
                                    <div className="w-10 md:w-16 h-[1px] bg-gradient-to-r from-transparent to-rosegold"></div>
                                    <div className="w-1.5 h-1.5 rotate-45 bg-rosegold shadow-[0_0_8px_rgba(232,165,152,0.8)]"></div>
                                    <div className="w-10 md:w-16 h-[1px] bg-gradient-to-l from-transparent to-rosegold"></div>
                                </div>

                                <div className="relative group w-full mb-8">
                                    <div className="absolute inset-0 bg-white/5 backdrop-blur-md rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] border border-rosegold/20 transition-all duration-500"></div>
                                    <p className="relative font-serif text-lg md:text-xl text-champagne italic leading-relaxed px-8 py-5">
                                        {language === 'es' 
                                            ? '"Hay momentos en la vida que imaginamos perfectos, y compartirlos con quienes amamos los hace inolvidables."'
                                            : '"There are moments in life we imagine as perfect, and sharing them with those we love makes them unforgettable."'}
                                    </p>
                                </div>

                                {guestName && (
                                    <div className="glass-panel px-8 py-5 rounded-2xl animate-[fadeInUp_1s_ease-out] border-rosegold/30">
                                        <p className="font-sans text-[10px] tracking-[0.2em] text-rosegold uppercase mb-1 drop-shadow-sm">
                                            {language === 'es' ? 'Pase VIP Para' : 'VIP Pass For'}
                                        </p>
                                        <p className="font-serif text-2xl md:text-3xl text-white font-medium">
                                            {guestName}
                                        </p>
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* === SECCIÓN 2: CUENTA REGRESIVA === */}
                        <section className="w-full max-w-5xl px-6 py-32 flex flex-col items-center text-center">
                            <FadeInSection>
                                <div className="mb-16">
                                    <p className="font-sans text-xs md:text-sm tracking-[0.4em] uppercase text-champagne mb-4 drop-shadow-sm">
                                        {language === 'es' ? 'Comienza la cuenta atrás' : 'The countdown begins'}
                                    </p>
                                    <h2 className="font-cursive text-6xl md:text-7xl text-rosegold drop-shadow-[0_0_20px_rgba(232,165,152,0.5)]">
                                        {language === 'es' ? 'La Noche Esperada' : 'The Awaited Night'}
                                    </h2>
                                </div>

                                {/* Diseño Vanguardista: Panel Tipográfico Minimalista */}
                                <div className="relative w-full py-10 px-2 md:px-12 bg-gradient-to-r from-transparent via-rosegold/5 to-transparent border-y border-rosegold/20 backdrop-blur-sm">
                                    <div className="flex justify-center items-center gap-2 md:gap-10">
                                        {Object.entries(timeLeft).map(([unit, value], idx) => (
                                            <React.Fragment key={idx}>
                                                <div className="flex flex-col items-center w-16 md:w-24 group cursor-default">
                                                    <span className="font-serif text-5xl md:text-7xl text-white font-light tabular-nums tracking-tighter drop-shadow-[0_0_15px_rgba(232,165,152,0.8)] group-hover:scale-110 transition-transform duration-500">
                                                        {value.toString().padStart(2, '0')}
                                                    </span>
                                                    
                                                    <div className="h-[2px] w-0 group-hover:w-full bg-rosegold transition-all duration-500 mt-1 mb-3 shadow-[0_0_10px_rgba(232,165,152,1)]"></div>
                                                    
                                                    <span className="font-sans text-[8px] md:text-xs tracking-[0.3em] uppercase text-rosegold/70 mt-2">
                                                        {unit}
                                                    </span>
                                                </div>
                                                
                                                {idx < 3 && (
                                                    <div className="h-10 md:h-20 w-[1px] bg-rosegold/40 rotate-12 shadow-[0_0_5px_rgba(232,165,152,0.5)]"></div>
                                                )}
                                            </React.Fragment>
                                        ))}
                                    </div>
                                </div>
                            </FadeInSection>
                        </section>

                        {/* === SECCIÓN 3: UBICACIÓN Y RECEPCIÓN === */}
                        <section className="w-full max-w-5xl px-6 py-24">
                            <FadeInSection>
                                <div className="glass-panel p-8 md:p-16 rounded-3xl text-center relative overflow-hidden border-rosegold/20">
                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-[1px] bg-gradient-to-r from-transparent via-rosegold to-transparent shadow-[0_0_10px_rgba(232,165,152,1)]"></div>
                                    
                                    <h2 className="font-cursive text-5xl md:text-6xl text-white mb-6 drop-shadow-sm">
                                        {language === 'es' ? 'Dónde Celebraremos' : 'Where to Celebrate'}
                                    </h2>
                                    
                                    <p className="font-serif text-xl md:text-2xl text-champagne mb-2">20 de Noviembre, 2026</p>
                                    <p className="font-sans text-xs tracking-[0.2em] text-rosegold uppercase mb-12 drop-shadow-sm">19:00 Hrs</p>

                                    <div className="flex flex-col items-center mb-12">
                                        <h3 className="font-serif text-2xl text-white mb-3">Gran Salón Imperial</h3>
                                        <p className="font-sans text-sm text-gray-400 font-light max-w-xs leading-relaxed">
                                            Av. de las Estrellas 990, Distrito Financiero, Ciudad.
                                        </p>
                                    </div>

                                    <div className="flex flex-col sm:flex-row justify-center gap-6 mt-8">
                                        <button 
                                            onClick={() => handleGPS('Av. de las Estrellas 990, Ciudad')}
                                            className="px-8 py-4 bg-wine/50 border border-rosegold/50 text-white font-sans text-xs tracking-widest uppercase rounded-full hover:bg-rosegold/20 hover:shadow-[0_0_15px_rgba(232,165,152,0.4)] transition-all duration-500 backdrop-blur-sm"
                                        >
                                            {language === 'es' ? 'Abrir GPS' : 'Open GPS'}
                                        </button>
                                        <button 
                                            onClick={handleAddToCalendar}
                                            className="px-8 py-4 bg-gradient-to-r from-rosegold to-copper text-darkrose font-sans text-xs tracking-widest uppercase rounded-full hover:scale-105 transition-all duration-500 shadow-[0_8px_20px_rgba(232,165,152,0.3)] font-bold"
                                        >
                                            {language === 'es' ? 'Agendar' : 'Save the Date'}
                                        </button>
                                    </div>
                                </div>
                            </FadeInSection>
                        </section>

                        {/* === SECCIÓN 4: ITINERARIO DE GALA === */}

    <!-- Protección Anti-Robo de Código HTML Nativo -->
    <script>
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; 
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; 
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; 
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
        }
    </script>
