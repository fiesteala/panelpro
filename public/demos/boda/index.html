<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Component: Scroll Reveal Wrapper ---
        const FadeInSection = ({ children }) => {
            const domRef = useRef();
            const [isVisible, setVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    if (entries[0].isIntersecting) {
                        setVisible(true);
                        observer.unobserve(domRef.current);
                    }
                }, { threshold: 0.15 });

                if (domRef.current) observer.observe(domRef.current);
                return () => { if (domRef.current) observer.disconnect(); };
            }, []);

            return (
                <div 
                    ref={domRef} 
                    className={`transition-all duration-[1500ms] ease-out w-full ${isVisible ? 'opacity-100 translate-y-0 blur-0' : 'opacity-0 translate-y-16 blur-sm'}`}
                >
                    {children}
                </div>
            );
        };

        // --- Component: Floating Buy Button (MODO DEMO) ---
        const FloatingBuyButton = () => {
            return (
                <button 
  onClick={() => {
    if (window.self !== window.top) {
      window.parent.postMessage('open_checkout', '*');
    } else {
      window.location.href = '/?modo=showcase&checkout=1';
    }
  }} 
  className="TU_CLASE_DE_TAILWIND_AQUÍ_COMO_LA_TENÍAS"
>
  Adquirir esta Tecnología
</button>
            );
        };

        // --- Component: Language Translator ---
        const LanguageTranslator = () => {
            const [lang, setLang] = useState('ES');
            
            const toggleLang = () => {
                setLang(lang === 'ES' ? 'EN' : 'ES');
            };

            return (
                <button 
                    onClick={toggleLang}
                    className="absolute top-8 right-8 z-50 text-xs font-sans tracking-[0.2em] text-white/70 hover:text-champagne transition-colors duration-500 uppercase flex items-center gap-2"
                    style={{ letterSpacing: '0.25em' }}
                >
                    <span className={lang === 'ES' ? 'text-white' : ''}>ES</span>
                    <span className="text-white/30 text-[10px]">|</span>
                    <span className={lang === 'EN' ? 'text-white' : ''}>EN</span>
                </button>
            );
        };

        // --- Component: Floating Music Player ---
        const MusicPlayer = ({ isPlaying, setIsPlaying, audioRef }) => {
            const togglePlay = () => {
                if (isPlaying) {
                    audioRef.current.pause();
                } else {
                    audioRef.current.play().catch(e => console.log("User interaction needed to play audio", e));
                }
                setIsPlaying(!isPlaying);
            };

            return (
                <div className="fixed bottom-8 right-8 z-50 flex items-center justify-center">
                    {/* RUTA LOCAL ESTRICTA: AUDIO */}
                    <audio 
                        id="wedding-audio" 
                        ref={audioRef} 
                        src="/demos/boda/cancion.mp3" 
                        loop 
                        onPlay={() => setIsPlaying(true)}
                        onPause={() => setIsPlaying(false)}
                    />
                    
                    <button 
                        onClick={togglePlay}
                        className={`w-12 h-12 rounded-full border border-white/20 flex items-center justify-center backdrop-blur-md transition-all duration-700 hover:border-champagne hover:scale-105 ${isPlaying ? 'bg-white/10 animate-pulse-slow shadow-[0_0_15px_rgba(212,175,55,0.2)]' : 'bg-black/20'}`}
                        aria-label="Play/Pause Music"
                    >
                        {isPlaying ? (
                            <svg className="w-4 h-4 text-champagne-light fill-current" viewBox="0 0 24 24">
                                <rect x="6" y="4" width="4" height="16" />
                                <rect x="14" y="4" width="4" height="16" />
                            </svg>
                        ) : (
                            <svg className="w-5 h-5 text-white/80 fill-current ml-1" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        )}
                    </button>
                    <span className={`absolute -top-6 text-[9px] font-sans tracking-widest text-white/50 transition-opacity duration-500 ${isPlaying ? 'opacity-100' : 'opacity-0'}`}>
                        SOUNDTRACK
                    </span>
                </div>
            );
        };

        // --- Component: Ambient Dynamic Background ---

            const particles = useMemo(() => {

                    left: `${Math.random() * 100}%`,
                    animationDuration: `${Math.random() * 20 + 25}s`,

                    <div className="absolute top-1/4 left-1/4 w-[40vw] h-[40vw] bg-champagne/5 blur-[120px] rounded-full animate-drift mix-blend-screen"></div>
                    <div className="absolute bottom-1/4 right-1/4 w-[50vw] h-[50vw] bg-champagne-light/3 blur-[150px] rounded-full animate-drift-reverse mix-blend-screen"></div>

                    {particles.map(p => (
                        <div
                            key={p.id}
                            className="absolute rounded-full bg-champagne/60 animate-drift-up mix-blend-screen"
                            style={{
                                left: p.left,
                                width: p.size,
                                height: p.size,
                                animationDuration: p.animationDuration,
                                animationDelay: p.animationDelay,
                                opacity: p.opacity
                            }}
                        />
                    ))}
                </div>
            );
        };

        // --- Component: Countdown ---
        const Countdown = () => {
            const calculateTimeLeft = () => {
                const targetDate = new Date("2026-07-25T19:00:00");
                const difference = +targetDate - +new Date();
                let timeLeft = { dias: 0, horas: 0, min: 0, seg: 0 };
                if (difference > 0) {
                    timeLeft = {
                        dias: Math.floor(difference / (1000 * 60 * 60 * 24)),
                        horas: Math.floor((difference / (1000 * 60 * 60)) % 24),
                        min: Math.floor((difference / 1000 / 60) % 60),
                        seg: Math.floor((difference / 1000) % 60)
                    };
                }
                return timeLeft;
            };

            const [timeLeft, setTimeLeft] = useState(calculateTimeLeft());

            useEffect(() => {
                const timer = setTimeout(() => {
                    setTimeLeft(calculateTimeLeft());
                }, 1000);
                return () => clearTimeout(timer);
            });

            const timeUnits = [
                { label: 'Días', value: timeLeft.dias },
                { label: 'Hrs', value: timeLeft.horas },
                { label: 'Min', value: timeLeft.min },
                { label: 'Seg', value: timeLeft.seg }
            ];

            return (
                <section className="py-16 px-6 w-full flex flex-col items-center justify-center relative">
                    <span className="font-script text-champagne text-3xl md:text-4xl mb-6 block text-center">La Cuenta Regresiva</span>
                    <div className="flex gap-4 md:gap-12 justify-center w-full max-w-3xl">

                                <span className="font-sans text-[9px] md:text-xs tracking-[0.3em] text-white/50 uppercase">{unit.label}</span>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

                            <h2 className="font-serif text-2xl md:text-3xl font-light text-white tracking-widest uppercase mb-4 md:mb-6">Padrinos de Velación</h2>
                            <h3 className="font-serif text-2xl md:text-4xl text-champagne">Fernando Clariond <span className="font-script text-white text-3xl mx-2 lowercase">&</span> Patricia de Clariond</h3>
                        </div>
                    </div>
                </section>
            );
        };

        // --- Component: Event Details (Locations & Weather) ---
        const EventDetails = () => {
            return (
                <section className="py-16 px-6 w-full max-w-6xl mx-auto relative">
                    <div className="text-center mb-12">
                        <span className="font-script text-champagne text-4xl mb-4 block">Dónde & Cuándo</span>
                        <h2 className="font-serif text-3xl md:text-4xl font-light text-white tracking-widest uppercase">La Celebración</h2>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                        <div className="flex flex-col items-center text-center group">
                            <div className="w-full aspect-[3/4] md:h-[500px] mb-8 md:mb-10 overflow-hidden relative rounded-t-full border border-white/10" style={{ WebkitMaskImage: '-webkit-radial-gradient(white, black)' }}>
                                {/* FILTRO OSCURO APLICADO: group-hover:bg-black/30 oscurece un poco la foto en color */}
                                <div className="absolute inset-0 bg-black/60 group-hover:bg-black/30 transition-all duration-700 z-10"></div>
                                {/* RUTA LOCAL ESTRICTA: IGLESIA CON FILTRO A COLOR EN HOVER */}
                                <img src="/demos/boda/iglesia.webp" alt="Catedral" className="w-full h-full object-cover grayscale opacity-70 group-hover:grayscale-0 group-hover:sepia-[.3] group-hover:contrast-125 group-hover:opacity-100 group-hover:scale-105 transition-all duration-1000" />
                                <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-20 font-sans text-[10px] tracking-widest text-white/90 uppercase bg-black/50 px-4 py-2 backdrop-blur-sm border border-white/20">01. Ceremonia</div>
                            </div>

                            <p className="font-sans text-xs text-white/60 tracking-[0.15em] leading-loose mb-6">
                                Zuazua y Padre Jardón S/N<br/>Centro, Monterrey, N.L.
                            </p>
                            <p className="font-serif italic text-xl text-white mb-8">19:00 hrs</p>
                            <a href="https://maps.google.com/?q=Catedral+Metropolitana+de+Monterrey" target="_blank" rel="noreferrer" className="font-sans text-[10px] tracking-[0.2em] uppercase text-white hover:text-champagne transition-colors border-b border-white/30 hover:border-champagne pb-2">Abrir Mapa</a>
                        </div>

                        <div className="flex flex-col items-center text-center group mt-8 md:mt-16">
                            <div className="w-full aspect-[3/4] md:h-[500px] mb-8 md:mb-10 overflow-hidden relative rounded-t-full border border-white/10" style={{ WebkitMaskImage: '-webkit-radial-gradient(white, black)' }}>
                                {/* FILTRO OSCURO APLICADO: group-hover:bg-black/30 oscurece un poco la foto en color */}
                                <div className="absolute inset-0 bg-black/60 group-hover:bg-black/30 transition-all duration-700 z-10"></div>
                                {/* RUTA LOCAL ESTRICTA: RECEPCIÓN CON FILTRO A COLOR EN HOVER */}
                                <img src="/demos/boda/recepcion.jpg" alt="Salón San Pedro" className="w-full h-full object-cover grayscale opacity-70 group-hover:grayscale-0 group-hover:sepia-[.3] group-hover:contrast-125 group-hover:opacity-100 group-hover:scale-105 transition-all duration-1000" />
                                <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-20 font-sans text-[10px] tracking-widest text-white/90 uppercase bg-black/50 px-4 py-2 backdrop-blur-sm border border-white/20">02. Recepción</div>
                            </div>
                            <h3 className="font-serif text-2xl md:text-3xl text-champagne mb-4">Gran Salón San Pedro</h3>

        // --- Component: Itinerary (Timeline) ---
        const Itinerary = () => {
            const events = [

                        <div className="absolute inset-0 bg-[url('/demos/boda/portada.jpg')] bg-cover bg-center opacity-10 grayscale mix-blend-overlay"></div>
                        <div className="absolute inset-0 bg-gradient-to-b from-black/90 via-black/60 to-black/90"></div>
                        
                        <div className="relative z-10 flex flex-col items-center justify-center w-full">
                            {/* Monograma */}
                            <div className="transform scale-50 md:scale-75 origin-center mb-8 md:mb-12">
                                <Monogram />
                            </div>
                            
                            {/* Textos centrales */}
                            <div className="flex flex-col items-center gap-4 md:gap-6 mb-12 md:mb-16">
                                <span className="font-sans text-[10px] md:text-[11px] tracking-[0.4em] text-champagne uppercase">
                                    Invitación Especial
                                </span>
                                <span className="font-script text-white text-6xl md:text-8xl text-shadow-luxury leading-tight max-w-xl px-4">
                                    {guestName ? `Para ${guestName}` : "Para Ti"}
                                </span>
                            </div>
                            
                            {/* Botón */}
                            <button 
                                onClick={handleOpenInvitation}
                                className="group relative px-10 py-5 bg-transparent border border-champagne/40 hover:border-champagne hover:bg-champagne/10 transition-all duration-700 overflow-hidden"
                            >
                                <span className="relative z-10 font-sans text-[10px] md:text-[11px] tracking-[0.3em] uppercase text-champagne group-hover:text-white transition-colors duration-700">
                                    Abrir Invitación
                                </span>
                            </button>
                        </div>
                    </div>

                    {/* --- CONTENIDO PRINCIPAL (Lo que está debajo del sobre) --- */}
                    <div className={`transition-opacity duration-1000 delay-500 ${isEnvelopeOpened ? 'opacity-100' : 'opacity-0'}`}>
                        <AmbientBackground />
                        <LanguageTranslator />
                        <MusicPlayer isPlaying={isPlaying} setIsPlaying={setIsPlaying} audioRef={audioRef} />

                        <section className="relative min-h-[100svh] w-full flex flex-col items-center bg-hero-image">
                            {/* OVERLAY ORIGINAL PARA ESCRITORIO */}
                            <div className="absolute inset-0 hidden md:block bg-black/40"></div>
                            {/* NUEVO OVERLAY RADIAL EXCLUSIVO PARA MÓVIL (Aclara el centro) */}
                            <div className="absolute inset-0 md:hidden bg-[radial-gradient(circle,rgba(0,0,0,0.1)_0%,rgba(0,0,0,0.6)_100%)]"></div>
                            
                            <div className="absolute inset-0 vignette-overlay"></div>
                            
                            <div className="relative z-10 flex flex-col items-center justify-between w-full min-h-[100svh] px-6 text-center pt-8 pb-24 md:pt-12 md:pb-32">
                                
                                {/* TOP: Monogram - Reducido 20% y bajado para evitar el notch de la cámara móvil */}
                                <div className="mt-24 md:mt-12 transform scale-[0.8] origin-top">
                                    <Monogram />
                                </div>

                                {/* CENTER SPACE: Espacio flexible para la foto */}
                                <div className="flex-grow"></div>

                                {/* BOTTOM: Text Block ultra-compacto */}
                                <div className="flex flex-col items-center">
                                    <p className="font-sans text-[10px] md:text-xs tracking-[0.4em] text-white/60 uppercase mb-2">
                                        Con gran alegría celebramos
                                    </p>
                                    <h1 className="font-serif text-3xl md:text-5xl font-light tracking-wide text-white mb-3">
                                        Isabella <span className="font-script text-champagne text-4xl md:text-6xl mx-2 lowercase">&</span> Alexander
                                    </h1>
                                    <div className="max-w-lg mx-auto">
                                        <p className="font-serif italic text-lg md:text-xl font-light text-white/80 leading-relaxed px-4">
                                            "El amor no mira con los ojos, <br className="hidden md:block"/>sino con el alma."
                                        </p>
                                        <div className="w-12 h-[1px] bg-champagne/50 mx-auto mt-4"></div>
                                    </div>
                                </div>
                                
                                {/* SCROLL INDICATOR */}
                                <div className="absolute bottom-6 md:bottom-8 flex flex-col items-center gap-3 opacity-60 animate-bounce-slow">
                                    <span className="font-sans text-[8px] tracking-[0.4em] uppercase text-white/70">Deslizar</span>
                                    <div className="w-[1px] h-6 md:h-8 bg-gradient-to-b from-white to-transparent"></div>
                                </div>
                            </div>
                        </section>

                        <div className="relative z-20">
                            <FadeInSection><Parents /></FadeInSection>
                            
                            <div className="w-full flex justify-center py-8">
                                <div className="w-[1px] h-24 bg-gradient-to-b from-champagne/40 to-transparent"></div>
                            </div>

                            <FadeInSection><Countdown /></FadeInSection>
                            <FadeInSection><VisualInterlude /></FadeInSection>
                            <FadeInSection><EventDetails /></FadeInSection>
                            <FadeInSection><Itinerary /></FadeInSection>
                            <FadeInSection><Concierge /></FadeInSection>
                            <FadeInSection><DressCode /></FadeInSection>
                            <FadeInSection><EditorialGallery /></FadeInSection>
                            <FadeInSection><GiftRegistry /></FadeInSection>
                            <FadeInSection><SocialWall /></FadeInSection>
                            
                            {/* Secciones de Cierre / Demo */}
                            <FadeInSection><RSVP /></FadeInSection>
                            <FadeInSection><Footer /></FadeInSection>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
