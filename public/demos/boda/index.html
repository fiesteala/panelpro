    <script>
        // 1. RADAR: Atrapa todos los audios generados en memoria por React
        window.audiosEnMemoria = [];
        var AudioOriginal = window.Audio;
        window.Audio = function() {
            var nuevoAudio = new AudioOriginal(arguments[0]);
            window.audiosEnMemoria.push(nuevoAudio);
            return nuevoAudio;
        };

        // 2. OÍDO: Escucha la orden de la Landing Page y silencia todo
        window.addEventListener('message', function(event) {
            if (event.data === 'pause_baulia_audio') {
            
            // Apaga etiquetas normales (si existen)
            var elementosHTML = document.querySelectorAll('audio, video');
            for (var i = 0; i < elementosHTML.length; i++) {
                elementosHTML[i].pause();
            }
      
            // Apaga los audios "fantasma" de React en memoria
            for (var j = 0; j < window.audiosEnMemoria.length; j++) {
                if (window.audiosEnMemoria[j] && typeof window.audiosEnMemoria[j].pause === 'function') {
                window.audiosEnMemoria[j].pause();                    }
                }

            }
        });
    </script>

                return () => observer.disconnect();

                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
