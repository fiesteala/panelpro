        // --- HOOK PARA FADE IN EN SCROLL ---
        const FadeInView = ({ children, className = "", delay = "0s" }) => {
            const domRef = useRef();
            const [isVisible, setVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setVisible(true);
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.15 });
                
                if (domRef.current) observer.observe(domRef.current);
                return () => observer.disconnect();
            }, []);

            return (
                <div ref={domRef} className={`reveal ${isVisible ? 'active' : ''} ${className}`} style={{ transitionDelay: delay }}>
                    {children}
                </div>
            );
        };

        const CountdownTimer = ({ targetDate, lang, t }) => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            useEffect(() => {
                const timer = setInterval(() => {
                    const difference = +new Date(targetDate) - +new Date();
                    if (difference > 0) {
                        setTimeLeft({
                            days: Math.floor(difference / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((difference / (1000 * 60 * 60)) % 24),
                            minutes: Math.floor((difference / 1000 / 60) % 60),
                            seconds: Math.floor((difference / 1000) % 60),
                        });
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [targetDate]);

            const timeUnits = [
                { label: t.days, value: timeLeft.days },
                { label: t.hrs, value: timeLeft.hours },
                { label: t.min, value: timeLeft.minutes },
                { label: t.sec, value: timeLeft.seconds }
            ];

            return (
                <div className="flex justify-center gap-4 md:gap-8 mt-6">
                    {timeUnits.map((unit, idx) => (
                        <div key={idx} className="flex flex-col items-center">
                            <span className="text-4xl md:text-5xl font-light text-champagne mb-1 drop-shadow-md">{String(unit.value).padStart(2, '0')}</span>

            const audioRef = useRef(null);
            const t = translations[lang];

            const urlParams = new URLSearchParams(window.location.search);

                                            />
                                        </div>
                                        
                                        <div>
                                            <label className="block text-[10px] md:text-xs uppercase tracking-[0.2em] text-champagne mb-2 font-bold">Pases a confirmar</label>
                                            <select className="w-full bg-transparent border-b border-champagne/40 p-2 text-charcoal font-serif text-lg md:text-xl focus:outline-none focus:border-champagne transition-colors appearance-none cursor-pointer">
                                                <option>1 Pase</option>
                                                <option>2 Pases</option>
                                                <option>3 Pases</option>
                                            </select>
                                        </div>
                                        
                                        <button 
                                            type="submit" 
                                            className="w-full py-4 mt-8 bg-charcoal text-champagne text-xs md:text-sm tracking-[0.2em] uppercase rounded-full shadow-lg hover:bg-charcoal/90 transition-all font-semibold border border-charcoal hover:border-champagne"
                                        >
                                            Generar Pase QR
                                        </button>
                                    </form>
                                ) : (
                                    <div className="py-8 animate-fade-in flex flex-col items-center">
                                        <CheckCircleIcon />
                                        <h4 className="text-2xl text-champagne font-script mb-3 tracking-wide">¡Excelente!</h4>
                                        <p className="text-charcoal italic leading-relaxed mb-8 text-lg px-2">
                                            En una versión real, esto le generaría un código QR único a tu invitado.
                                        </p>
                                        <div className="bg-champagne/10 p-4 rounded-xl border border-champagne/30">
                                            <p className="text-xs font-bold text-charcoal uppercase tracking-[0.1em] leading-relaxed">
                                                ¡Crea tu propio evento en Baulia para desbloquear esta función!
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* NUEVO MODAL: VISOR DE FOTOS (LIGHTBOX) */}
                    {selectedPhoto && (
                        <div 
                            className="fixed inset-0 z-[300] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-fade-in cursor-zoom-out" 
                            onClick={() => setSelectedPhoto(null)}
                        >
                            <button 
                                className="absolute top-6 right-6 text-white hover:text-champagne transition-colors z-10"
                            >
                                <CloseIcon />
                            </button>
                            <img 
                                src={selectedPhoto} 
                                alt="Vista ampliada" 
                                className="max-w-full max-h-full object-contain rounded-md shadow-2xl animate-[fadeIn_0.3s_ease-out] cursor-default"
                                onClick={(e) => e.stopPropagation()} 
                            />
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
