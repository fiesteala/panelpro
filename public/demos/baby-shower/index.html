<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ========================================== -->
    <!-- OPEN GRAPH ESTRICTO (WhatsApp Preview)     -->
    <!-- ========================================== -->
    <meta property="og:title" content="Pase VIP - Tania Estefania" />
    <meta property="og:description" content="Abre tu invitación y confirma tu asistencia." />
    <!-- REGLA ESTRICTA: Enlace absoluto público -->
    <meta property="og:image" content="https://tusitio.com/baby-shower/cover.jpg" />
    <meta property="og:url" content="https://baulia.com" />
    <meta property="og:type" content="website" />

    <title>Baby Shower | Tania Estefania</title>

    <!-- Google Fonts: Alta Costura -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración de Tailwind para Lujo -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blush: '#FFF0F2',
                        dustyrose: '#D8A7B1',
                        gold: '#C5A059',
                        champagne: '#F7E7CE'
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        cursive: ['Great Vibes', 'cursive'],
                        sans: ['Montserrat', 'sans-serif']
                    },
                    animation: {
                        'float-slow': 'float 45s linear infinite',
                        'float-medium': 'float 35s linear infinite',
                        'float-fast': 'float 25s linear infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%': { transform: 'translateY(10vh) translateX(0px) rotate(0deg) scale(0.8)', opacity: '0' },
                            '10%': { opacity: '1' },
                            '33%': { transform: 'translateY(-30vh) translateX(15px) rotate(10deg) scale(1)' },
                            '66%': { transform: 'translateY(-70vh) translateX(-15px) rotate(-10deg) scale(0.9)' },
                            '90%': { opacity: '1' },
                            '100%': { transform: 'translateY(-120vh) translateX(5px) rotate(15deg) scale(1.1)', opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Estilos Personalizados y Preloader CSS -->
    <style>
        body { margin: 0; -webkit-font-smoothing: antialiased; background-color: #FFF0F2; }
        
        /* Preloader Puro CSS (No bloquea React, desaparece solo) */
        #luxury-preloader {
            position: fixed;
            inset: 0;
            background-color: #FFF0F2;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeOutPreloader 1.5s ease-in-out forwards;
            animation-delay: 0.8s;
            pointer-events: none;
        }
        .preloader-monogram {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #D8A7B1;
            animation: subtleScale 1s ease-in-out infinite alternate;
        }
        @keyframes fadeOutPreloader {
            to { opacity: 0; visibility: hidden; }
        }
        @keyframes subtleScale {
            from { transform: scale(0.95); opacity: 0.7; }
            to { transform: scale(1.05); opacity: 1; }
        }

        /* Utilidades Glassmorphism Premium */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(216, 167, 177, 0.2);
        }

        /* Animación Ecualizador */
        .eq-bar {
            width: 3px;
            background-color: #C5A059;
            border-radius: 2px;
            transition: height 0.2s ease;
        }
        .playing .eq-bar:nth-child(1) { animation: eq 1s infinite alternate; }
        .playing .eq-bar:nth-child(2) { animation: eq 0.8s infinite alternate-reverse; animation-delay: 0.2s; }
        .playing .eq-bar:nth-child(3) { animation: eq 1.2s infinite alternate; animation-delay: 0.4s; }
        @keyframes eq {
            0% { height: 4px; }
            100% { height: 16px; }
        }
    </style>

    <!-- React, ReactDOM, Babel (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <!-- Preloader CSS Puro -->
    <div id="luxury-preloader">
        <div class="preloader-monogram">TE</div>
    </div>

    <!-- Contenedor Raíz de React -->
    <div id="root"></div>

    <!-- Lógica de React -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Componentes SVG Minimalistas y Rediseñados (Diseño Alta Costura)
        const RattleIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {/* Cabezal de la sonaja */}
                <circle cx="12" cy="7" r="5" />
                {/* Puntos internos de decoración */}
                <circle cx="12" cy="7" r="1" fill="currentColor" />
                <circle cx="10" cy="5.5" r="0.5" fill="currentColor" />
                <circle cx="14" cy="5.5" r="0.5" fill="currentColor" />
                <circle cx="10" cy="8.5" r="0.5" fill="currentColor" />
                <circle cx="14" cy="8.5" r="0.5" fill="currentColor" />
                {/* Mango */}
                <path d="M12 12v6" />
                {/* Anillo base */}
                <circle cx="12" cy="20" r="2" />
                {/* Lazo/moño sutil */}
                <path d="M9 13c1.5-1 4.5-1 6 0" />
            </svg>
        );

        const PacifierIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {/* Chupón (tetina) */}
                <path d="M9 10c0-3 1.5-5 3-5s3 2 3 5" />
                {/* Escudo protector */}
                <rect x="5" y="10" width="14" height="4" rx="2" />
                {/* Unión */}
                <path d="M10 14v2h4v-2" />
                {/* Argolla */}
                <circle cx="12" cy="18" r="3" />
            </svg>
        );

        // --- COMPONENTE VIP DE ANIMACIÓN (Fade In Up) ---
        const FadeInSection = ({ children, delay = 0 }) => {
            const [isVisible, setVisible] = useState(false);
            const domRef = useRef();
            
            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setVisible(true);
                            observer.unobserve(domRef.current);
                        }
                    });
                }, { threshold: 0.1 });
                
                if (domRef.current) observer.observe(domRef.current);
                return () => { if (domRef.current) observer.unobserve(domRef.current); }
            }, []);
            
            return (
                <div 
                    ref={domRef} 
                    className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        const App = () => {
            // Protección Anti-Robo en React
            useEffect(() => {
                const preventAction = (e) => e.preventDefault();
                document.addEventListener('contextmenu', preventAction);
                document.addEventListener('selectstart', preventAction);
                document.addEventListener('dragstart', preventAction);
                return () => {
                    document.removeEventListener('contextmenu', preventAction);
                    document.removeEventListener('selectstart', preventAction);
                    document.removeEventListener('dragstart', preventAction);
                };
            }, []);

            // Estados Generales
            const [guestName, setGuestName] = useState(null);
            const [language, setLanguage] = useState('es');
            const [isPlaying, setIsPlaying] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ Días: 0, Hrs: 0, Min: 0, Seg: 0 });
            const [scrollY, setScrollY] = useState(0);
            
            // Estados para las Funciones Especiales (Fases 3 y 4)
            const [copied, setCopied] = useState(false);
            const [currentGalleryIdx, setCurrentGalleryIdx] = useState(0); 
            const [demoFormStatus, setDemoFormStatus] = useState('form');
            const [isModalOpen, setIsModalOpen] = useState(false); // <-- Nuevo estado para el Modal

            const audioRef = useRef(null);

            // Listener de Scroll para dinámica de fondo fotográfico
            useEffect(() => {
                const handleScroll = () => setScrollY(window.scrollY);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Temporizador Cinemático para la Galería (Efecto Ken Burns)
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentGalleryIdx((prev) => (prev + 1) % 6);
                }, 5000); 
                return () => clearInterval(timer);
            }, []);

            // Fecha del evento (Modificable)
            const eventDate = new Date("2026-06-15T16:00:00").getTime();

            // Lógica de Cuenta Regresiva
            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = eventDate - now;

                    if (distance > 0) {
                        setTimeLeft({
                            Días: Math.floor(distance / (1000 * 60 * 60 * 24)),
                            Hrs: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            Min: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                            Seg: Math.floor((distance % (1000 * 60)) / 1000)
                        });
                    } else {
                        clearInterval(timer);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [eventDate]);

            // ID del evento solicitado
            const EVENT_ID = "ID_EXACTO_EN_FIREBASE";

            // Extracción Inteligente VIP (Sin bloquear UI)
            useEffect(() => {
                const fetchGuestData = async () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const guestUid = urlParams.get('u');

                    if (guestUid) {
                        try {
                            const response = await fetch(`https://firestore.googleapis.com/v1/projects/panel-de-control-intelig-db278/databases/(default)/documents/eventos/${EVENT_ID}/invitados/${guestUid}`);
                            if (response.ok) {
                                const data = await response.json();
                                if (data.fields && data.fields.name && data.fields.name.stringValue) {
                                    setGuestName(data.fields.name.stringValue);
                                }
                            }
                        } catch (error) {
                            console.error("Error al obtener datos del invitado:", error);
                        }
                    }
                };

                fetchGuestData();
            }, []);

            // Control de Música Minimalista
            const toggleMusic = () => {
                if (audioRef.current) {
                    if (isPlaying) {
                        audioRef.current.pause();
                    } else {
                        audioRef.current.play().catch(e => console.log("Interacción requerida primero"));
                    }
                    setIsPlaying(!isPlaying);
                }
            };

            // Simulación de Traductor
            const toggleLanguage = () => {
                setLanguage(prev => prev === 'es' ? 'en' : 'es');
            };

            // Copiado Seguro al Portapapeles (UX Estricto)
            const handleCopy = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000); 
                } catch (err) {
                    console.error('Error al copiar', err);
                }
                document.body.removeChild(textArea);
            };

            // Navegación GPS Estricta
            const handleGPS = (address) => {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                const isAndroid = /android/i.test(navigator.userAgent);
                const encodedAddress = encodeURIComponent(address);
                
                if (isIOS) {
                    window.location.href = `maps://?q=${encodedAddress}`;
                } else if (isAndroid) {
                    window.location.href = `geo:0,0?q=${encodedAddress}`;
                } else {
                    window.open(`https://maps.google.com/?q=${encodedAddress}`, '_blank');
                }
            };

            // Generador de .ics Estricto
            const handleAddToCalendar = () => {
                const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Baby Shower Tania Estefania
DESCRIPTION:Acompáñanos a celebrar la llegada de nuestra niña.
LOCATION:Salón de Eventos Los Arcos, Ciudad
DTSTART:20260615T160000Z
DTEND:20260615T210000Z
END:VEVENT
END:VCALENDAR`;
                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', 'Baby_Shower_Tania.ics');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Generación de Elementos Flotantes (Sonajas y Chupones)
            const floatingElements = useMemo(() => {
                const elements = [];
                const types = ['rattle', 'pacifier'];
                const speeds = ['animate-float-slow', 'animate-float-medium', 'animate-float-fast'];
                
                for (let i = 0; i < 15; i++) {
                    const isRattle = types[Math.floor(Math.random() * types.length)] === 'rattle';
                    const speed = speeds[Math.floor(Math.random() * speeds.length)];
                    const leftPos = Math.floor(Math.random() * 100);
                    // Retraso negativo ajustado a la nueva duración
                    const delay = -(Math.random() * 45); 
                    
                    elements.push(
                        <div 
                            key={i} 
                            className={`absolute text-dustyrose/40 ${speed}`}
                            style={{ left: `${leftPos}%`, animationDelay: `${delay}s`, top: '100%' }}
                        >
                            {isRattle ? 
                                <RattleIcon className="w-10 h-10 md:w-14 md:h-14" /> : 
                                <PacifierIcon className="w-10 h-10 md:w-14 md:h-14" />
                            }
                        </div>
                    );
                }
                return elements;
            }, []);

            return (
                <main className="relative w-full min-h-screen bg-blush selection:bg-dustyrose selection:text-white font-sans overflow-x-hidden">
                    
                    {/* Audio Oculto */}
                    <audio 
                        ref={audioRef} 
                        src="/baby-shower/cancion.mp3" 
                        loop 
                        preload="auto"
                    ></audio>

                    {/* === FONDOS DINÁMICOS DE ALTA COSTURA === */}
                    <div className="fixed inset-0 z-0 pointer-events-none bg-blush">
                        <div className="absolute inset-0 overflow-hidden opacity-80">
                            {floatingElements}
                        </div>
                    </div>

                    <div 
                        className="absolute top-0 left-0 w-full h-[120vh] z-0 pointer-events-none transition-opacity duration-75"
                        style={{ opacity: Math.max(0, 1 - scrollY / 600) }}
                    >
                        {/* Actualizado a <img> nativo con clases object-cover
                            Esto es idéntico a backgroundImage pero previene errores de carga en algunos servidores 
                        */}
                        <img 
                            src="/demos/baby-shower/portada.png" 
                            alt="Portada Baby Shower" 
                            className="absolute inset-0 w-full h-full object-cover object-center"
                        />
                        <div className="absolute inset-0 bg-gradient-to-b from-white/60 via-white/50 to-blush"></div>
                    </div>

                    {/* CONTENIDO PRINCIPAL SCROLLABLE (Z-20) */}
                    <div className="relative z-20 w-full flex flex-col items-center">
                        
                        {/* === SECCIÓN 1: PORTADA HERO === */}
                        <section className="relative w-full min-h-screen flex flex-col justify-end items-center px-6 pb-20 pt-[45vh] text-center z-20">
                            
                            <button 
                                onClick={toggleLanguage}
                                className="absolute top-6 right-6 md:top-10 md:right-10 text-xs font-sans tracking-[0.2em] text-dustyrose hover:text-gold transition-colors duration-300 z-30"
                            >
                                {language === 'es' ? 'EN' : 'ES'}
                            </button>

                            <div className="flex flex-col items-center z-20 relative w-full max-w-lg">
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[140%] h-[120%] bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.7)_0%,rgba(255,255,255,0.4)_45%,transparent_75%)] blur-lg -z-10 pointer-events-none"></div>

                                <div className="w-20 h-20 md:w-24 md:h-24 rounded-full border-[0.5px] border-gold flex items-center justify-center mb-6 bg-white/70 backdrop-blur-md shadow-[0_0_20px_rgba(255,255,255,0.8)]">
                                    <span className="font-cursive text-3xl md:text-4xl text-gold mt-2">TE</span>
                                </div>

                                <p className="font-sans text-xs md:text-sm tracking-[0.3em] uppercase text-gray-700 mb-3 drop-shadow-[0_0_8px_rgba(255,255,255,1)] font-bold">
                                    {language === 'es' ? 'Baby Shower de' : 'Baby Shower of'}
                                </p>
                                
                                <h1 className="font-cursive text-6xl md:text-8xl text-gray-900 mb-5 drop-shadow-[0_0_15px_rgba(255,255,255,0.8)]">
                                    Tania Estefania
                                </h1>

                                <div className="w-16 h-[1px] bg-gold/70 mb-5"></div>

                                <p className="font-serif text-lg md:text-xl text-gray-800 italic leading-relaxed px-6 py-4 mb-8 bg-white/40 backdrop-blur-sm rounded-3xl shadow-sm border-[0.5px] border-white/50 w-full">
                                    {language === 'es' 
                                        ? '"Un nuevo y dulce latido se suma a nuestra familia, llenando nuestros días de color rosa."'
                                        : '"A new and sweet heartbeat joins our family, filling our days with the color pink."'}
                                </p>

                                {guestName && (
                                    <div className="glass-panel px-8 py-5 rounded-2xl animate-[fadeInUp_1s_ease-out]">
                                        <p className="font-sans text-xs tracking-[0.15em] text-dustyrose uppercase mb-2">
                                            {language === 'es' ? 'Pase Especial Para' : 'Special Pass For'}
                                        </p>
                                        <p className="font-serif text-2xl md:text-3xl text-gray-900 font-medium">
                                            {guestName}
                                        </p>
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* === SECCIÓN 2: CUENTA REGRESIVA === */}
                        <section className="w-full max-w-4xl px-6 py-32 flex flex-col items-center text-center">
                            <FadeInSection>
                                <h2 className="font-cursive text-5xl md:text-6xl text-dustyrose mb-12">
                                    {language === 'es' ? 'Faltan' : 'Countdown'}
                                </h2>
                                <div className="flex gap-4 md:gap-8 justify-center items-center">
                                    {Object.entries(timeLeft).map(([unit, value], idx) => (
                                        <div key={idx} className="flex flex-col items-center">
                                            <div className="w-16 h-16 md:w-24 md:h-24 rounded-full border-[0.5px] border-gold/40 bg-white/40 backdrop-blur-md shadow-[0_8px_32px_0_rgba(216,167,177,0.15)] flex items-center justify-center mb-4 transition-transform hover:scale-105 duration-500">
                                                <span className="font-serif text-2xl md:text-4xl text-gray-800">{value}</span>
                                            </div>
                                            <span className="text-[10px] md:text-xs tracking-[0.2em] uppercase text-gray-500">{unit}</span>
                                        </div>
                                    ))}
                                </div>
                            </FadeInSection>
                        </section>

                        {/* === SECCIÓN 3: UBICACIÓN Y RECEPCIÓN === */}
                        <section className="w-full max-w-5xl px-6 py-24">
                            <FadeInSection>
                                <div className="glass-panel p-8 md:p-16 rounded-3xl text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-[1px] bg-gradient-to-r from-transparent via-gold to-transparent"></div>
                                    
                                    <h2 className="font-cursive text-5xl md:text-6xl text-gray-800 mb-6">
                                        {language === 'es' ? 'Cuándo & Dónde' : 'When & Where'}
                                    </h2>
                                    
                                    <p className="font-serif text-xl md:text-2xl text-gray-600 mb-2">15 de Junio, 2026</p>
                                    <p className="font-sans text-xs tracking-[0.2em] text-dustyrose uppercase mb-12">16:00 Hrs</p>

                                    <div className="flex flex-col items-center mb-12">
                                        <h3 className="font-serif text-2xl text-gray-800 mb-3">Salón Los Arcos</h3>
                                        <p className="font-sans text-sm text-gray-500 font-light max-w-xs leading-relaxed">
                                            Av. Paseo de las Flores 1234, Col. Jardines del Valle, Ciudad.
                                        </p>
                                    </div>

                                    <div className="flex flex-col sm:flex-row justify-center gap-6 mt-8">
                                        <button 
                                            onClick={() => handleGPS('Av. Paseo de las Flores 1234, Ciudad')}
                                            className="px-8 py-4 bg-white/70 border-[0.5px] border-gold/50 text-gray-700 font-sans text-xs tracking-widest uppercase rounded-full hover:bg-gold hover:text-white transition-all duration-500"
                                        >
                                            {language === 'es' ? 'Abrir GPS / Mapas' : 'Open GPS / Maps'}
                                        </button>
                                        <button 
                                            onClick={handleAddToCalendar}
                                            className="px-8 py-4 bg-dustyrose/90 text-white font-sans text-xs tracking-widest uppercase rounded-full hover:bg-gray-800 transition-all duration-500 shadow-[0_8px_20px_rgba(216,167,177,0.4)]"
                                        >
                                            {language === 'es' ? 'Agregar al Calendario' : 'Add to Calendar'}
                                        </button>
                                    </div>
                                </div>
                            </FadeInSection>
                        </section>

                        {/* === SECCIÓN 4: ITINERARIO === */}
                        <section className="w-full max-w-3xl px-6 py-32">
                            <FadeInSection>
                                <div className="text-center mb-20">
                                    <h2 className="font-cursive text-5xl md:text-6xl text-gray-800">
                                        {language === 'es' ? 'Itinerario' : 'Itinerary'}
                                    </h2>
                                    <div className="w-12 h-[1px] bg-gold/50 mx-auto mt-8"></div>
                                </div>

                                <div className="relative border-l-[0.5px] border-gold/40 ml-4 md:mx-auto md:ml-12 space-y-16 pb-10">
                                    {[
                                        { time: '16:00', title: 'Recepción', desc: 'Bebidas de bienvenida y acomodo de invitados.' },
                                        { time: '17:00', title: 'Juegos y Dinámicas', desc: 'Divirtámonos juntas celebrando la dulce espera.' },
                                        { time: '18:30', title: 'Cena', desc: 'Degustación de platillos especiales en honor a Tania.' },
                                        { time: '20:00', title: 'Mesa de Postres', desc: 'Corte de pastel y toma de fotografías familiares.' }
                                    ].map((item, idx) => (
                                        <div key={idx} className="relative pl-10 md:pl-16">
                                            <div className="absolute -left-[5px] top-1.5 w-2.5 h-2.5 rounded-full bg-dustyrose ring-4 ring-blush/80"></div>
                                            <FadeInSection delay={idx * 150}>
                                                <span className="font-sans text-[10px] md:text-xs tracking-widest text-gold mb-2 block">{item.time}</span>

                        onClick={toggleMusic}
                        className="fixed bottom-6 right-6 md:bottom-10 md:right-10 w-12 h-12 rounded-full glass-panel flex items-center justify-center cursor-pointer hover:bg-white/60 transition-all duration-300 z-[9990] shadow-lg border border-gold/30"
                        aria-label="Toggle Music"
                    >
                        <div className={`flex items-end justify-center space-x-1 h-4 w-4 ${isPlaying ? 'playing' : ''}`}>
                            <div className="eq-bar h-[4px]"></div>
                            <div className="eq-bar h-[10px]"></div>
                            <div className="eq-bar h-[6px]"></div>
                        </div>
                    </button>

                    {/* === BOTÓN FLOTANTE INTELIGENTE DE COMPRA (CRÍTICO) === */}
                    <button
                        onClick={() => {
                            if (window !== window.parent) {
                                // Estamos dentro de un iframe (Ej. Creador de Baulia)
                                window.parent.postMessage('open_checkout', '*');
                            } else {
                                // Es un link directo (Visualización externa)
                                window.location.href = 'https://baulia.com/#planes';
                            }
                        }}
                        className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[9999] px-6 py-3 bg-gradient-to-r from-gray-900 to-black text-white font-sans text-xs md:text-sm tracking-widest uppercase rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.4)] border border-gray-700/50 hover:scale-105 transition-transform duration-300 flex items-center gap-2 whitespace-nowrap"
                    >
                        <span className="text-sm">✨</span> Adquirir esta tecnología
                    </button>

                    {/* === MODAL DE RSVP (FORMULARIO Y SUCCESS DEMO) === */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center px-4">
                            {/* Backdrop desenfocado */}
                            <div 
                                className="absolute inset-0 bg-black/40 backdrop-blur-md transition-opacity" 
                                onClick={() => setIsModalOpen(false)}
                            ></div>

                            {/* Contenido del Modal (Glassmorphism) */}
                            <div className="relative w-full max-w-md glass-panel p-8 md:p-12 rounded-[40px] shadow-2xl bg-white/90 animate-[fadeInUp_0.3s_ease-out] text-center border-[0.5px] border-white">
                                
                                {/* Botón Cerrar (X) */}
                                <button 
                                    onClick={() => setIsModalOpen(false)}
                                    className="absolute top-6 right-6 text-gray-400 hover:text-gray-800 transition-colors bg-white/50 rounded-full p-2"
                                >
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                </button>

                                <h2 className="font-cursive text-4xl md:text-5xl text-gray-800 mb-4 mt-2">
                                    {language === 'es' ? 'Reserva tu lugar' : 'Reserve your spot'}
                                </h2>
                                <div className="w-12 h-[1px] bg-gold/50 mx-auto mb-8"></div>

                                {demoFormStatus === 'form' ? (
                                    <form 
                                        onSubmit={(e) => { 
                                            e.preventDefault(); 
                                            setDemoFormStatus('success'); 
                                        }} 
                                        className="flex flex-col gap-5 w-full mx-auto"

                                        <div className="flex flex-col text-left">
                                            <label className="font-sans text-[10px] tracking-widest uppercase text-dustyrose mb-2 ml-4">Nombre y Apellido</label>
                                            <input 
                                                required 
                                                type="text" 
                                                placeholder="Ej. Ana García" 
                                                className="w-full bg-white/60 border border-gold/30 rounded-full px-6 py-4 font-serif text-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-gold/40 transition-shadow shadow-inner placeholder:text-gray-400" 
                                            />
                                        </div>
                                        <div className="flex flex-col text-left relative">
                                            <label className="font-sans text-[10px] tracking-widest uppercase text-dustyrose mb-2 ml-4">Pases a confirmar</label>
                                            <select className="w-full bg-white/60 border border-gold/30 rounded-full px-6 py-4 font-serif text-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-gold/40 transition-shadow shadow-inner appearance-none cursor-pointer pr-12">

                                                <option>2 Pases</option>
                                                <option>3 Pases</option>

                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                            </div>
                                        </div>
                                        <button 
                                            type="submit" 
                                            className="mt-4 w-full py-4 rounded-full bg-gray-800 text-white font-sans text-xs tracking-widest uppercase hover:bg-gold transition-colors duration-500 shadow-[0_8px_25px_rgba(0,0,0,0.2)]"
                                        >
                                            Generar Pase QR
                                        </button>
                                    </form>
                                ) : (
                                    <div className="flex flex-col items-center animate-[fadeInUp_0.5s_ease-out] py-4">
                                        <div className="w-20 h-20 rounded-full bg-green-50 border border-green-200 flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(74,222,128,0.2)]">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-10 h-10">

                                        >

                        </div>
                    )}

                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <!-- Protección Anti-Robo de Código HTML Nativo (Bloqueo de atajos F12, Ctrl+U) -->
    <script>
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
        }
    </script>
