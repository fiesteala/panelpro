<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Maricela - Mis 50 Años | Invitación</title>
    
    <!-- Meta etiquetas de Open Graph para vista previa en WhatsApp y redes sociales -->
    <meta property="og:title" content="¡Mis 50 Primaveras! - Maricela 🌸">
    <meta property="og:description" content="¡Hola! ✨ Con mucha emoción y gratitud me preparo para celebrar mis 50 primaveras. 🌸 Llegar a esta hermosa etapa rodeada de las personas que más aprecio es mi mayor regalo, por eso me haría muy feliz que me acompañaras a festejar la vida y crear recuerdos inolvidables. 🎉 Aquí te comparto mi invitación con todos los detalles (lugar, fecha y para que me confirmes tu asistencia): 👇">
    <meta property="og:image" content="/maricela-estudillo-gonzalez/portada.jpg">
    <meta property="og:type" content="website">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { light: '#FDF1A9', DEFAULT: '#D4AF37', dark: '#AA8529', warm: '#B48E2F' },
                        spring: { pink: '#F76C82', yellow: '#FFD166', green: '#8DB580', dark: '#2A2A2A' }
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        script: ['"Pinyon Script"', 'cursive'],
                        sans: ['"Montserrat"', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 1.2s ease-out forwards',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulseSlow 4s infinite alternate',
                        'slow-zoom': 'slowZoom 20s ease-in-out infinite alternate',
                        'spin-slow': 'spin 20s linear infinite',
                        'falling-1': 'falling 15s linear infinite',
                        'falling-2': 'falling 18s linear infinite 5s',
                        'falling-3': 'falling 22s linear infinite 10s',
                    },
                    keyframes: {
                        fadeInUp: { '0%': { opacity: '0', transform: 'translateY(40px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } },
                        pulseSlow: { '0%': { transform: 'scale(1)', opacity: '0.8' }, '100%': { transform: 'scale(1.05)', opacity: '1' } },
                        slowZoom: { '0%': { transform: 'scale(1)' }, '100%': { transform: 'scale(1.15)' } },
                        falling: {
                            '0%': { transform: 'translate(0, -10vh) rotate(0deg)', opacity: '0' },
                            '10%': { opacity: '0.6' }, '90%': { opacity: '0.6' },
                            '100%': { transform: 'translate(20vw, 100vh) rotate(360deg)', opacity: '0' },
                        }
                    },
                    boxShadow: { 'card-luxury': '0 20px 50px -10px rgba(0, 0, 0, 0.3), 0 0 30px rgba(212, 175, 55, 0.1)' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #1a1a1a; overflow-x: hidden; }
        .text-gold-metallic {
            background: linear-gradient(to right, #BF953F, #D4AF37, #B38728, #FDF1A9, #AA771C);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: transparent;
        }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased text-spring-dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const FloralCorner = ({ className, style }) => (
            <svg viewBox="0 0 200 200" className={className} style={style} xmlns="http://www.w3.org/2000/svg">
                <g transform="scale(0.8) translate(20, 20)">
                    <path d="M 40 100 C 10 70, 20 20, 80 10 C 80 60, 60 90, 40 100 Z" fill="#8DB580" opacity="0.8"/>
                    <path d="M 100 40 C 70 10, 20 20, 10 80 C 60 80, 90 60, 100 40 Z" fill="#A3C697" opacity="0.9"/>
                    <path d="M 130 140 C 160 170, 180 130, 170 80 C 140 90, 120 120, 130 140 Z" fill="#8DB580" opacity="0.8"/>
                    <circle cx="120" cy="70" r="30" fill="#FFD166" />
                    <circle cx="120" cy="70" r="15" fill="#FFB347" />
                    <path d="M 120 40 C 130 20, 150 20, 145 45 C 165 40, 175 60, 150 70 C 175 80, 165 100, 145 95 C 150 120, 130 120, 120 100 C 110 120, 90 120, 95 95 C 75 100, 65 80, 90 70 C 65 60, 75 40, 95 45 C 90 20, 110 20, 120 40 Z" fill="#FFE28A" opacity="0.9"/>
                    <circle cx="70" cy="120" r="35" fill="#F76C82" />
                    <circle cx="70" cy="120" r="15" fill="#D84A63" />
                    <path d="M 70 85 C 85 60, 110 65, 100 90 C 125 80, 140 105, 110 120 C 140 135, 125 160, 100 150 C 110 175, 85 180, 70 155 C 55 180, 30 175, 40 150 C 15 160, 0 135, 30 120 C 0 105, 15 80, 40 90 C 30 65, 55 60, 70 85 Z" fill="#FF8FA3" opacity="0.9"/>
                    <circle cx="120" cy="70" r="5" fill="#D4AF37" />
                    <circle cx="70" cy="120" r="6" fill="#D4AF37" />
                    <path d="M 90 90 Q 100 100, 110 90" stroke="#D4AF37" strokeWidth="2" fill="none"/>
                </g>
            </svg>
        );

        const RevealOnScroll = ({ children, delay = "", className = "" }) => {
            const domRef = useRef();
            const [isVisible, setVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    if (entries[0].isIntersecting) {
                        setVisible(true);
                        observer.unobserve(domRef.current);
                    }
                }, { threshold: 0.15 });
                if (domRef.current) observer.observe(domRef.current);
                return () => { if(domRef.current) observer.unobserve(domRef.current); }
            }, []);
            return (
                <div ref={domRef} className={`transition-all duration-1000 transform ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-16'} ${delay} ${className}`}>
                    {children}
                </div>
            );
        };

        const App = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            const [guestName, setGuestName] = useState('');
            const eventIdStr = "maricela-estudillo-gonzalez";
            
            const urlParams = new URLSearchParams(window.location.search);
            const guestUid = urlParams.get('u') || '';

            const audioRef = useRef(null);
            const WHATSAPP_NUMBER = "528125970324";

            useEffect(() => {
                if(guestUid) {
                    fetch(`https://firestore.googleapis.com/v1/projects/panel-de-control-intelig-db278/databases/(default)/documents/eventos/${eventIdStr}/invitados/${guestUid}`)
                    .then(res => res.json())
                    .then(data => {
                        if(data && data.fields && data.fields.name) {
                            setGuestName(data.fields.name.stringValue);
                        }
                    }).catch(err => console.log("Guest no encontrado"));
                }
            }, [guestUid]);

            useEffect(() => {
                const targetDate = new Date("June 6, 2026 14:00:00").getTime();
                const interval = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = targetDate - now;
                    if (distance < 0) clearInterval(interval);
                    else {
                        setTimeLeft({
                            days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                            hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                            minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                            seconds: Math.floor((distance % (1000 * 60)) / 1000)
                        });
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            const toggleAudio = () => {
                if (isPlaying) audioRef.current.pause();
                else audioRef.current.play();
                setIsPlaying(!isPlaying);
            };

            const handleCalendarClick = (e) => {
                e.preventDefault();
                const icsString = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Baulia//Invitacion//ES\nBEGIN:VEVENT\nSUMMARY:Mis 50 Años - Maricela\nDTSTART:20260606T200000Z\nDTEND:20260607T020000Z\nLOCATION:Los Pikitos salon de eventos, Calle Pedro de Gante 6, 96737 Minatitlán, Ver.\nDESCRIPTION:Celebración de los 50 Años de Maricela Estudillo González\nEND:VEVENT\nEND:VCALENDAR";
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                
                if (isIOS) {
                    window.open("data:text/calendar;charset=utf8," + encodeURIComponent(icsString));
                } else {
                    const blob = new Blob([icsString], { type: "text/calendar;charset=utf-8" });
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = url;
                    link.download = "Mis_50_Anos_Maricela.ics";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            };

            const handleWhatsAppRSVP = () => {
                const message = `¡Hola! Confirmo mi asistencia para los 50 años de Maricela.`;
                const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
                window.open(url, '_blank');
            };

            return (
                <div className="relative min-h-screen w-full overflow-hidden font-sans bg-[#FDFBF7]">
                    
                    <audio ref={audioRef} id="bg-music" src="/maricela-estudillo-gonzalez/cancion.mp3" loop />

                    <div className="fixed inset-0 z-0 overflow-hidden bg-gradient-to-br from-[#FFF5F5] via-[#FDFBF7] to-[#FDF1F3]">
                        <div className="absolute top-0 left-[15%] w-3 h-3 md:w-4 md:h-4 bg-spring-pink/40 rounded-full blur-[1px] animate-falling-1 z-0"></div>
                        <div className="absolute top-0 left-[50%] w-2 h-2 md:w-3 md:h-3 bg-gold/40 rounded-full blur-[1px] animate-falling-2 z-0"></div>
                        <div className="absolute top-0 left-[85%] w-4 h-4 md:w-5 md:h-5 bg-spring-pink/30 rounded-full blur-[2px] animate-falling-3 z-0"></div>

                        <div className="absolute -top-16 -left-16 w-80 h-80 md:w-[36rem] md:h-[36rem] opacity-75 transform -rotate-12 z-0">
                            <FloralCorner className="w-full h-full animate-float drop-shadow-2xl" />
                        </div>
                        <div className="absolute -bottom-16 -right-16 w-80 h-80 md:w-[36rem] md:h-[36rem] opacity-75 transform rotate-[165deg] z-0">
                            <FloralCorner className="w-full h-full animate-float drop-shadow-2xl" style={{ animationDelay: '2s' }} />
                        </div>
                    </div>

                    <div className="fixed top-6 right-6 z-50 flex gap-3 animate-fade-in-up">
                        <button onClick={toggleAudio} className={`bg-white/80 backdrop-blur-md p-3 rounded-full shadow-lg border border-gold/30 text-gold-dark transition-all duration-300 hover:scale-110 active:scale-95 flex items-center justify-center ${isPlaying ? 'bg-spring-pink/10 border-spring-pink' : ''}`}>
                            {isPlaying ? (
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" className="text-spring-pink"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                            ) : (
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" className="ml-0.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            )}
                        </button>
                    </div>

                    {/* SECCIÓN HEAD */}
                    <main className="relative z-10 flex flex-col items-center justify-center min-h-screen p-4 md:p-8">
                        <div className="relative w-full max-w-lg flex flex-col items-center text-center mt-12 mb-20 animate-fade-in-up">
                            
                            <div className="mb-8 z-20 animate-pulse-slow">
                                <img src="/maricela-estudillo-gonzalez/monograma.svg" alt="Monograma" className="w-20 h-20 md:w-24 md:h-24 mx-auto drop-shadow-md object-contain" />
                            </div>

                            <div className="flex flex-col items-center z-10 px-4 mb-8">
                                <span className="font-sans text-xs md:text-sm tracking-[0.4em] uppercase text-spring-green font-semibold mb-4">Celebrando la vida</span>
                                <h1 className="font-serif text-6xl md:text-8xl mb-2 text-spring-dark leading-none">Maricela</h1>
                                <h2 className="font-sans text-xs md:text-sm tracking-[0.3em] md:tracking-[0.5em] uppercase font-medium text-gold-dark/80">Estudillo González</h2>
                            </div>

                            <div className="relative w-64 h-80 md:w-72 md:h-[26rem] rounded-full p-2 border border-gold/30 bg-white/40 backdrop-blur-sm shadow-xl z-10 mb-10 overflow-hidden">
                                <div className="w-full h-full rounded-full overflow-hidden relative">
                                    <img src="/maricela-estudillo-gonzalez/portada.jpg" alt="Foto de Maricela" className="w-full h-full object-cover animate-slow-zoom"/>
                                </div>
                            </div>

                            <div className="mb-6 z-10 w-full flex items-center justify-center gap-4 px-2">
                                <div className="h-px w-12 bg-gradient-to-r from-transparent to-gold"></div>
                                <span className="font-script text-5xl md:text-6xl text-spring-pink font-semibold">50 Primaveras</span>
                                <div className="h-px w-12 bg-gradient-to-l from-transparent to-gold"></div>
                            </div>

                            <div className="max-w-md z-10 px-6">
                                <p className="font-serif italic text-xl md:text-2xl text-gray-700 leading-relaxed">
                                    "Llegar a esta primavera es celebrar las flores de ayer y las semillas del mañana."
                                </p>
                            </div>
                        </div>
                    </main>

                    <div className="relative z-10 flex flex-col items-center w-full px-4 md:px-8 pb-10 space-y-20">
                        
                        {/* BIENVENIDA VIP */}
                        {guestName && (
                            <RevealOnScroll className="w-full max-w-2xl flex flex-col items-center text-center mt-4 mb-4 px-4">
                                <div className="bg-white/60 backdrop-blur-xl border border-gold/30 p-8 rounded-[2rem] shadow-card-luxury relative overflow-hidden group">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-gold to-transparent"></div>
                                    <span className="font-sans text-[10px] tracking-[0.3em] uppercase text-gold-dark font-bold mb-3 block flex items-center justify-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3 text-spring-pink" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clipRule="evenodd" /></svg>
                                        Pase VIP Personal
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3 text-spring-pink" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clipRule="evenodd" /></svg>
                                    </span>
                                    <h3 className="font-serif text-3xl md:text-4xl text-spring-dark mb-4">
                                        ¡Qué alegría tenerte aquí, <br/><span className="text-spring-pink italic">{guestName}</span>!
                                    </h3>
                                    <p className="font-sans text-sm text-gray-600 leading-relaxed font-medium">
                                        Este espacio fue diseñado especialmente para ti. Desliza hacia abajo para descubrir todos los detalles y confirmar tu asistencia.
                                    </p>
                                </div>
                            </RevealOnScroll>
                        )}

                        {/* CUENTA REGRESIVA */}
                        <RevealOnScroll className="w-full max-w-2xl flex flex-col items-center mt-10">
                            <span className="font-sans text-xs md:text-sm tracking-[0.4em] uppercase text-gold-warm font-medium mb-8">Faltan</span>
                            <div className="flex justify-center gap-3 md:gap-8 w-full">
                                {[
                                    { label: 'Días', value: timeLeft.days },
                                    { label: 'Hrs', value: timeLeft.hours },
                                    { label: 'Min', value: timeLeft.minutes },
                                    { label: 'Seg', value: timeLeft.seconds }
                                ].map((item, idx) => (
                                    <div key={idx} className="flex flex-col items-center w-[4.5rem] md:w-28 group">
                                        <div className="w-16 h-16 md:w-24 md:h-24 rounded-full border border-gold/30 bg-white/60 backdrop-blur-md shadow-lg flex items-center justify-center mb-4 transition-transform duration-500 group-hover:scale-110">
                                            <span className="font-serif text-3xl md:text-5xl text-spring-dark">{item.value}</span>
                                        </div>
                                        <span className="font-sans text-[0.65rem] md:text-xs tracking-[0.2em] uppercase text-gray-500 font-medium">{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </RevealOnScroll>

                        {/* TARJETA UNIFICADA (Ubicación + Agradecimiento) */}
                        <RevealOnScroll className="w-full max-w-2xl pt-10">
                            <div className="bg-white/80 backdrop-blur-xl rounded-[3rem] p-8 md:p-14 border border-gold/20 shadow-card-luxury flex flex-col items-center text-center relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-40 h-40 bg-spring-pink/10 rounded-full blur-3xl pointer-events-none"></div>
                                
                                <span className="font-sans text-xs tracking-[0.3em] uppercase text-spring-green font-semibold mb-4 z-10">Dónde y Cuándo</span>
                                
                                <div className="flex flex-col items-center mb-10 z-10">
                                    <div className="w-12 h-12 rounded-full bg-gold/10 flex items-center justify-center mb-5">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 text-gold-dark" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                    </div>
                                    <div className="mb-3">
                                        <h3 className="font-serif text-5xl text-gray-800 leading-tight">Los Pikitos</h3>
                                        <p className="font-sans text-lg tracking-[0.1em] uppercase text-gray-500 font-medium">Salón de eventos</p>
                                    </div>
                                    <p className="font-sans text-sm md:text-base text-gray-500 leading-relaxed px-4">
                                        Calle Pedro de Gante 6,<br/>96737 Minatitlán, Ver.<br/>
                                        <span className="font-bold text-gold-dark tracking-widest uppercase mt-3 block text-xs">Sábado, 6 de Junio • 14:00 hrs</span>
                                    </p>
                                </div>

                                <div className="flex flex-col md:flex-row gap-4 w-full md:justify-center z-10 mb-12">
                                    <a href="https://maps.app.goo.gl/LbmM6Wugqp9GUxLf9" target="_blank" rel="noopener noreferrer" className="px-8 py-4 bg-spring-dark text-white rounded-full font-sans text-xs tracking-[0.2em] uppercase transition-all duration-300 hover:bg-gold-dark hover:shadow-lg hover:-translate-y-1 flex justify-center items-center">Ver en GPS</a>
                                    <button onClick={handleCalendarClick} className="px-8 py-4 bg-transparent text-spring-dark border border-gold-dark rounded-full font-sans text-xs tracking-[0.2em] uppercase transition-all duration-300 hover:bg-gold/5 hover:-translate-y-1 flex justify-center items-center">Agendar</button>
                                </div>

                                <div className="pt-10 border-t border-gold/20 w-full flex flex-col items-center z-10">
                                    <svg className="w-8 h-8 text-spring-pink mb-4 opacity-70" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                    <h4 className="font-serif text-3xl md:text-4xl text-spring-dark mb-4">¡Gracias por acompañarme!</h4>
                                    <p className="font-sans text-sm md:text-base text-gray-500 leading-relaxed max-w-md px-2">
                                        Tu presencia es el regalo más hermoso. Me hace muy feliz poder compartir este momento tan importante y especial contigo.
                                    </p>
                                </div>
                            </div>
                        </RevealOnScroll>

                        {/* SECCIÓN CONFIRMACIÓN */}
                        <RevealOnScroll className="w-full max-w-xl pb-10 pt-4">
                            <div className="flex flex-col items-center text-center">
                                <h3 className="font-serif text-4xl md:text-5xl text-spring-dark mb-10 px-4">
                                    Acompáñame a celebrar este día tan especial
                                </h3>
                                
                                <button 
                                    onClick={handleWhatsAppRSVP}
                                    className="w-full py-6 md:py-8 rounded-full font-sans font-bold text-xs md:text-sm tracking-[0.4em] uppercase shadow-2xl transition-all duration-500 flex justify-center items-center group relative overflow-hidden bg-spring-pink text-white hover:scale-[1.03] hover:bg-gold-warm"
                                >
                                    <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                                    <span className="relative z-10 flex items-center justify-center gap-3 w-full">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 8.38 0 0 1 3.8.9L21 3z"></path></svg>
                                        Confirmar
                                    </span>
                                </button>
                                
                                <p className="mt-8 font-script text-3xl md:text-4xl text-gold-warm">Maricela espera tu confirmación</p>
                            </div>
                        </RevealOnScroll>

                    </div>

                    {/* FOOTER PROMOCIONAL BAULIA */}
                    <footer className="w-full text-center pb-12 pt-10">
                        <div className="w-full max-w-2xl mx-auto flex flex-col items-center border-t border-gold/20 pt-12">
                            
                            <RevealOnScroll className="w-full px-4">
                                <div className="relative overflow-hidden bg-white/40 backdrop-blur-md rounded-[2rem] p-8 md:p-10 border border-gold/30 shadow-xl group transition-all duration-500">
                                    <div className="relative z-10 flex flex-col items-center">
                                        <span className="font-serif italic text-xl md:text-2xl text-gray-700 mb-4">
                                            ¿Te encantó esta invitación?
                                        </span>
                                        
                                        <p className="font-sans text-xs md:text-sm text-gray-500 mb-6 max-w-md tracking-wide">
                                            Crea una experiencia digital inolvidable para tu próximo evento.
