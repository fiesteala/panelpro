<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph (WhatsApp Preview) -->
    <meta property="og:title" content="Misión VIP - Keyli K-Pop Hunters" />
    <meta property="og:description" content="Abre tu archivo de misión y confirma tu asistencia a la arena." />
    <meta property="og:image" content="[LINK_DE_FOTO_PORTADA.jpg]" />
    <meta property="og:url" content="https://baulia.com" />
    <meta property="og:type" content="website" />

    <title>Pase VIP - Keyli</title>

    <!-- Google Fonts: Orbitron y Rajdhani -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neonPink: '#ff2e93',
                        skyBlue: '#00e5ff',
                        neonPurple: '#b724ff',
                        cyberDark: '#0a0514',
                    },
                    fontFamily: {
                        cyber: ['Orbitron', 'sans-serif'],
                        body: ['Rajdhani', 'sans-serif'],
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                        'breathe': 'breathe 15s ease-in-out infinite alternate',
                        'spin-slow': 'spin 3s linear infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95) translateY(10px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' }
                        },
                        breathe: {
                            '0%': { transform: 'scale(1)' },
                            '100%': { transform: 'scale(1.08)' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Estilos Personalizados - Versión Noche Mágica -->
    <style type="text/tailwindcss">
        @layer utilities {
            .text-glow-pink { text-shadow: 0 0 10px #ff2e93, 0 0 20px #ff2e93; }
            .text-glow-blue { text-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff; }
            .text-glow-purple { text-shadow: 0 0 10px #b724ff, 0 0 30px #b724ff; }
            
            .box-glow-pink { box-shadow: 0 0 15px rgba(255, 46, 147, 0.5), inset 0 0 10px rgba(255, 46, 147, 0.2); }
            .box-glow-purple { box-shadow: 0 0 20px rgba(183, 36, 255, 0.4), inset 0 0 15px rgba(183, 36, 255, 0.2); }
            .box-glow-blue { box-shadow: 0 0 15px rgba(0, 229, 255, 0.4), inset 0 0 10px rgba(0, 229, 255, 0.1); }
            
            /* Nuevas Tarjetas Traslúcidas K-Pop (Efecto Holograma Mágico) */
            .glass-panel {
                background: linear-gradient(135deg, rgba(30, 10, 50, 0.25) 0%, rgba(10, 5, 25, 0.4) 100%);
                backdrop-filter: blur(6px);
                -webkit-backdrop-filter: blur(6px);
                border: 1px solid rgba(183, 36, 255, 0.2);
                border-top: 1px solid rgba(255, 46, 147, 0.5);
                border-left: 1px solid rgba(0, 229, 255, 0.4);
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
                position: relative;
                overflow: hidden;
            }
            .glass-panel-highlight {
                background: linear-gradient(135deg, rgba(40, 10, 60, 0.35) 0%, rgba(15, 5, 30, 0.5) 100%);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                border: 1px solid rgba(183, 36, 255, 0.4);
                border-top: 1px solid rgba(183, 36, 255, 0.7);
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
                position: relative;
                overflow: hidden;
            }
            
            /* Animación de Escaneo Holográfico */
            .glass-panel::after, .glass-panel-highlight::after, .hologram-overlay {
                content: '';
                position: absolute;
                top: -150%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: linear-gradient(to bottom, transparent, rgba(0, 229, 255, 0.05) 45%, rgba(255, 46, 147, 0.25) 50%, rgba(183, 36, 255, 0.05) 55%, transparent);
                transform: rotate(30deg);
                animation: hologram-scan 5s linear infinite;
                pointer-events: none;
                z-index: 50;
            }
            
            @keyframes hologram-scan {
                0% { transform: rotate(30deg) translateY(-100%); }
                100% { transform: rotate(30deg) translateY(100%); }
            }

            /* Efecto Glitch y Neón */
            .glitch { position: relative; }
            .glitch::before, .glitch::after {
                content: attr(data-text);
                position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
            }
            .glitch::before {
                left: 2px; text-shadow: -2px 0 #ff2e93; clip: rect(24px, 550px, 90px, 0);
                animation: glitch-anim-2 3s infinite linear alternate-reverse;
            }
            .glitch::after {
                left: -2px; text-shadow: -2px 0 #00e5ff; clip: rect(85px, 550px, 140px, 0);
                animation: glitch-anim 2.5s infinite linear alternate-reverse;
            }
            
            @keyframes glitch-anim {
                0% { clip: rect(10px, 9999px, 86px, 0); }
                20% { clip: rect(72px, 9999px, 14px, 0); }
                40% { clip: rect(32px, 9999px, 98px, 0); }
                60% { clip: rect(87px, 9999px, 12px, 0); }
                80% { clip: rect(4px, 9999px, 64px, 0); }
                100% { clip: rect(62px, 9999px, 32px, 0); }
            }
            @keyframes glitch-anim-2 {
                0% { clip: rect(65px, 9999px, 100px, 0); }
                20% { clip: rect(12px, 9999px, 45px, 0); }
                40% { clip: rect(89px, 9999px, 23px, 0); }
                60% { clip: rect(45px, 9999px, 76px, 0); }
                80% { clip: rect(21px, 9999px, 98px, 0); }
                100% { clip: rect(9px, 9999px, 54px, 0); }
            }
            @keyframes neon-flicker {
                0%, 18%, 22%, 25%, 53%, 57%, 100% {
                    filter: drop-shadow(0 0 5px #ff2e93) drop-shadow(0 0 15px #b724ff) drop-shadow(0 0 30px #00e5ff); opacity: 1;
                }
                20%, 24%, 55% { filter: drop-shadow(0 0 2px #ff2e93); opacity: 0.6; }
            }
            .animate-neon-flicker { animation: neon-flicker 4s infinite alternate; }

            /* Logo Baulia Text Color */
            .baulia-text { fill: #ffffff; transition: fill 0.5s ease; }
        }

        /* Ocultar scrollbar visualmente */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-cyberDark text-white font-body selection:bg-neonPurple selection:text-white overflow-hidden h-screen w-screen">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // COMPONENTE: CUENTA REGRESIVA MAGICAL
        // ==========================================
        const Countdown = () => {
            const calculateTimeLeft = () => {
                const difference = +new Date("2026-04-12T12:00:00") - +new Date();
                let timeLeft = {};

                if (difference > 0) {
                    timeLeft = {
                        DÍAS: Math.floor(difference / (1000 * 60 * 60 * 24)),
                        HRS: Math.floor((difference / (1000 * 60 * 60)) % 24),
                        MIN: Math.floor((difference / 1000 / 60) % 60),
                        SEG: Math.floor((difference / 1000) % 60)
                    };
                } else {
                    timeLeft = { DÍAS: 0, HRS: 0, MIN: 0, SEG: 0 };
                }
                return timeLeft;
            };

            const [timeLeft, setTimeLeft] = useState(calculateTimeLeft());

            useEffect(() => {
                const timer = setTimeout(() => {
                    setTimeLeft(calculateTimeLeft());
                }, 1000);
                return () => clearTimeout(timer);
            });

            return (
                <div className="glass-panel-highlight p-6 md:p-8 rounded-3xl box-glow-purple flex flex-col items-center w-full max-w-lg mx-auto relative overflow-hidden group">
                    <div className="absolute -right-6 -top-6 opacity-10 font-cyber text-9xl text-neonPurple transform rotate-12 group-hover:scale-110 transition-transform duration-700 z-0">
                        ✦
                    </div>

                    <h2 className="font-cyber text-neonPink text-sm md:text-base tracking-[0.3em] uppercase mb-6 text-center z-10 relative">
                        <span className="text-skyBlue text-glow-blue">Tiempo para el Despliegue</span>
                    </h2>
                    
                    <div className="flex gap-4 md:gap-8 justify-center w-full z-10 relative">
                        {Object.keys(timeLeft).map((interval, i) => (
                            <div key={i} className="flex flex-col items-center w-16 md:w-20">
                                <span className="font-cyber text-4xl md:text-5xl text-white text-glow-purple">
                                    {timeLeft[interval].toString().padStart(2, '0')}
                                </span>
                                <span className="font-cyber text-skyBlue text-[10px] md:text-xs tracking-widest mt-2 border-t border-neonPurple/50 pt-2 w-full text-center">
                                    {interval}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==========================================
        // COMPONENTE: TARJETA DE UBICACIÓN TÁCTICA
        // ==========================================
        const LocationCard = ({ type, title, time, address, mainMapUrl, isReception }) => {
            const calLink = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=Misión+K-Pop:+Keyli+(${type})&dates=20260412T180000Z/20260413T020000Z&details=Únete+al+escuadrón+en+esta+batalla+sónica.&location=${encodeURIComponent(address)}`;

            return (
                <div className={`glass-panel p-6 md:p-8 rounded-3xl relative overflow-hidden group transition-all duration-500 hover:-translate-y-2 ${isReception ? 'hover:box-glow-purple' : 'hover:box-glow-blue'}`}>
                    <div className={`absolute top-0 left-0 w-1.5 h-full ${isReception ? 'bg-neonPurple shadow-[0_0_10px_#b724ff]' : 'bg-skyBlue shadow-[0_0_10px_#00e5ff]'} z-10`}></div>
                    
                    <div className="pl-4 relative z-10">
                        <div className="flex justify-between items-start mb-2">
                            <h3 className="text-2xl md:text-3xl font-cyber text-white uppercase tracking-wide">{title}</h3>
                            <span className={`font-cyber text-sm px-3 py-1 rounded-full border ${isReception ? 'border-neonPurple text-neonPurple bg-neonPurple/10' : 'border-skyBlue text-skyBlue bg-skyBlue/10'}`}>
                                {time}
                            </span>
                        </div>
                        
                        <p className={`font-cyber text-xs tracking-[0.2em] mb-3 uppercase font-bold ${isReception ? 'text-neonPink' : 'text-neonPurple'}`}>
                            {type}
                        </p>
                        <p className="font-body text-gray-200 text-lg md:text-xl leading-relaxed mb-8 border-l-2 border-white/10 pl-3">
                            {address}
                        </p>

                        <div className="flex flex-col gap-3">
                            <a href={mainMapUrl} target="_blank" rel="noopener noreferrer" 
                               className={`flex items-center justify-center gap-3 w-full py-3.5 rounded-xl uppercase font-cyber text-sm tracking-widest transition-all duration-300 
                               ${isReception ? 'bg-neonPurple text-white hover:bg-white hover:text-neonPurple hover:shadow-[0_0_20px_#b724ff]' : 'bg-skyBlue text-cyberDark hover:bg-white hover:text-skyBlue hover:shadow-[0_0_20px_#00e5ff]'}`}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                                Fijar Coordenadas
                            </a>

                            <a href={calLink} target="_blank" rel="noopener noreferrer"
                               className="flex items-center justify-center gap-2 w-full py-3 rounded-xl uppercase font-cyber text-xs tracking-widest bg-white/5 border border-white/10 text-white hover:bg-white/10 hover:border-neonPink transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                Sincronizar Calendario
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // COMPONENTE: QR VIP PASS
        // ==========================================
        const VIPPassCard = ({ guest }) => {
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://panel.baulia.com/checkin/${guest.id}&margin=10`;

            const downloadQR = async () => {
                try {
                    const response = await fetch(qrUrl);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `VIP-Pass-${guest.name.replace(/\s+/g, '-')}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                } catch (error) {
                    console.error("Error al descargar el QR", error);
                    window.open(qrUrl, '_blank');
                }
            };

            return (
                <div className="glass-panel p-6 rounded-3xl flex flex-col items-center justify-center gap-4 relative overflow-hidden group box-glow-purple border-neonPurple/40 w-full max-w-sm">
                    <div className="absolute inset-0 bg-gradient-to-t from-neonPink/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-0"></div>
                    
                    <h3 className="font-cyber text-lg md:text-xl text-white uppercase tracking-widest text-center z-10">
                        {guest.name}
                    </h3>
                    <p className="font-cyber text-[10px] text-skyBlue tracking-widest uppercase mb-2 z-10">Acceso VIP Confirmado</p>
                    
                    <div className="bg-white p-2 rounded-xl shadow-[0_0_20px_rgba(0,229,255,0.4)] z-10 transition-transform duration-300 group-hover:scale-105">
                        <img src={qrUrl} alt={`QR Code for ${guest.name}`} className="w-48 h-48 object-contain" crossOrigin="anonymous" />
                    </div>

                    <button 
                        onClick={downloadQR}
                        className="mt-4 flex items-center justify-center gap-2 px-6 py-2 rounded-full uppercase font-cyber text-xs tracking-widest transition-all duration-300 bg-white/10 border border-white/20 text-white hover:bg-neonPink hover:border-neonPink hover:shadow-[0_0_15px_rgba(255,46,147,0.5)] z-10"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Guardar en Galería
                    </button>
                </div>
            );
        };

        // ==========================================
        // APLICACIÓN PRINCIPAL (Gestión de Fases SPA)
        // ==========================================
        const App = () => {
            const [guestUid, setGuestUid] = useState(null);
            const [guestName, setGuestName] = useState(null);
            const [lang, setLang] = useState('ES');
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentView, setCurrentView] = useState('hero');
            
            // ESTADOS RSVP CRÍTICOS
            const [isRsvpModalOpen, setIsRsvpModalOpen] = useState(false);
            const [isConfirmed, setIsConfirmed] = useState(false);
            const [subGuests, setSubGuests] = useState([]);
            const [isSimulatingLoad, setIsSimulatingLoad] = useState(false);

            const audioRef = useRef(null);
            const EVENT_ID = 'prueba-htsj';

            // PROTECCIÓN ANTI-ROBO (CRÍTICA)
            useEffect(() => {
                const preventDefault = (e) => e.preventDefault();
                document.addEventListener('contextmenu', preventDefault);
                document.addEventListener('selectstart', preventDefault);
                document.addEventListener('dragstart', preventDefault);

                return () => {
                    document.removeEventListener('contextmenu', preventDefault);
                    document.removeEventListener('selectstart', preventDefault);
                    document.removeEventListener('dragstart', preventDefault);
                };
            }, []);

            // OBTENER INVITADO
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const u = urlParams.get('u');
                if (u) {
                    setGuestUid(u);
                    const firestoreUrl = `https://firestore.googleapis.com/v1/projects/panel-de-control-intelig-db278/databases/(default)/documents/eventos/${EVENT_ID}/invitados/${u}`;
                    fetch(firestoreUrl)
                        .then(response => response.ok ? response.json() : null)
                        .then(data => {
                            if (data?.fields?.name?.stringValue) setGuestName(data.fields.name.stringValue);
                            
                            if (data?.fields?.confirmed?.booleanValue === true) {
                                setIsConfirmed(true);
                            }
                        }).catch(e => console.error("Error Firebase:", e));
                }
            }, []);

            // ==========================================
            // LÓGICA DE CIERRE AUTOMÁTICO RSVP (CRÍTICA)
            // ==========================================
            useEffect(() => {
                const handleMessage = (event) => {
                    let messageStr = '';
                    if (typeof event.data === 'string') {
                        messageStr = event.data;
                    } else if (typeof event.data === 'object') {
                        try { messageStr = JSON.stringify(event.data); } catch(e) {}
                    }

                    if (messageStr.includes('rsvp_success')) {
                        console.log("¡RSVP Exitoso Detectado!");
                        setIsSimulatingLoad(true);

                        setTimeout(() => {
                            setIsRsvpModalOpen(false);
                            setIsConfirmed(true);
                            setIsSimulatingLoad(false);

                            // DATOS FICTICIOS PARA EL CARRUSEL DE QR
                            const fakeConfirmedSubGuests = [
                                { id: `${guestUid || 'guest'}-1`, name: guestName || 'Agente Principal' },
                                { id: `${guestUid || 'guest'}-2`, name: 'Acompañante VIP' }
                            ];
                            setSubGuests(fakeConfirmedSubGuests);

                            // Scroll suave hacia los QRs
                            setTimeout(() => {
                                document.getElementById('qr-section')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }, 300);

                        }, 2000);
                    }
                };

                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, [guestName, guestUid]);

            const toggleAudio = () => {
                if (isPlaying) {
                    audioRef.current.pause();
                } else {
                    audioRef.current.play().catch(e => console.log("Interacción requerida", e));
                }
                setIsPlaying(!isPlaying);
            };

            const toggleLang = () => setLang(prev => prev === 'ES' ? 'EN' : 'ES');

            const enterArena = () => {
                setCurrentView('arena');
                if (!isPlaying && audioRef.current) {
                    audioRef.current.play()
                        .then(() => setIsPlaying(true))
                        .catch(e => console.log("Auto-play prevenido", e));
                }
            };

            const openRsvpModal = () => setIsRsvpModalOpen(true);
            const closeRsvpModal = () => setIsRsvpModalOpen(false);

            return (
                <div className="relative w-full h-full overflow-hidden">
                    
                    <audio ref={audioRef} src="cancion.mp3" loop preload="auto"></audio>

                    {/* FONDO DINÁMICO */}
                    <div className="fixed inset-0 z-0 overflow-hidden bg-cyberDark pointer-events-none">
                        <div 
                            className="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-80 animate-breathe"
                            style={{ backgroundImage: `url('kpopsfondo.svg'), url('/kpop-keily/kpopfondo.svg')` }}
                        ></div>
                        <div 
                            className="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-60 animate-breathe mix-blend-screen saturate-200 blur-[6px]"
                            style={{ backgroundImage: `url('kpopsfondo.svg'), url('/kpop-keily/kpopfondo.svg')` }}
                        ></div>
                        <div className="absolute inset-0 bg-gradient-to-b from-[#0a0514]/40 via-[#0a0514]/70 to-[#0a0514] z-0"></div>
                    </div>

                    {/* Navbar Superior Fija */}
                    <div className="absolute top-0 left-0 w-full p-6 flex justify-end z-50 pointer-events-none">
                        <button 
                            onClick={toggleLang}
                            className="pointer-events-auto text-xs font-cyber tracking-[0.3em] text-white/50 hover:text-skyBlue transition-all duration-300 backdrop-blur-sm px-3 py-1 border border-white/10 rounded-full hover:border-skyBlue"
                        >
                            {lang === 'ES' ? 'EN / ES' : 'ES / EN'}
                        </button>
                    </div>

                    {/* RENDERIZADO CONDICIONAL DE VISTAS (SPA) */}
                    <div className="relative z-10 w-full h-full overflow-y-auto overflow-x-hidden">
                        
                        {/* VISTA 1: HERO / PORTADA */}
                        {currentView === 'hero' && (
                            <main className="flex flex-col items-center justify-center min-h-full px-6 text-center animate-fade-in py-12">
                                
                                <div className="mb-8 w-40 h-40 md:w-56 md:h-56 relative flex items-center justify-center">
                                    <img 
                                        src="kpoplogo.svg" 
                                        alt="Logo Keyli" 
                                        className="w-full h-full object-contain relative z-10 animate-neon-flicker pointer-events-none"
                                        onError={(e) => {
                                            if (!e.target.dataset.retried) {
                                                e.target.dataset.retried = true;
                                                e.target.src = '/kpop-keily/kpoplogo.svg';
                                            }
                                        }}
                                    />
                                </div>

                                <div className="h-16 flex items-center justify-center w-full mb-2">
                                    {guestName && (
                                        <div className="glass-panel px-6 py-2 rounded-full border-neonPink/30">
                                            <p className="text-sm md:text-base tracking-[0.1em] text-gray-200">
                                                <span className="text-neonPink font-cyber uppercase text-[10px] tracking-widest">Agente Asignado:</span><br/>
                                                <span className="italic font-bold text-xl text-white">{guestName}</span>
                                            </p>
                                        </div>
                                    )}
                                </div>

                                <h1 className="text-6xl md:text-8xl font-cyber font-black text-white text-glow-pink glitch mb-4 uppercase tracking-wider select-none" data-text="KEYLI">
                                    KEYLI
                                </h1>

                                <p className="font-cyber text-neonPurple tracking-[0.5em] font-bold text-sm md:text-lg uppercase mt-2 mb-12 text-glow-purple select-none">
                                    Demon Hunters Tour
                                </p>

                                <button 
                                    onClick={enterArena}
                                    className="group relative px-10 py-4 font-cyber text-sm md:text-base tracking-[0.2em] uppercase text-white overflow-hidden rounded-xl transition-all duration-300 hover:scale-[1.03] shadow-[0_0_20px_rgba(255,46,147,0.4)]"
                                >
                                    <span className="absolute inset-0 w-full h-full bg-neonPink group-hover:bg-neonPurple transition-colors duration-500"></span>
                                    <span className="absolute inset-0 w-full h-full border-2 border-white/30 group-hover:border-white z-10 rounded-xl"></span>
