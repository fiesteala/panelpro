<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Digital | Alta Costura</title>
    
    <!-- Fuentes de Google: Cinzel (Elegancia Clásica) y Montserrat (Modernidad Limpia) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Cinzel', 'serif'],
                    },
                    colors: {
                        luxuryDark: '#0a0510',
                        neonAccent: '#ff2a85',
                    },
                    animation: {
                        'fade-in': 'fadeIn 1.5s ease-out forwards',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- React y ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Estilos Personalizados Esenciales -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden; /* Evita scroll en la pantalla de inicio */
        }

        /* Efecto de cristal esmerilado de lujo */
        .glass-panel {
            background: rgba(10, 5, 16, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        inset 0 0 20px rgba(255, 42, 133, 0.05); /* Toque sutil del neón */
        }

        /* Ocultar barra de scroll si se habilita más adelante */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            // Estado para la interacción inicial
            const [isOpened, setIsOpened] = React.useState(false);

            const handleOpen = () => {
                setIsOpened(true);
                // Aquí en el futuro podemos agregar lógica para mostrar más contenido
                console.log("Invitación desbloqueada.");
            };

            return (
                <div 
                    className="relative min-h-screen w-full flex items-center justify-center overflow-hidden bg-cover bg-center bg-no-repeat transition-all duration-1000"
                    style={{ backgroundImage: `url('kpopsfondo.svg')` }}
                >
                    {/* Capa de superposición para mejorar el contraste (Vignette) */}
                    <div className="absolute inset-0 bg-gradient-to-b from-black/30 via-transparent to-black/80 z-0"></div>
                    <div className="absolute inset-0 bg-black/20 backdrop-blur-[2px] z-0"></div>

                    {/* Contenedor Principal (Tarjeta Glassmorfismo) */}
                    <main 
                        className={`relative z-10 w-full max-w-lg mx-4 transition-all duration-1000 ease-[cubic-bezier(0.16,1,0.3,1)]
                            ${isOpened ? 'scale-105 opacity-0 pointer-events-none' : 'scale-100 opacity-100'}
                        `}
                    >
                        <div className="glass-panel rounded-3xl p-10 md:p-14 text-center animate-fade-in relative overflow-hidden group">
                            
                            {/* Reflejo animado sutil en el borde superior */}
                            <div className="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/40 to-transparent transform -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>

                            {/* Encabezado Pequeño */}
                            <h3 className="font-sans text-white/60 tracking-[0.4em] text-[10px] md:text-xs uppercase mb-6 flex items-center justify-center gap-4">
                                <span className="w-8 h-[1px] bg-white/30"></span>
                                Colección Exclusiva
                                <span className="w-8 h-[1px] bg-white/30"></span>
                            </h3>

                            {/* Título Principal */}
                            <h1 className="font-serif text-4xl md:text-5xl lg:text-6xl font-normal text-transparent bg-clip-text bg-gradient-to-b from-white to-white/70 mb-2 drop-shadow-sm animate-float">
                                Estás<br/>Invitado
                            </h1>
                            
                            {/* Separador Elegante */}
                            <div className="my-8 flex justify-center items-center">
                                <div className="h-2 w-2 rounded-full bg-neonAccent/80 animate-pulse-slow"></div>
                            </div>

                            {/* Subtítulo */}
                            <p className="font-sans text-sm md:text-base font-light text-white/80 tracking-widest uppercase mb-12">
                                Una noche inolvidable
                            </p>

                            {/* Botón de Acción de Alta Costura */}
                            <button 
                                onClick={handleOpen}
                                className="relative inline-flex items-center justify-center px-10 py-4 font-sans text-xs tracking-[0.2em] uppercase text-white overflow-hidden rounded-full border border-white/30 hover:border-white transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-white/50 group/btn"
                            >
                                <span className="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-30 bg-gradient-to-b from-transparent via-transparent to-white/10"></span>
                                <span className="relative z-10 transition-colors duration-300 group-hover/btn:text-black">
                                    Descubrir
                                </span>
                                {/* Fondo que se desliza al hacer hover */}
                                <div className="absolute inset-0 bg-white transform scale-x-0 origin-right transition-transform duration-500 ease-out group-hover/btn:scale-x-100 group-hover/btn:origin-left"></div>
                            </button>
                        </div>
                    </main>

                    {/* Elementos decorativos (Partículas/Luz) */}
                    <div className="absolute top-1/4 left-1/4 w-64 h-64 bg-neonAccent/20 rounded-full blur-[100px] mix-blend-screen pointer-events-none animate-pulse-slow z-0"></div>
                    <div className="absolute bottom-1/4 right-1/4 w-80 h-80 bg-cyan-500/10 rounded-full blur-[120px] mix-blend-screen pointer-events-none animate-pulse-slow z-0" style={{ animationDelay: '2s' }}></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
