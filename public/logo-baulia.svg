<svg width="340" height="60" viewBox="0 0 340 60" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400&amp;display=swap');
            
            /* 1. TEXTO BAULIA (Adaptable a Luz/Oscuridad) */
            .logo-text { 
                font-family: 'Cinzel', serif; 
                font-size: 28px; 
                font-weight: 400; 
                fill: #1C1917; /* Color por defecto: Carbón Oscuro para fondos blancos */
                letter-spacing: 14px; 
                transition: fill 0.5s ease;
            }

            /* 2. LA LETRA 'B' (Interactiva) */
            .logo-b { 
                font-family: 'Cinzel', serif; 
                font-size: 26px; 
                font-weight: 400; 
                fill: #D4AF37; /* Dorado Clásico */
                text-anchor: middle; 
                transform-origin: 25px 30px; /* Centro matemático exacto del cuadro */
                transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), fill 0.4s ease;
            }

            /* 3. EL CUADRO (La Bóveda) */
            .logo-box {
                fill: none;
                stroke: #D4AF37;
                stroke-width: 1;
                transform-origin: 25px 30px;
                transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55), stroke-width 0.3s ease;
            }

            /* --- EFECTOS HOVER / TACTO --- */
            /* Al pasar el cursor, el cuadro gira y la B brilla y crece */
            svg:hover .logo-box {
                transform: rotate(90deg);
                stroke-width: 1.5;
            }
            svg:hover .logo-b {
                transform: scale(1.15);
                fill: #FDF1A9; /* Destello dorado brillante */
            }

            /* --- MODO NOCHE AUTOMÁTICO (DARK MODE) --- */
            /* Si el dispositivo del usuario o tu panel tiene fondo oscuro, el texto se vuelve blanco mágicamente */
            @media (prefers-color-scheme: dark) {
                .logo-text {
                    fill: #FFFFFF; 
                }
            }
        </style>
    </defs>
    
    <rect x="5" y="10" width="40" height="40" class="logo-box"/>
    
    <text x="25" y="38" class="logo-b">B</text>
    
    <text x="65" y="39" class="logo-text">BAULIA</text>
</svg>