    <style type="text/tailwindcss">
        @layer utilities {
            .text-glow-pink { text-shadow: 0 0 10px #ff2e93, 0 0 20px #ff2e93, 0 0 40px rgba(255, 46, 147, 0.6); }
            .text-glow-blue { text-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff; }
            .text-glow-purple { text-shadow: 0 0 10px #b724ff, 0 0 20px #b724ff, 0 0 35px rgba(183, 36, 255, 0.8); }
            
            .box-glow-pink { box-shadow: 0 0 15px rgba(255, 46, 147, 0.5), inset 0 0 10px rgba(255, 46, 147, 0.2); }
            .box-glow-purple { box-shadow: 0 0 20px rgba(183, 36, 255, 0.4), inset 0 0 15px rgba(183, 36, 255, 0.2); }
            .box-glow-blue { box-shadow: 0 0 15px rgba(0, 229, 255, 0.4), inset 0 0 10px rgba(0, 229, 255, 0.1); }
            
            .glass-panel {
                background: linear-gradient(135deg, rgba(30, 10, 50, 0.2) 0%, rgba(10, 5, 25, 0.5) 100%);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(183, 36, 255, 0.2);
                border-top: 1px solid rgba(255, 46, 147, 0.5);
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            }
            
            .hologram-overlay {
                content: '';
                position: absolute;
                top: -150%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: linear-gradient(to bottom, transparent, rgba(0, 229, 255, 0.05) 45%, rgba(255, 46, 147, 0.25) 50%, rgba(183, 36, 255, 0.05) 55%, transparent);
                transform: rotate(30deg);
                animation: hologram-scan 5s linear infinite;
                pointer-events: none;
                z-index: 50;
            }
            
            @keyframes hologram-scan {
                0% { transform: rotate(30deg) translateY(-100%); }
                100% { transform: rotate(30deg) translateY(100%); }
            }

            .holo-reveal {
                filter: drop-shadow(0 0 20px #00e5ff) drop-shadow(0 0 40px #ff2e93) brightness(1.2) contrast(1.1);
                animation: holo-glitch 3s ease-in-out forwards;
            }

            @keyframes holo-glitch {
                0% { opacity: 0; filter: drop-shadow(0 0 5px #00e5ff) brightness(2) blur(10px) hue-rotate(90deg); transform: scale(0.95); }
                20% { opacity: 0.8; filter: drop-shadow(0 0 20px #00e5ff) brightness(1.5) blur(2px) hue-rotate(45deg); transform: scale(1.02); }
                30% { opacity: 0.4; filter: drop-shadow(0 0 10px #ff2e93) brightness(2) blur(5px) hue-rotate(0deg); transform: scale(1); }
                40% { opacity: 1; filter: drop-shadow(0 0 30px #00e5ff) drop-shadow(0 0 50px #ff2e93) brightness(1.2) blur(0px); transform: scale(1.01); }
                100% { opacity: 1; filter: drop-shadow(0 0 20px #00e5ff) drop-shadow(0 0 40px #ff2e93) brightness(1.1) blur(0px); transform: scale(1); }
            }

            .glitch { position: relative; }
            .glitch::before, .glitch::after {
                content: attr(data-text);
                position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
            }
            .glitch::before {
                left: 2px; text-shadow: -2px 0 #ff2e93; clip: rect(24px, 550px, 90px, 0);
                animation: glitch-anim-2 3s infinite linear alternate-reverse;
            }
            .glitch::after {
                left: -2px; text-shadow: -2px 0 #00e5ff; clip: rect(85px, 550px, 140px, 0);
                animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
            }
            
            @keyframes glitch-anim-2 {
                0% { clip: rect(65px, 9999px, 100px, 0); }
                20% { clip: rect(12px, 9999px, 45px, 0); }
                100% { clip: rect(9px, 9999px, 54px, 0); }
            }
            @keyframes neon-flicker {
                0%, 18%, 22%, 25%, 53%, 57%, 100% {
                    filter: drop-shadow(0 0 5px #ff2e93) drop-shadow(0 0 15px #b724ff) drop-shadow(0 0 30px #00e5ff); opacity: 1;
                }
                20%, 24%, 55% { filter: drop-shadow(0 0 2px #ff2e93); opacity: 0.6; }
            }
            .animate-neon-flicker { animation: neon-flicker 4s infinite alternate; }

            .baulia-text { fill: #ffffff; transition: fill 0.5s ease; }
            .baulia-diamond-animator { transform-origin: 100px 100px; transform: rotate(45deg) scale(0.8); transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
            .baulia-diamond-shape { fill: transparent; stroke: #D4AF37; stroke-width: 1.72px; transition: fill 0.5s ease, stroke-width 0.3s ease; }
            .baulia-b { fill: #D4AF37; transition: all 0.6s ease; transform-origin: 100px 100px; }
            .baulia-logo-svg:hover .baulia-diamond-animator { transform: rotate(135deg) scale(0.85); }
            .baulia-logo-svg:hover .baulia-diamond-shape { stroke-width: 3px; }
            .baulia-logo-svg:hover .baulia-b { transform: scale(1.05); fill: #FDF1A9; }
            
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        }

<body class="bg-cyberDark text-white font-body selection:bg-neonPurple selection:text-white overflow-hidden h-screen w-screen">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- COMPONENTE: CUENTA REGRESIVA ---
        const Countdown = () => {
            const calculateTimeLeft = () => {
                const difference = +new Date("2026-04-12T12:00:00") - +new Date();
                let timeLeft = {};
                if (difference > 0) {
                    timeLeft = {
                        DÍAS: Math.floor(difference / (1000 * 60 * 60 * 24)),
                        HRS: Math.floor((difference / (1000 * 60 * 60)) % 24),
                        MIN: Math.floor((difference / 1000 / 60) % 60),
                        SEG: Math.floor((difference / 1000) % 60)
                    };
                } else {
                    timeLeft = { DÍAS: 0, HRS: 0, MIN: 0, SEG: 0 };
                }
                return timeLeft;
            };

            const [timeLeft, setTimeLeft] = useState(calculateTimeLeft());

            useEffect(() => {
                const timer = setTimeout(() => setTimeLeft(calculateTimeLeft()), 1000);
                return () => clearTimeout(timer);
            });

            return (
                <div className="glass-panel p-6 md:p-8 rounded-3xl box-glow-purple flex flex-col items-center w-full max-w-lg mx-auto relative overflow-hidden group">
                    <div className="absolute -right-6 -top-6 opacity-10 font-cyber text-9xl text-neonPurple transform rotate-12 group-hover:scale-110 transition-transform duration-700 z-0">✦</div>
                    <h2 className="font-cyber text-neonPink text-sm md:text-base tracking-[0.3em] uppercase mb-6 text-center z-10 relative">
                        <span className="text-skyBlue text-glow-blue">Impacto del Inframundo en:</span>
                    </h2>
                    <div className="flex gap-4 md:gap-8 justify-center w-full z-10 relative">
                        {Object.keys(timeLeft).map((interval, i) => (
                            <div key={i} className="flex flex-col items-center w-16 md:w-20">
                                <span className="font-cyber text-4xl md:text-5xl text-white text-glow-purple font-black">
                                    {timeLeft[interval].toString().padStart(2, '0')}
                                </span>
                                <span className="font-cyber text-skyBlue text-[10px] md:text-xs tracking-widest mt-2 border-t border-neonPurple/50 pt-2 w-full text-center">
                                    {interval}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- COMPONENTE: TARJETA DE UBICACIÓN ---
        const LocationCard = ({ type, title, time, address, mainMapUrl, isReception }) => {
            const calLink = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=Misión+K-Pop:+Keyli+(${type})&dates=20260412T180000Z/20260413T020000Z&details=Únete+al+escuadrón+en+esta+batalla+sónica.&location=${encodeURIComponent(address)}`;
            return (
                <div className={`glass-panel p-6 md:p-8 rounded-3xl relative overflow-hidden group transition-all duration-500 hover:-translate-y-2 ${isReception ? 'hover:box-glow-purple' : 'hover:box-glow-blue'}`}>
                    <div className={`absolute top-0 left-0 w-1.5 h-full ${isReception ? 'bg-neonPurple shadow-[0_0_10px_#b724ff]' : 'bg-skyBlue shadow-[0_0_10px_#00e5ff]'} z-10`}></div>
                    <div className="pl-4 relative z-10">
                        <div className="flex justify-between items-start mb-2">
                            <h3 className="text-2xl md:text-3xl font-cyber text-white uppercase tracking-wide">{title}</h3>
                        </div>
                        <p className={`font-cyber text-xs tracking-[0.2em] mb-3 uppercase font-bold ${isReception ? 'text-neonPink' : 'text-neonPurple'}`}>{type}</p>
                        <p className="font-body text-gray-200 text-lg md:text-xl leading-relaxed mb-8 border-l-2 border-white/10 pl-3">{address}</p>
                        <div className="flex flex-col gap-3">
                            <a href={mainMapUrl} target="_blank" rel="noopener noreferrer" className={`flex items-center justify-center gap-3 w-full py-3.5 rounded-xl uppercase font-cyber text-sm tracking-widest transition-all duration-300 ${isReception ? 'bg-neonPurple text-white hover:bg-white hover:text-neonPurple hover:shadow-[0_0_20px_#b724ff]' : 'bg-skyBlue text-cyberDark hover:bg-white hover:text-skyBlue hover:shadow-[0_0_20px_#00e5ff]'}`}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                                Rastrear Energía Demoníaca
                            </a>
                            <a href={calLink} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-2 w-full py-3 rounded-xl uppercase font-cyber text-xs tracking-widest bg-white/5 border border-white/10 text-white hover:bg-white/10 hover:border-neonPink transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                Sincronizar Reloj Táctico
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        // --- APLICACIÓN PRINCIPAL ---
        const App = () => {
            const [guestUid, setGuestUid] = useState(null);
            const [guestName, setGuestName] = useState(null);
            const [lang, setLang] = useState('ES');
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentView, setCurrentView] = useState('hero'); 
            const [isRsvpModalOpen, setIsRsvpModalOpen] = useState(false);
            
            // NUEVO ESTADO: Guarda los datos de confirmación recibidos del Panel
            const [confirmedData, setConfirmedData] = useState(null);

            const [isTransforming, setIsTransforming] = useState(false);
            const audioRef = useRef(null);
            const bgParallaxRef = useRef(null);
            
            const EVENT_ID = 'prueba-htsj';

            useEffect(() => {
                const preventDefault = (e) => e.preventDefault();
                document.addEventListener('contextmenu', preventDefault);
                document.addEventListener('selectstart', preventDefault);
                document.addEventListener('dragstart', preventDefault);
                return () => {
                    document.removeEventListener('contextmenu', preventDefault);
                    document.removeEventListener('selectstart', preventDefault);
                    document.removeEventListener('dragstart', preventDefault);
                };
            }, []);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const u = urlParams.get('u');
                if (u) {
                    setGuestUid(u);
                    // Chequeo Inicial (Opcional, pero bueno por si acaso)
                    fetch(`https://firestore.googleapis.com/v1/projects/panel-de-control-intelig-db278/databases/(default)/documents/eventos/${EVENT_ID}/invitados/${u}`)
                        .then(r => r.ok ? r.json() : null)
                        .then(d => {
                            if (d?.fields?.name?.stringValue) setGuestName(d.fields.name.stringValue);
                        }).catch(e => console.error(e));
                }
            }, []);

            // 🔴 EL OÍDO MÁGICO: Escucha cuando el Panel de Baulia grita que ya confirmó
            useEffect(() => {
                const handleMessage = (event) => {
                    if (!event.origin.includes('baulia.com')) return;
                    if (event.data && event.data.action === 'RSVP_SUCCESS_DATA') {
                        setConfirmedData(event.data);
                        setIsRsvpModalOpen(false); 
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const toggleAudio = () => {
                if (isPlaying) audioRef.current.pause(); else audioRef.current.play().catch(e => {});
                setIsPlaying(!isPlaying);
            };

            const startBriefingSequence = () => {
                setIsTransforming(true);
                if (audioRef.current) {
                    audioRef.current.play().then(() => setIsPlaying(true)).catch(e => console.log("Auto-play blocked:", e));
                }
                setTimeout(() => {
                    setCurrentView('arena');
                }, 10000); 
            };

            const handleScroll = (e) => {
                if (currentView === 'arena' && bgParallaxRef.current) {
                    const scrollTop = e.target.scrollTop;
                    const scrollHeight = e.target.scrollHeight - e.target.clientHeight;
                    
                    if (scrollHeight > 0) {
                        const scrollRatio = scrollTop / scrollHeight;
                        const newScale = 1 + (scrollRatio * 0.5); 
                        bgParallaxRef.current.style.transform = `scale(${newScale})`;
                    }
                }
            };

            // 🔴 FUNCIÓN DE DESCARGA: Usa el html2canvas global
            const descargarPase = async (id, name) => {
                try {
                    const html2canvas = window.html2canvas;
                    const element = document.getElementById(`ticket_${id}`);
                    const canvas = await html2canvas(element, { scale: 3, useCORS: true, backgroundColor: null });
                    
                    canvas.toBlob(async (blob) => {
                        const file = new File([blob], `Pase_${name.replace(/ /g, '_')}.png`, { type: 'image/png' });
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({ files: [file], title: 'Pase VIP' });
                        } else {
                            const link = document.createElement('a');
                            link.href = URL.createObjectURL(blob);
                            link.download = file.name;
                            link.click();
                        }
                    }, 'image/png');
                } catch (e) {
                    console.error("Error al descargar:", e);
                }
            };

            return (
                <div className="relative w-full h-full overflow-hidden">
                    <audio ref={audioRef} src="cancion.mp3" loop preload="auto"></audio>
                    
                    <div className="fixed inset-0 z-0 overflow-hidden bg-cyberDark pointer-events-none">
                        <div ref={bgParallaxRef} className="absolute inset-0 w-full h-full origin-center transition-transform duration-100 ease-out will-change-transform">
                            <div className="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-80 animate-breathe" style={{ backgroundImage: `url('/keily-estefania/kpopsfondo.svg')` }}></div>
                            <div className="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-60 animate-breathe mix-blend-screen saturate-200 blur-[6px]" style={{ backgroundImage: `url('/keily-estefania/kpopsfondo.svg')` }}></div>
                        </div>
                        <div className="absolute inset-0 bg-gradient-to-b from-[#0a0514]/40 via-[#0a0514]/70 to-[#0a0514] z-0"></div>
                    </div>

                    <div className="relative z-10 w-full h-full overflow-y-auto overflow-x-hidden" onScroll={handleScroll}>
                        {currentView === 'hero' && (
                            <main className="relative flex flex-col items-center min-h-[100dvh] px-6 text-center animate-fade-in overflow-hidden">
                                
                                <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-5xl h-[55vh] md:h-[45vh] lg:h-[40vh] max-h-[500px] flex justify-center items-end z-0 pointer-events-none">
                                    <img 
                                        src="/keily-estefania/kpopsilueta.svg" 
                                        alt="Silueta" 
                                        className={`absolute bottom-0 w-auto h-full max-w-none object-contain object-bottom transition-all duration-[1500ms] ease-in-out ${isTransforming ? 'opacity-0 scale-105 blur-xl' : 'opacity-90 drop-shadow-[0_0_25px_rgba(183,36,255,0.4)]'}`}
                                    />
                                    {isTransforming && (
                                        <div className="absolute bottom-0 w-auto h-full flex justify-center items-end">
                                            <div className="absolute inset-0 hologram-overlay rounded-full mix-blend-screen"></div>
                                            <img 
                                                src="/keily-estefania/kpopguerreras.svg" 
                                                alt="Holograma" 
                                                className="absolute bottom-0 w-auto h-full max-w-none object-contain object-bottom holo-reveal"
                                            />
                                        </div>
                                    )}
                                </div>

                                <div className={`relative z-10 flex flex-col items-center justify-between w-full h-full min-h-[100dvh] pt-20 pb-28 md:pt-24 md:pb-24 transition-all duration-1000 ${isTransforming ? 'pointer-events-none' : 'opacity-100'}`}>
                                    
                                    <div className="flex flex-col items-center w-full relative">
                                        <div className="mb-4 md:mb-6 w-48 h-48 md:w-64 md:h-64 relative flex items-center justify-center shrink-0">
                                            <img 
                                                src="/keily-estefania/kpoplogo.svg" 
                                                alt="Logo" 
                                                className={`absolute inset-0 w-full h-full object-contain z-10 pointer-events-none transition-all duration-[1000ms] ease-in-out ${isTransforming ? 'opacity-0 scale-0 blur-xl' : 'opacity-100 scale-100 animate-neon-flicker'}`} 
                                            />
                                        </div>

                                        <div className={`absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[85%] md:-translate-y-[75%] w-[90vw] md:w-[500px] flex flex-col items-center justify-center transition-all duration-700 z-50 ${isTransforming ? 'opacity-100 scale-100' : 'opacity-0 scale-125 blur-xl pointer-events-none'}`}>
                                            <div className="glass-panel w-full p-8 md:p-10 rounded-3xl box-glow-purple border border-neonPurple/50 flex flex-col items-center justify-center relative overflow-hidden">
                                                <div className="absolute top-0 right-0 w-32 h-32 bg-skyBlue opacity-20 blur-3xl rounded-full pointer-events-none"></div>
                                                <div className="absolute bottom-0 left-0 w-32 h-32 bg-neonPink opacity-20 blur-3xl rounded-full pointer-events-none"></div>
                                                <span className="relative z-10 font-cyber text-white text-lg md:text-xl uppercase tracking-widest mb-2 drop-shadow-md">Hola</span>
                                                <span className="relative z-10 font-cyber font-black text-3xl md:text-5xl lg:text-6xl text-neonPink text-glow-pink uppercase tracking-widest mb-3 text-center leading-tight">
                                                    {guestName || 'Demon Hunter'}
                                                </span>
                                                <span className="relative z-10 font-body text-skyBlue text-xl md:text-2xl lg:text-3xl uppercase tracking-widest text-glow-blue font-bold text-center">
                                                    bienvenido a la banda HUNTR/X
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col items-center w-full mt-auto">
                                        <div className={`inline-block text-center mb-6 md:mb-8 transition-transform duration-[3000ms] ease-in-out ${isTransforming ? 'translate-y-16 md:translate-y-20 scale-105' : 'translate-y-0 scale-100'}`}>
                                            <h1 className="text-6xl md:text-[6.5rem] lg:text-8xl font-cyber font-black text-white text-glow-pink glitch mb-0 uppercase tracking-wider leading-none" data-text="KEYLI">KEYLI</h1>
                                            <div className="flex justify-between w-full px-[0.1em] mt-1 md:mt-2">
                                                {'ESTEFANIA'.split('').map((letter, index) => (
                                                    <span key={index} className="font-cyber font-black text-xl md:text-3xl lg:text-4xl text-white text-glow-pink uppercase">{letter}</span>
                                                ))}

                                className="w-full max-w-md h-[90vh] mx-auto relative z-10"
                            ></iframe>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
