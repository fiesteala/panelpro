<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="✨ ¡GRACIAS POR ASISTIR AL GRAN CONCIERTO VIP! ✨" />
    <meta property="og:description" content="¡Keyli celebró sus 3 años y tú fuiste parte del escuadrón oficial! 🎶💖 Entra aquí para subir tus fotos y recordar esta gran misión." />
    <meta property="og:image" content="https://baulia.com/keily-estefania/cover.jpg" />
    <meta property="og:url" content="https://baulia.com" />
    <meta property="og:type" content="website" />

    <title>Keyli Estefania - Archivo de Misión</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700;900&family=Birthstone&display=swap" rel="stylesheet">

    <!-- Preloads -->
    <link rel="preload" href="/keily-estefania/kpopsfondo.svg" as="image" type="image/svg+xml">
    <link rel="preload" href="/keily-estefania/kpoplogo.svg" as="image" type="image/svg+xml">
    <link rel="preload" href="/keily-estefania/kpopsilueta.svg" as="image" type="image/svg+xml">
    <link rel="preload" href="/keily-estefania/kpopguerreras.svg" as="image" type="image/svg+xml">
    <link rel="preload" href="/keily-estefania/kpop.svg" as="image" type="image/svg+xml">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neonPink: '#ff2e93',
                        skyBlue: '#00e5ff',
                        neonPurple: '#b724ff',
                        cyberDark: '#0a0514',
                    },
                    fontFamily: {
                        cyber: ['Orbitron', 'sans-serif'],
                        body: ['Rajdhani', 'sans-serif'],
                        cursive: ['Birthstone', 'cursive'],
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                        'breathe': 'breathe 15s ease-in-out infinite alternate',
                        'spin-slow': 'spin 3s linear infinite',
                        'float': 'float 4s ease-in-out infinite',
                        'energy-pulse': 'energy 2.5s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95) translateY(10px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' }
                        },
                        breathe: {
                            '0%': { transform: 'scale(1)' },
                            '100%': { transform: 'scale(1.12)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0) scale(1)' },
                            '50%': { transform: 'translateY(-25px) scale(1.03)' }
                        },
                        energy: {
                            '0%, 100%': { opacity: '0.2', transform: 'scale(0.8) rotate(0deg)' },
                            '50%': { opacity: '0.4', transform: 'scale(1.3) rotate(5deg)' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- Módulo de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Exportamos las funciones globalmente para que React pueda usarlas
        window.FirebaseAPI = {
            initializeApp, getFirestore, collection, query, onSnapshot, addDoc, serverTimestamp, getAuth, signInAnonymously
        };
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style type="text/tailwindcss">
        @layer utilities {
            .text-glow-pink { text-shadow: 0 0 10px #ff2e93, 0 0 20px #ff2e93, 0 0 40px rgba(255, 46, 147, 0.6); }
            .text-glow-blue { text-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff; }
            .text-glow-purple { text-shadow: 0 0 10px #b724ff, 0 0 20px #b724ff, 0 0 35px rgba(183, 36, 255, 0.8); }
            
            .box-glow-pink { box-shadow: 0 0 15px rgba(255, 46, 147, 0.5), inset 0 0 10px rgba(255, 46, 147, 0.2); }
            .box-glow-purple { box-shadow: 0 0 20px rgba(183, 36, 255, 0.4), inset 0 0 15px rgba(183, 36, 255, 0.2); }
            .box-glow-blue { box-shadow: 0 0 15px rgba(0, 229, 255, 0.4), inset 0 0 10px rgba(0, 229, 255, 0.1); }
            
            .glass-panel {
                background: linear-gradient(135deg, rgba(30, 10, 50, 0.2) 0%, rgba(10, 5, 25, 0.5) 100%);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(183, 36, 255, 0.2);
                border-top: 1px solid rgba(255, 46, 147, 0.5);
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            }
            
            .hologram-overlay {
                content: '';
                position: absolute;
                top: -150%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: linear-gradient(to bottom, transparent, rgba(0, 229, 255, 0.05) 45%, rgba(255, 46, 147, 0.25) 50%, rgba(183, 36, 255, 0.05) 55%, transparent);
                transform: rotate(30deg);
                animation: hologram-scan 5s linear infinite;
                pointer-events: none;
                z-index: 50;
            }
            
            @keyframes hologram-scan {
                0% { transform: rotate(30deg) translateY(-100%); }
                100% { transform: rotate(30deg) translateY(100%); }
            }

            .holo-reveal {
                filter: drop-shadow(0 0 20px #00e5ff) drop-shadow(0 0 40px #ff2e93) brightness(1.2) contrast(1.1);
                animation: holo-glitch 3s ease-in-out forwards;
            }

            @keyframes holo-glitch {
                0% { opacity: 0; filter: drop-shadow(0 0 5px #00e5ff) brightness(2) blur(10px) hue-rotate(90deg); transform: scale(0.95); }
                20% { opacity: 0.8; filter: drop-shadow(0 0 20px #00e5ff) brightness(1.5) blur(2px) hue-rotate(45deg); transform: scale(1.02); }
                30% { opacity: 0.4; filter: drop-shadow(0 0 10px #ff2e93) brightness(2) blur(5px) hue-rotate(0deg); transform: scale(1); }
                40% { opacity: 1; filter: drop-shadow(0 0 30px #00e5ff) drop-shadow(0 0 50px #ff2e93) brightness(1.2) blur(0px); transform: scale(1.01); }
                100% { opacity: 1; filter: drop-shadow(0 0 20px #00e5ff) drop-shadow(0 0 40px #ff2e93) brightness(1.1) blur(0px); transform: scale(1); }
            }

            .glitch { position: relative; }
            .glitch::before, .glitch::after {
                content: attr(data-text);
                position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
            }
            .glitch::before {
                left: 2px; text-shadow: -2px 0 #ff2e93; clip: rect(24px, 550px, 90px, 0);
                animation: glitch-anim-2 3s infinite linear alternate-reverse;
            }
            .glitch::after {
                left: -2px; text-shadow: -2px 0 #00e5ff; clip: rect(85px, 550px, 140px, 0);
                animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
            }
            
            @keyframes glitch-anim-2 {
                0% { clip: rect(65px, 9999px, 100px, 0); }
                20% { clip: rect(12px, 9999px, 45px, 0); }
                100% { clip: rect(9px, 9999px, 54px, 0); }
            }
            @keyframes neon-flicker {
                0%, 18%, 22%, 25%, 53%, 57%, 100% {
                    filter: drop-shadow(0 0 5px #ff2e93) drop-shadow(0 0 15px #b724ff) drop-shadow(0 0 30px #00e5ff); opacity: 1;
                }
                20%, 24%, 55% { filter: drop-shadow(0 0 2px #ff2e93); opacity: 0.6; }
            }
            .animate-neon-flicker { animation: neon-flicker 4s infinite alternate; }

            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

            #baulia-splash {
                position: fixed; inset: 0; z-index: 9999;
                background-color: #0a0514;
                display: flex; flex-direction: column; justify-content: center; align-items: center;
                transition: opacity 0.8s ease-out, visibility 0.8s;
            }
            .splash-loader {
                width: 50px; height: 50px; border: 3px solid rgba(0, 229, 255, 0.2);
                border-top-color: #ff2e93; border-radius: 50%;
                animation: spin-slow 1s linear infinite; margin-bottom: 24px;
            }
            .splash-text {
                font-family: 'Orbitron', sans-serif; color: #00e5ff;
                text-transform: uppercase; letter-spacing: 0.3em; font-size: 12px;
                animation: pulse-fast 2s infinite; text-shadow: 0 0 10px #00e5ff;
            }
            body.react-loaded #baulia-splash { opacity: 0; visibility: hidden; }
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-cyberDark text-white font-body selection:bg-neonPurple selection:text-white overflow-hidden h-screen w-screen">
    
    <div id="baulia-splash">
        <div class="splash-loader"></div>
        <div class="splash-text">Recuperando Memorias...</div>
    </div>

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // CONFIGURACIÓN DE BASE DE DATOS Y CLOUDINARY
        const CLOUD_NAME = "duy0mcqsh"; 
        const UPLOAD_PRESET = "jbbd0sxy";  
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyDL9UEEvWKYE7QpctYrnu1rG644x05_4Wk",
            authDomain: "bodasofiayalejadro.firebaseapp.com",
            projectId: "bodasofiayalejadro",
            storageBucket: "bodasofiayalejadro.firebasestorage.app",
            messagingSenderId: "905632324437",
            appId: "1:905632324437:web:b7aead724b299cc3202ddc"
        };
        const COLLECTION_NAME = "keyli_fotos_concierto"; // Carpeta exclusiva para Keyli

        const App = () => {
            const [guestUid, setGuestUid] = useState(null);
            const [guestName, setGuestName] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentView, setCurrentView] = useState('hero'); 
            const [isTransforming, setIsTransforming] = useState(false);
            
            // Estados para la galería y subida
            const [images, setImages] = useState([]);
            const [isUploading, setIsUploading] = useState(false);
            const [uploadStatus, setUploadStatus] = useState('');
            const [uploadProgress, setUploadProgress] = useState(0);
            const [lightboxImg, setLightboxImg] = useState(null);
            
            // Estado para el cálculo dinámico de columnas (Layout Flexbox Garantizado)
            const [masonryCols, setMasonryCols] = useState(2);

            const audioRef = useRef(null);
            const bgParallaxRef = useRef(null);
            const dbRef = useRef(null);

            // Escuchar el tamaño de la ventana para recalcular las columnas
            useEffect(() => {
                const handleResize = () => {
                    if (window.innerWidth >= 1024) setMasonryCols(4);
                    else if (window.innerWidth >= 768) setMasonryCols(3);
                    else setMasonryCols(2);
                };
                handleResize(); // Ejecutar al inicio
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Inicializar Firebase
            useEffect(() => {
                const initFirebase = async () => {
                    let retries = 0;
                    while (!window.FirebaseAPI && retries < 20) {
                        await new Promise(r => setTimeout(r, 100));
                        retries++;
                    }
                    if (!window.FirebaseAPI) return;

                    const { initializeApp, getFirestore, getAuth, signInAnonymously, collection, onSnapshot } = window.FirebaseAPI;
                    
                    try {
                        const app = initializeApp(FIREBASE_CONFIG);
                        const auth = getAuth(app);
                        dbRef.current = getFirestore(app);

                        await signInAnonymously(auth);

                        // Escuchar cambios en la galería en tiempo real
                        const q = collection(dbRef.current, COLLECTION_NAME);
                        onSnapshot(q, (snapshot) => {
                            let loadedPhotos = [];
                            snapshot.forEach(doc => {
                                loadedPhotos.push({ id: doc.id, ...doc.data() });
                            });
                            // Ordenar por fecha (más recientes primero)
                            loadedPhotos.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                            setImages(loadedPhotos);
                        });
                    } catch (error) {
                        console.error("Error inicializando Firebase:", error);
                    }
                };

                document.body.classList.add('react-loaded');
                initFirebase();
            }, []);

            // Deshabilitar click derecho
            useEffect(() => {
                const preventDefault = (e) => e.preventDefault();
                document.addEventListener('contextmenu', preventDefault);
                document.addEventListener('selectstart', preventDefault);
                document.addEventListener('dragstart', preventDefault);
                return () => {
                    document.removeEventListener('contextmenu', preventDefault);
                    document.removeEventListener('selectstart', preventDefault);
                    document.removeEventListener('dragstart', preventDefault);
                };
            }, []);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const u = urlParams.get('u');
                if (u) {
                    setGuestUid(u);
                }
            }, []);

            const toggleAudio = () => {
                if (isPlaying) audioRef.current.pause(); else audioRef.current.play().catch(e => {});
                setIsPlaying(!isPlaying);
            };

            const startBriefingSequence = () => {
                if (audioRef.current) {
                    audioRef.current.play().then(() => setIsPlaying(true)).catch(e => console.log("Auto-play blocked:", e));
                }
                setIsTransforming(true);
                setTimeout(() => {
                    setCurrentView('arena');
                }, 10000); 
            };

            const handleScroll = (e) => {
                if (currentView === 'arena' && bgParallaxRef.current) {
                    const scrollTop = e.target.scrollTop;
                    const scrollHeight = e.target.scrollHeight - e.target.clientHeight;
                    
                    if (scrollHeight > 0) {
                        const scrollRatio = scrollTop / scrollHeight;
                        const newScale = 1 + (scrollRatio * 0.5); 
                        bgParallaxRef.current.style.transform = `scale(${newScale})`;
                    }
                }
            };

            // Función para Subir Fotos a Cloudinary y guardar en Firestore
            const handleFileUpload = async (event) => {
                const files = event.target.files;
                if (!files || files.length === 0) return;

                setIsUploading(true);
                setUploadProgress(0);
                const totalFiles = files.length;
                let uploadedCount = 0;

                const { collection, addDoc, serverTimestamp } = window.FirebaseAPI;

                for (let i = 0; i < totalFiles; i++) {
                    let file = files[i];

                    setUploadStatus(`Transmitiendo memoria ${i + 1} de ${totalFiles}...`);

                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', UPLOAD_PRESET);

                    try {
                        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
                            method: 'POST',
                            body: formData
                        });

                        if (!res.ok) throw new Error("Error en nube");
                        const data = await res.json();

                        // Guardar en Firebase con tipo de recurso (imagen o video)
                        if (dbRef.current) {
                            await addDoc(collection(dbRef.current, COLLECTION_NAME), {
                                url: data.secure_url,
                                resource_type: data.resource_type || (file.type.startsWith('video/') ? 'video' : 'image'),
                                createdAt: serverTimestamp()
                            });
                        }

                        uploadedCount++;
                        setUploadProgress((uploadedCount / totalFiles) * 100);

                    } catch (err) {
                        console.error("Error subiendo archivo:", err);
                    }
                }

                setUploadStatus('¡Misión cumplida! Archivos recibidos en la central.');
                setTimeout(() => {
                    setIsUploading(false);
                    setUploadStatus('');
                    setUploadProgress(0);
                }, 3000);

                // Resetear input
                event.target.value = null;
            };

            const getThumbnailUrl = (url) => {
                if (!url) return "";
                if (url.includes("cloudinary.com")) return url.replace("/upload/", "/upload/w_600,q_auto,f_auto/");
                return url;
            };

            // --- LÓGICA DE DISTRIBUCIÓN DE COLUMNAS (MASONRY INFALIBLE) ---
            const columnsData = Array.from({ length: masonryCols }, () => []);
            images.forEach((img, index) => {
                columnsData[index % masonryCols].push(img);
            });

            return (
                <div className="relative w-full h-full overflow-hidden">
                    <audio ref={audioRef} src="/keily-estefania/cancion.mp3" loop preload="auto"></audio>
                    
                    <div className="fixed inset-0 z-0 overflow-hidden bg-cyberDark pointer-events-none">
                        <div ref={bgParallaxRef} className="absolute inset-0 w-full h-full origin-center transition-transform duration-100 ease-out will-change-transform">
                            <div className="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-80 animate-breathe" style={{ backgroundImage: `url('/keily-estefania/kpopsfondo.svg')` }}></div>
                            <div className="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-60 animate-breathe mix-blend-screen saturate-200 blur-[6px]" style={{ backgroundImage: `url('/keily-estefania/kpopsfondo.svg')` }}></div>
                        </div>
                        <div className="absolute inset-0 bg-gradient-to-b from-[#0a0514]/40 via-[#0a0514]/70 to-[#0a0514] z-0"></div>
                    </div>

                    <div className="relative z-10 w-full h-full overflow-y-auto overflow-x-hidden" onScroll={handleScroll}>
                        {currentView === 'hero' && (
                            <main className="relative flex flex-col items-center min-h-[100dvh] px-6 text-center animate-fade-in overflow-hidden">
                                
                                <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-5xl h-[55vh] md:h-[45vh] lg:h-[40vh] max-h-[500px] flex justify-center items-end z-0 pointer-events-none">
                                    <img 
                                        src="/keily-estefania/kpopsilueta.svg" 
                                        alt="Silueta" 
                                        className={`absolute bottom-0 w-auto h-full max-w-none object-contain object-bottom transition-all duration-[1500ms] ease-in-out ${isTransforming ? 'opacity-0 scale-105 blur-xl' : 'opacity-90 drop-shadow-[0_0_25px_rgba(183,36,255,0.4)]'}`}
                                        onError={(e) => { e.target.onerror = null; e.target.src="https://placehold.co/400x800/transparent/ff2e93?text=Silueta"; }}
                                    />
                                    {isTransforming && (
                                        <div className="absolute bottom-0 w-auto h-full flex justify-center items-end">
                                            <div className="absolute inset-0 hologram-overlay rounded-full mix-blend-screen"></div>
                                            <img 
                                                src="/keily-estefania/kpopguerreras.svg" 
                                                alt="Holograma" 
                                                className="absolute bottom-0 w-auto h-full max-w-none object-contain object-bottom holo-reveal"
                                                onError={(e) => { e.target.onerror = null; e.target.src="https://placehold.co/400x800/transparent/00e5ff?text=Guerreras"; }}
                                            />
                                        </div>
                                    )}
                                </div>

                                <div className={`relative z-10 flex flex-col items-center justify-between w-full h-full min-h-[100dvh] pt-20 pb-28 md:pt-24 md:pb-24 transition-all duration-1000 ${isTransforming ? 'pointer-events-none' : 'opacity-100'}`}>
                                    
                                    <div className="flex flex-col items-center w-full relative">
                                        <div className="mb-4 md:mb-6 w-48 h-48 md:w-64 md:h-64 relative flex items-center justify-center shrink-0">
                                            <img 
                                                src="/keily-estefania/kpoplogo.svg" 
                                                alt="Logo" 
                                                className={`absolute inset-0 w-full h-full object-contain z-10 pointer-events-none transition-all duration-[1000ms] ease-in-out ${isTransforming ? 'opacity-0 scale-0 blur-xl' : 'opacity-100 scale-100 animate-neon-flicker'}`} 
                                                onError={(e) => { e.target.onerror = null; e.target.src="https://placehold.co/400x400/transparent/ff2e93?text=Logo"; }}
                                            />
                                        </div>

                                        <div className={`absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-[85%] md:-translate-y-[75%] w-[90vw] md:w-[500px] flex flex-col items-center justify-center transition-all duration-700 z-50 ${isTransforming ? 'opacity-100 scale-100' : 'opacity-0 scale-125 blur-xl pointer-events-none'}`}>
                                            <div className="glass-panel w-full p-8 md:p-10 rounded-3xl box-glow-purple border border-neonPurple/50 flex flex-col items-center justify-center relative overflow-hidden">
                                                <div className="absolute top-0 right-0 w-32 h-32 bg-skyBlue opacity-20 blur-3xl rounded-full pointer-events-none"></div>
                                                <div className="absolute bottom-0 left-0 w-32 h-32 bg-neonPink opacity-20 blur-3xl rounded-full pointer-events-none"></div>
                                                <span className="relative z-10 font-cyber text-white text-lg md:text-xl uppercase tracking-widest mb-2 drop-shadow-md">Hola</span>
                                                <span className="relative z-10 font-cyber font-black text-3xl md:text-5xl lg:text-6xl text-neonPink text-glow-pink uppercase tracking-widest mb-3 text-center leading-tight">
                                                    {guestName || 'Demon Hunter'}
                                                </span>
                                                <span className="relative z-10 font-body text-skyBlue text-xl md:text-2xl lg:text-3xl uppercase tracking-widest text-glow-blue font-bold text-center">
                                                    gracias por rockear con la banda HUNTR/X
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col items-center w-full mt-auto">
                                        <div className={`inline-block text-center mb-6 md:mb-8 transition-transform duration-[3000ms] ease-in-out ${isTransforming ? 'translate-y-16 md:translate-y-20 scale-105' : 'translate-y-0 scale-100'}`}>
                                            <h1 className="text-6xl md:text-[6.5rem] lg:text-8xl font-cyber font-black text-white text-glow-pink glitch mb-0 uppercase tracking-wider leading-none" data-text="KEYLI">KEYLI</h1>
                                            <div className="flex justify-between w-full px-[0.1em] mt-1 md:mt-2">
                                                {'ESTEFANIA'.split('').map((letter, index) => (
                                                    <span key={index} className="font-cyber font-black text-xl md:text-3xl lg:text-4xl text-white text-glow-pink uppercase">{letter}</span>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        <button onClick={startBriefingSequence} className={`group relative px-10 py-4 font-cyber text-sm md:text-base tracking-[0.2em] uppercase text-white overflow-hidden rounded-xl transition-all duration-700 shadow-[0_0_20px_rgba(255,46,147,0.4)] ${isTransforming ? 'opacity-0 translate-y-10 scale-90 blur-sm pointer-events-none' : 'opacity-100 translate-y-0 scale-100 hover:scale-[1.03]'}`}>
                                            <span className="absolute inset-0 w-full h-full bg-neonPink group-hover:bg-neonPurple transition-colors duration-500"></span>
                                            <span className="absolute inset-0 w-full h-full border-2 border-white/30 z-10 rounded-xl"></span>
                                            <span className="relative z-20 font-bold flex items-center gap-3">Acceder al Archivo de Recuerdos <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-pulse"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></span>
                                        </button>
                                    </div>

                                </div>
                            </main>
                        )}

                        {currentView === 'arena' && (
                            <section className="w-full max-w-5xl mx-auto px-4 pt-8 md:pt-12 pb-8 min-h-full flex flex-col gap-10 animate-fade-in relative">
                                <div className="text-center mb-2 relative z-10 flex flex-col items-center w-full max-w-4xl mx-auto">
                                    <p className="font-cyber text-skyBlue text-xs md:text-sm tracking-[0.3em] uppercase mb-2 text-glow-blue">Protocolo de Misión Completado</p>
                                    <p className="font-cyber text-neonPink text-sm md:text-lg tracking-widest uppercase mb-6 text-glow-pink font-bold text-center">Gracias por hacer inolvidables los 3 años de:</p>
                                    
                                    <div className="w-full flex justify-center mb-8">
                                        <h2 className="text-6xl md:text-[6.5rem] lg:text-8xl font-cyber font-black text-white text-glow-pink glitch mb-0 uppercase tracking-wider leading-none" data-text="KEYLI">KEYLI</h2>
                                    </div>

                                    <div className="glass-panel p-6 md:p-8 rounded-2xl border-l-4 border-l-skyBlue text-left relative overflow-hidden group w-full mt-4">
                                        <div className="absolute top-0 right-0 w-40 h-40 bg-neonPurple opacity-20 rounded-full blur-3xl z-0"></div>
                                        <p className="font-cyber text-neonPink text-xs tracking-widest uppercase mb-3 relative z-10">Mensaje Especial de Rumi:</p>
                                        <p className="font-body text-gray-200 text-lg md:text-xl leading-relaxed relative z-10">¡Misión cumplida, {guestName ? <span className="text-neonPink font-bold text-glow-pink uppercase">{guestName}</span> : 'K-Pop Hunter'}! ✨ Los traviesos Saja Boys intentaron apagar nuestra música, pero gracias a tu increíble energía logramos proteger la barrera musical. ¡Gracias por traer tu <span className="text-skyBlue font-bold text-glow-blue">lightstick</span>, tu alegría y tus mejores pasos de baile para celebrar el cumpleaños de Keyli! Fue un concierto épico que jamás olvidaremos. 💖</p>
                                    </div>
                                    <div className="w-24 h-1 bg-neonPurple mx-auto mt-10 shadow-[0_0_15px_#b724ff]"></div>
                                </div>

                                {/* SECCIÓN DE UPLOAD DE FOTOS (CLOUD + FIREBASE) */}
                                <div className="w-full max-w-2xl mx-auto mt-2">
                                    <div className="glass-panel p-6 md:p-8 rounded-3xl relative overflow-hidden group text-center box-glow-blue border-t-skyBlue">
                                        <div className="absolute top-0 left-0 w-32 h-32 bg-skyBlue opacity-10 blur-3xl rounded-full pointer-events-none"></div>
                                        <div className="w-16 h-16 rounded-full bg-skyBlue/10 border border-skyBlue mb-4 flex items-center justify-center box-glow-blue mx-auto relative z-10">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-skyBlue animate-pulse"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                        </div>
                                        <h3 className="font-cyber text-xl md:text-2xl text-white uppercase tracking-widest mb-3 relative z-10">Archivo Central de la Misión</h3>
                                        <p className="font-body text-gray-300 text-lg mb-6 leading-relaxed relative z-10">¿Tomaste fotos increíbles en el concierto? Súbelas al archivo central para que Keyli y todos los miembros de la banda puedan verlas.</p>
                                        
                                        <div className="relative z-10 w-full max-w-md mx-auto">
                                            {/* Input invisible sobre el botón */}
                                            <input 
                                                type="file" 
                                                multiple 
                                                accept="image/*,video/mp4,video/quicktime,video/webm"
                                                onChange={handleFileUpload}
                                                disabled={isUploading}
                                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20 disabled:cursor-not-allowed"
                                                title="Seleccionar fotos y videos"
                                            />
                                            <div className={`group relative flex items-center justify-center gap-3 w-full py-4 rounded-xl uppercase font-cyber text-sm tracking-widest transition-all duration-300 border-2 ${isUploading ? 'border-skyBlue bg-skyBlue/20 text-white shadow-[0_0_20px_rgba(0,229,255,0.4)]' : 'border-skyBlue bg-skyBlue/10 text-skyBlue hover:bg-skyBlue hover:text-cyberDark hover:shadow-[0_0_20px_rgba(0,229,255,0.6)]'} overflow-hidden`}>
                                                <span className="relative z-10 font-bold flex items-center gap-2">
                                                    {isUploading ? (
                                                        <><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Transfiriendo...</>
                                                    ) : (
                                                        <><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> SELECCIONAR FOTOS</>
                                                    )}
                                                </span>
                                            </div>

                                            {/* Barra de progreso visual */}
                                            {isUploading && (
                                                <div className="w-full mt-4 animate-fade-in">
                                                    <div className="w-full bg-cyberDark rounded-full h-1.5 overflow-hidden border border-skyBlue/30">
                                                        <div className="bg-skyBlue h-1.5 transition-all duration-300" style={{ width: `${uploadProgress}%` }}></div>
                                                    </div>
                                                    <p className="text-xs font-cyber text-skyBlue mt-2 animate-pulse">{uploadStatus}</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* GALERÍA MASONRY DE FOTOS (FLEXBOX INFALIBLE) */}
                                <div className="w-full mt-12 z-10 relative">
                                    <div className="flex flex-col items-center mb-10">
                                        <h3 className="font-cyber text-3xl md:text-4xl text-neonPink text-glow-pink uppercase tracking-widest text-center">
                                            Recuerdos Capturados
                                        </h3>
                                        <div className="w-20 h-1 bg-skyBlue mx-auto mt-4 shadow-[0_0_10px_#00e5ff]"></div>
                                    </div>

                                    {images.length > 0 ? (
                                        <div className="flex w-full gap-3 md:gap-4 items-start">
                                            {columnsData.map((colImages, colIndex) => (
                                                <div key={colIndex} className="flex flex-col gap-3 md:gap-4 w-full flex-1">
                                                    {colImages.map((img) => {
                                                        const isVideo = img.resource_type === 'video' || (img.url && img.url.match(/\.(mp4|mov|webm)$/i));
                                                        return (
                                                            <div 
                                                                key={img.id} 
                                                                className="relative group rounded-xl overflow-hidden glass-panel border border-white/10 hover:border-neonPink transition-all duration-500 cursor-pointer shadow-lg bg-[#0a0514]/50"
                                                                onClick={() => setLightboxImg(img)}
                                                            >
                                                                {isVideo ? (
                                                                    <video 
                                                                        src={img.url.replace('/upload/', '/upload/w_600,q_auto,f_auto/')} 
                                                                        className="w-full h-auto object-cover transform group-hover:scale-105 transition-transform duration-700 block"
                                                                        autoPlay loop muted playsInline
                                                                    />
                                                                ) : (
                                                                    <img 
                                                                        src={getThumbnailUrl(img.url)} 
                                                                        alt="Recuerdo K-Pop" 
                                                                        className="w-full h-auto object-cover transform group-hover:scale-105 transition-transform duration-700 block" 
                                                                        loading="lazy"
                                                                    />
                                                                )}
                                                                
                                                                {isVideo && (
                                                                    <div className="absolute top-3 right-3 bg-cyberDark/60 p-2 rounded-full backdrop-blur-sm border border-skyBlue/50 text-skyBlue shadow-[0_0_10px_rgba(0,229,255,0.5)] z-10 pointer-events-none">
                                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                                                    </div>
                                                                )}

                                                                <div className="absolute inset-0 bg-gradient-to-t from-cyberDark/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none flex items-end justify-center pb-4 z-20">
                                                                    <span className="font-cyber text-xs text-white tracking-widest uppercase bg-neonPink/80 px-3 py-1 rounded-full backdrop-blur-sm border border-white/20">
                                                                        Ampliar Visión
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="glass-panel p-10 rounded-2xl text-center border-dashed border-2 border-white/20 max-w-2xl mx-auto">
                                            <i data-lucide="image" className="w-12 h-12 text-gray-500 mx-auto mb-4 opacity-50"></i>
                                            <p className="font-cyber text-gray-400 text-lg uppercase tracking-widest">Base de datos vacía<br/><span className="text-sm mt-2 block text-gray-500 font-body normal-case tracking-normal">¡Sé el primero en subir recuerdos de la misión!</span></p>
                                        </div>
                                    )}
                                </div>

                                {/* BLOQUE DE CONFIRMACIÓN DIRECTO A WHATSAPP */}
                                <div className="mt-12 mb-8 w-full relative max-w-4xl mx-auto">
                                    <div className="flex flex-col items-center justify-center text-center">
                                        <div className="max-w-2xl mx-auto mb-8 px-4">
                                            <p className="font-body text-gray-300 text-lg md:text-xl leading-relaxed">
                                                Tu energía hizo vibrar el escenario y fue increíble verte en el escuadrón. <span className="text-white font-bold italic">¡Gracias por ser parte de este momento!</span><br/>
                                                <span className="text-skyBlue font-bold block mt-3 text-glow-blue italic">Déjanos un mensaje para avisarnos que ya subiste tus fotos.</span>
                                            </p>
                                        </div>
                                        <a 
                                            href="https://wa.me/529222270081?text=¡Hola!%20La%20fiesta%20estuvo%20increíble.%20Ya%20subimos%20nuestras%20fotos%20del%20concierto%20de%20Keyli.%20¡Gracias%20por%20invitarnos!" 
                                            target="_blank" 
                                            rel="noopener noreferrer" 
                                            className="group relative px-10 py-6 md:py-8 font-cyber text-lg md:text-xl tracking-[0.2em] uppercase text-white overflow-hidden rounded-2xl transition-all duration-500 hover:scale-[1.02] shadow-[0_0_30px_rgba(0,229,255,0.5)] w-full max-w-md border-2 border-skyBlue box-glow-blue flex items-center justify-center mx-auto"
                                        >
                                            <span className="absolute inset-0 w-full h-full bg-gradient-to-r from-skyBlue via-neonPurple to-neonPink opacity-20 group-hover:opacity-100 transition-opacity duration-500"></span>
                                            <span className="relative z-20 font-black flex items-center justify-center gap-3 text-glow-blue group-hover:text-white transition-colors uppercase">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                                                AVISAR POR WHATSAPP
                                            </span>
                                        </a>
                                    </div>
                                </div>

                            </section>
                        )}
                    </div>

                    {/* MODAL LIGHTBOX PARA VER FOTOS EN GRANDE */}
                    {lightboxImg && (
                        <div 
                            className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex flex-col items-center justify-center p-4 animate-fade-in"
                            onClick={() => setLightboxImg(null)}
                        >
                            <button className="absolute top-6 right-6 text-white hover:text-neonPink transition-colors z-[110] bg-white/10 p-2 rounded-full border border-white/20">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>

                            {(lightboxImg.resource_type === 'video' || lightboxImg.url.match(/\.(mp4|mov|webm)$/i)) ? (
                                <video 
                                    src={lightboxImg.url} 
                                    controls 
                                    autoPlay 
                                    className="max-w-full max-h-[80vh] object-contain rounded-lg shadow-[0_0_40px_rgba(0,229,255,0.3)] border border-skyBlue/30"
                                    onClick={(e) => e.stopPropagation()} 
                                />
                            ) : (
                                <img 
                                    src={lightboxImg.url} 
                                    alt="Recuerdo ampliado" 
                                    className="max-w-full max-h-[80vh] object-contain rounded-lg shadow-[0_0_40px_rgba(0,229,255,0.3)] border border-skyBlue/30"
                                    onClick={(e) => e.stopPropagation()} 
                                />
                            )}
                            
                            <div className="mt-6 flex flex-col items-center">
                                <a 
                                    href={lightboxImg.url.replace('/upload/', '/upload/fl_attachment/')} 
                                    download
                                    onClick={(e) => e.stopPropagation()}
                                    className="px-8 py-3 bg-neonPink hover:bg-white hover:text-neonPink text-white font-cyber font-bold tracking-widest uppercase rounded-full shadow-[0_0_20px_rgba(255,46,147,0.5)] transition-all flex items-center gap-2"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                    Guardar Recuerdo
                                </a>
                                <p className="text-gray-400 text-xs font-body mt-4 tracking-widest uppercase opacity-70">Toca fuera de la imagen para cerrar</p>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-6 left-6 z-40">
                        <button onClick={toggleAudio} className={`w-12 h-12 flex items-center justify-center rounded-full glass-panel transition-all duration-500 shadow-2xl ${isPlaying ? 'border-neonPurple box-glow-purple' : 'border-white/20 hover:border-neonPink hover:box-glow-pink'}`}>
                            {isPlaying ? <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-neonPurple animate-pulse-fast"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> : <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-white hover:text-skyBlue ml-1"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
